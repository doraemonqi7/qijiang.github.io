<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Portfolio | QI JIANG</title>
    <style>
        /* 使用国内镜像字体加速加载 */
        @import url('https://fonts.font.im/css2?family=Gochi+Hand&display=swap');

        * { font-family: 'Gochi Hand', cursive !important; box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0; 
            background-color: #ffffff;
            width: 100%; height: 100%;
            overflow: hidden;
        }

        /* 1. 经典背景文字：倒三角错落布局 */
        .wuhu-container {
            position: absolute;
            left: 5%; top: 8%;
            z-index: 1;
            pointer-events: none;
            opacity: 0.5;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .wuhu-line { display: block; line-height: 0.9; animation: drift 4s infinite ease-in-out; }
        
        /* 倒三角形状设置 */
        .s1 { font-size: 7rem; font-weight: bold; margin-left: 0; }
        .s2 { font-size: 5.5rem; margin-left: 50px; animation-delay: 0.5s; }
        .s3 { font-size: 4.5rem; margin-left: 100px; animation-delay: 1s; }
        .s4 { font-size: 3.5rem; margin-left: 150px; animation-delay: 1.5s; }
        .s5 { font-size: 2.5rem; margin-left: 200px; animation-delay: 0.2s; }

        @keyframes drift {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(10px, -5px) rotate(1deg); }
        }

        /* 2. 主内容布局：确保长颈鹿在右，Portfolio 在左 */
        .main-content {
            position: relative;
            width: 100%; height: 100%;
            display: flex;
            justify-content: flex-end; /* 整体靠右 */
            align-items: flex-end; /* 整体靠下 */
            padding-right: 5%;
            padding-bottom: 5%;
            z-index: 10;
        }

        .content-aligner {
            display: flex;
            align-items: flex-end;
            gap: 30px;
        }

        .text-block {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            margin-bottom: 100px; /* 标题位置适中 */
        }

        .title-text { font-size: 5rem; font-weight: bold; margin: 0; line-height: 1; }
        .name-text { font-size: 3.5rem; font-weight: bold; margin: 10px 0 0 0; line-height: 1; }

        /* 3. 长颈鹿：恢复经典大尺寸 */
        .animal-img {
            width: 650px;
            cursor: pointer;
            transform: scaleX(-1) rotate(2deg);
            transition: 0.3s;
            -webkit-user-drag: none;
        }

        /* 核心修复：长颈鹿点击晃动动画 */
        .animal-img.active { animation: shake 0.4s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: scaleX(-1) rotate(2deg); }
            50% { transform: scaleX(-1) scale(1.03) rotate(-1.5deg); }
        }

        /* 4. 底部导航：尺寸适中 */
        .nav-tabs {
            position: absolute;
            bottom: 4%;
            left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 20px;
            z-index: 20;
        }

        .tab {
            border: 3px solid #000;
            border-radius: 50px;
            padding: 12px 35px;
            text-decoration: none;
            color: #000;
            font-weight: bold;
            font-size: 1.3rem;
            background: #fff;
            transition: 0.3s;
            white-space: nowrap;
        }
        .tab:hover { background: #000; color: #fff; transform: translateY(-5px); }

        /* 5. 星星特效：金色 */
        .sparkle {
            position: absolute; width: 40px; height: 40px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 576 512"><path d="M316.9 18C311.6 7 300.4 0 288.1 0s-23.4 7-28.8 18L195 150.3 51.4 171.5c-12 1.8-22 10.2-25.7 21.7s-.7 24.2 7.9 32.7L137.8 329 113.2 474.7c-2 12 3 24.2 12.9 31.3s23 8 33.8 2.3l128.3-68.5 128.3 68.5c10.8 5.7 23.9 4.8 33.8-2.3s14.9-19.3 12.9-31.3L438.5 329 542.7 225.9c8.6-8.5 11.7-21.2 7.9-32.7s-13.7-19.9-25.7-21.7L381.2 150.3 316.9 18z" fill="%23FFD700"/></svg>') no-repeat center/contain;
            pointer-events: none; animation: burst 0.8s ease-out forwards; z-index: 2000;
        }
        @keyframes burst {
            0% { transform: scale(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: scale(1.5) translate(var(--dx), var(--dy)) rotate(45deg); opacity: 0; }
        }

        /* 手机端适配 */
        @media (max-width: 850px) {
            .wuhu-container { display: none; } /* 手机端隐藏背景文字，保持清爽 */
            .main-content { justify-content: center; align-items: center; padding: 0; }
            .content-aligner { flex-direction: column; align-items: center; }
            .text-block { align-items: center; margin-bottom: 30px; }
            .animal-img { width: 80vw; }
            .nav-tabs { flex-direction: column; bottom: 2%; gap: 10px; width: 80%; }
            .tab { text-align: center; font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <div class="wuhu-container">
        <span class="wuhu-line s1">wuhuwuhuwuhu</span>
        <span class="wuhu-line s2">wuhuwuhuwuhu</span>
        <span class="wuhu-line s3">wuhuwuhuwuhu</span>
        <span class="wuhu-line s4">wuhuwuhuwuhu</span>
        <span class="wuhu-line s5">wuhulalaalala</span>
    </div>

    <div class="main-content">
        <div class="content-aligner">
            <div class="text-block">
                <p class="title-text">Portfolio</p>
                <p class="name-text">BY QI JIANG</p>
            </div>
            <img id="giraffe" class="animal-img" onclick="clickGiraffe(event)" src="1.png">
        </div>

        <div class="nav-tabs">
            <a href="visual.html" class="tab">Visual Art</a>
            <a href="digital.html" class="tab">3D Creation</a>
            <a href="new-media.html" class="tab">New Media</a>
        </div>
    </div>

<script>
    function clickGiraffe(e) {
        const img = document.getElementById('giraffe');
        img.classList.remove('active');
        void img.offsetWidth;
        img.classList.add('active');

        const x = e.clientX || (e.touches && e.touches[0].clientX);
        const y = e.clientY || (e.touches && e.touches[0].clientY);

        for(let i=0; i<10; i++) createStar(x, y);
    }

    function createStar(x, y) {
        const star = document.createElement('div');
        star.className = 'sparkle';
        const dx = (Math.random() - 0.5) * 200 + 'px';
        const dy = (Math.random() - 0.5) * 200 + 'px';
        star.style.setProperty('--dx', dx);
        star.style.setProperty('--dy', dy);
        star.style.left = (x - 20) + 'px';
        star.style.top = (y - 20) + 'px';
        document.body.appendChild(star);
        setTimeout(() => star.remove(), 800);
    }
</script>

</body>
</html>
