<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Portfolio | QI JIANG</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Gochi+Hand&display=swap');

        * { font-family: 'Gochi Hand', cursive !important; box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0; 
            background-color: #ffffff;
            width: 100%; height: 100%;
            overflow: hidden;
        }

        /* 1. 背景文字布局：恢复原本大小 */
        .wuhu-container {
            position: absolute;
            left: 8%; top: 12%;
            z-index: 1;
            pointer-events: none;
            opacity: 0.7;
        }

        .wuhu-line { display: block; line-height: 1.1; animation: drift 3s infinite ease-in-out; }
        .s1 { font-size: 2.8rem; }
        .s2 { font-size: 4rem; margin-left: 100px; animation-delay: 0.5s; }
        .s3 { font-size: 2.5rem; margin-left: 20px; animation-delay: 1s; }
        .s4 { font-size: 5rem; margin-left: 180px; animation-delay: 1.5s; font-weight: bold; }
        .s5 { font-size: 3.2rem; margin-left: -20px; animation-delay: 0.2s; }
        .s6 { font-size: 7rem; margin-left: 220px; animation-delay: 0.8s; letter-spacing: 4px; }

        @keyframes drift {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(3px, -3px); }
        }

        /* 2. 长颈鹿区域修复：确保它可见且位置正确 */
        .main-content {
            position: relative;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 10;
        }

        .giraffe-wrap {
            position: absolute;
            bottom: 22%; right: 10%;
            display: flex; flex-direction: column;
            align-items: center;
        }

        .animal-img {
            width: 380px; /* 恢复原本适中大小 */
            cursor: pointer;
            transform: rotate(2deg);
            transition: transform 0.3s ease;
        }

        /* 点击晃动动画 */
        .animal-img.active { animation: shakeOnce 0.4s ease-in-out; }
        @keyframes shakeOnce {
            0%, 100% { transform: scale(1) rotate(2deg); }
            50% { transform: scale(1.05) rotate(-3deg); }
        }

        /* 3. 底部按钮 */
        .nav-tabs {
            position: absolute;
            bottom: 8%;
            display: flex; gap: 20px;
            z-index: 20;
        }

        .tab {
            border: 3px solid #000;
            border-radius: 50px;
            padding: 12px 35px;
            text-decoration: none;
            color: #000;
            font-weight: bold;
            font-size: 1.4rem;
            background: #fff;
            transition: 0.3s;
        }

        .tab:hover { background: #000; color: #fff; transform: translateY(-5px); }

        /* 4. 星星闪烁样式 */
        .sparkle {
            position: absolute;
            width: 30px; height: 30px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 576 512"><path d="M316.9 18C311.6 7 300.4 0 288.1 0s-23.4 7-28.8 18L195 150.3 51.4 171.5c-12 1.8-22 10.2-25.7 21.7s-.7 24.2 7.9 32.7L137.8 329 113.2 474.7c-2 12 3 24.2 12.9 31.3s23 8 33.8 2.3l128.3-68.5 128.3 68.5c10.8 5.7 23.9 4.8 33.8-2.3s14.9-19.3 12.9-31.3L438.5 329 542.7 225.9c8.6-8.5 11.7-21.2 7.9-32.7s-13.7-19.9-25.7-21.7L381.2 150.3 316.9 18z" fill="%23FFD700"/></svg>') no-repeat center/contain;
            pointer-events: none;
            animation: burst 0.8s ease-out forwards;
            z-index: 100;
        }

        @keyframes burst {
            0% { transform: scale(0) translate(0,0) rotate(0deg); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: scale(1) translate(var(--dx), var(--dy)) rotate(45deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="wuhu-container">
        <span class="wuhu-line s1">wuhuwuhuwuhu</span>
        <span class="wuhu-line s2">wuhuwuhuwuhu</span>
        <span class="wuhu-line s3">wuhuwuhuwuhu</span>
        <span class="wuhu-line s4">wuhuwuhuwuhu</span>
        <span class="wuhu-line s5">wuhuwuhuwuhu</span>
        <span class="wuhu-line s6">wuhuhulalaaal</span>
    </div>

    <div class="main-content">
        <div class="giraffe-wrap">
            <div style="font-size:3.5rem; font-weight:bold; margin-bottom:10px;">Portfolio</div>
            <img id="giraffe" class="animal-img" onclick="clickGiraffe(event)" src="https://freight.cargo.site/t/original/i/R2827857287254243483226718341063/1.png">
            <div style="font-size:3.5rem; font-weight:bold; margin-top:10px;">BY QI JIANG</div>
        </div>

        <div class="nav-tabs">
            <a href="visual.html" class="tab">Visual Art & Illustration</a>
            <a href="digital.html" class="tab">Digital Image & 3D Creation</a>
            <a href="new-media.html" class="tab">New Media Art & Installation</a>
        </div>
    </div>

<script>
    function clickGiraffe(e) {
        const img = document.getElementById('giraffe');
        
        // 1. 晃动动画
        img.classList.remove('active');
        void img.offsetWidth;
        img.classList.add('active');

        // 2. 在点击位置产生星星
        for(let i=0; i<6; i++) {
            createStar(e.pageX, e.pageY);
        }
    }

    function createStar(x, y) {
        const star = document.createElement('div');
        star.className = 'sparkle';
        
        // 随机爆炸方向
        const dx = (Math.random() - 0.5) * 200 + 'px';
        const dy = (Math.random() - 0.5) * 200 + 'px';
        star.style.setProperty('--dx', dx);
        star.style.setProperty('--dy', dy);
        
        // 星星起始位置（鼠标点击处）
        star.style.left = (x - 15) + 'px';
        star.style.top = (y - 15) + 'px';
        
        document.body.appendChild(star);
        setTimeout(() => star.remove(), 800);
    }
</script>

</body>
</html>
