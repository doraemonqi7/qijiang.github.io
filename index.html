<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Portfolio | QI JIANG</title>
    <style>
        /* 使用国内镜像字体，解决国内打开慢的问题 */
        @import url('https://fonts.font.im/css2?family=Gochi+Hand&display=swap');

        * { font-family: 'Gochi Hand', cursive !important; box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0; 
            background-color: #ffffff;
            width: 100%; height: 100%;
            overflow: hidden; /* 禁止滚动 */
        }

        /* 1. 背景文字布局：核心修改 -> 营造倒三角形状，彻底避让右下角 */
        .wuhu-container {
            position: absolute;
            left: 3%; top: 5%; /* 靠左上 */
            z-index: 1;
            pointer-events: none;
            opacity: 0.5; /* 稍微调淡一点，更像背景 */
            display: flex;
            flex-direction: column;
            align-items: flex-start; /* 靠左对齐 */
        }

        .wuhu-line { display: block; line-height: 0.9; animation: drift 4s infinite ease-in-out; }
        
        /* 倒三角 CSS 逻辑：第一行最长最粗，逐行变短变细并向右缩进 */
        .s1 { font-size: 8rem; font-weight: bold; margin-left: 0; }
        .s2 { font-size: 6.5rem; margin-left: 60px; animation-delay: 0.5s; }
        .s3 { font-size: 5rem; margin-left: 120px; animation-delay: 1s; }
        .s4 { font-size: 4rem; margin-left: 180px; animation-delay: 1.5s; }
        .s5 { font-size: 3rem; margin-left: 240px; animation-delay: 0.2s; }
        .s6 { font-size: 2.2rem; margin-left: 300px; animation-delay: 0.8s; opacity: 0.7; }

        @keyframes drift {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(10px, -5px) rotate(1deg); }
        }

        /* 2. 主区域布局 */
        .main-content {
            position: relative;
            width: 100%; height: 100%;
            display: flex; /* 使用 flex 重新规划文字和长颈鹿的位置 */
            justify-content: flex-end; /* 整体靠右 */
            align-items: flex-end; /* 整体靠下 */
            z-index: 10;
            padding-right: 5%;
            padding-bottom: 5%;
        }

        /* 长颈鹿及其左侧文字容器 */
        .content-aligner {
            display: flex;
            align-items: flex-end; /* 文字和长颈鹿底部对齐 */
            gap: 30px; /* 文字和长颈鹿之间的间距 */
        }

        /* 3. 文字块：Portfolio 和 QI JIANG 移到左侧 */
        .text-block {
            display: flex;
            flex-direction: column;
            align-items: flex-end; /* 文字靠右对齐，指向长颈鹿 */
            margin-bottom: 120px; /* 向上提一丢丢，靠近长颈鹿头部高度 */
        }

        .title-text {
            font-size: 5.5rem; /* Portfolio 再大点 */
            font-weight: bold; 
            margin: 0;
            color: #000;
            line-height: 1;
        }

        .name-text {
            font-size: 4rem; /* QI JIANG 大点 */
            font-weight: bold;
            margin: 10px 0 0 0;
            color: #000;
            line-height: 1;
        }

        /* 4. 长颈鹿：极致放大，面朝左，向上提 */
        .giraffe-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .animal-img {
            width: 750px; /* 极致放大 */
            cursor: pointer;
            /* 保持朝左scaleX(-1)，轻微旋转 */
            transform: rotate(1deg) scaleX(-1); 
            transition: transform 0.3s ease;
            -webkit-user-drag: none;
            /* 核心修改：向上提一丢丢，避免 Portfolio 被压 */
            margin-bottom: 20px; 
        }

        /* 点击晃动动画 */
        .animal-img.active { animation: shakeLeft 0.4s ease-in-out; }
        @keyframes shakeLeft {
            0%, 100% { transform: scale(1) rotate(1deg) scaleX(-1); }
            50% { transform: scale(1.03) rotate(-1.5deg) scaleX(-1); }
        }

        /* 5. 底部按钮：适配大长颈鹿布局 */
        .nav-tabs {
            position: absolute;
            bottom: 3%;
            left: 50%;
            transform: translateX(-50%); /* 居中显示 */
            display: flex; gap: 15px;
            z-index: 20;
        }

        .tab {
            border: 3px solid #000;
            border-radius: 50px;
            padding: 10px 30px;
            text-decoration: none;
            color: #000;
            font-weight: bold;
            font-size: 1.3rem;
            background: #fff;
            transition: 0.3s;
        }
        .tab:hover { background: #000; color: #fff; transform: translateY(-5px); }

        /* 6. 星星闪烁样式 */
        .sparkle {
            position: absolute;
            width: 40px; height: 40px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 576 512"><path d="M316.9 18C311.6 7 300.4 0 288.1 0s-23.4 7-28.8 18L195 150.3 51.4 171.5c-12 1.8-22 10.2-25.7 21.7s-.7 24.2 7.9 32.7L137.8 329 113.2 474.7c-2 12 3 24.2 12.9 31.3s23 8 33.8 2.3l128.3-68.5 128.3 68.5c10.8 5.7 23.9 4.8 33.8-2.3s14.9-19.3 12.9-31.3L438.5 329 542.7 225.9c8.6-8.5 11.7-21.2 7.9-32.7s-13.7-19.9-25.7-21.7L381.2 150.3 316.9 18z" fill="%23FFD700"/></svg>') no-repeat center/contain;
            pointer-events: none;
            animation: burst 0.9s ease-out forwards;
            z-index: 1000;
        }

        @keyframes burst {
            0% { transform: scale(0) translate(0,0) rotate(0deg); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: scale(1.1) translate(var(--dx), var(--dy)) rotate(60deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="wuhu-container">
        <span class="wuhu-line s1">wuhuwuhuwuhu</span>
        <span class="wuhu-line s2">wuhuwuhuwuhu</span>
        <span class="wuhu-line s3">wuhuwuhuwuhu</span>
        <span class="wuhu-line s4">wuhuwuhuwuhu</span>
        <span class="wuhu-line s5">wuhuwuhuwuhu</span>
        <span class="wuhu-line s6">wuhuhulalaaal</span>
    </div>

    <div class="main-content">
        <div class="content-aligner">
            <div class="text-block">
                <div class="title-text">Portfolio</div>
                <div class="name-text">BY QI JIANG</div>
            </div>
            
            <div class="giraffe-wrap">
                <img id="giraffe" class="animal-img" onclick="clickGiraffe(event)" src="1.png">
            </div>
        </div>

        <div class="nav-tabs">
            <a href="visual.html" class="tab">Visual Art & Illustration</a>
            <a href="digital.html" class="tab">Digital Image & 3D Creation</a>
            <a href="new-media.html" class="tab">New Media Art & Installation</a>
        </div>
    </div>

<script>
    function clickGiraffe(e) {
        const img = document.getElementById('giraffe');
        
        // 1. 晃动动画
        img.classList.remove('active');
        void img.offsetWidth;
        img.classList.add('active');

        // 2. 产生星星
        const x = e.clientX || (e.touches && e.touches[0].clientX);
        const y = e.clientY || (e.touches && e.touches[0].clientY);

        for(let i=0; i<10; i++) { // 增加到 10 颗星星
            createStar(x, y);
        }
    }

    function createStar(x, y) {
        const star = document.createElement('div');
        star.className = 'sparkle';
        
        const dx = (Math.random() - 0.5) * 300 + 'px';
        const dy = (Math.random() - 0.5) * 300 + 'px';
        star.style.setProperty('--dx', dx);
        star.style.setProperty('--dy', dy);
        
        star.style.left = (x - 20) + 'px';
        star.style.top = (y - 20) + 'px';
        
        document.body.appendChild(star);
        setTimeout(() => star.remove(), 900);
    }
</script>

</body>
</html>
