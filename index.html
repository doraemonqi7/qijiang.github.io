<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Portfolio | QI JIANG</title>
    <style>
        @import url('https://fonts.font.im/css2?family=Gochi+Hand&display=swap');

        * { font-family: 'Gochi Hand', cursive !important; box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0; 
            background-color: #ffffff;
            width: 100%; height: 100%;
            overflow: hidden;
        }

        /* 背景文字区域：打散分布 */
        .bg-wuhu-layer {
            position: absolute;
            top: 0; left: 0;
            width: 50%; /* 限制在左半边，不干扰右侧长颈鹿 */
            height: 100%;
            z-index: 1;
            pointer-events: none;
            opacity: 0.4;
        }

        .wuhu-scatter {
            position: absolute;
            white-space: nowrap;
            display: inline-block;
            animation: float 6s infinite ease-in-out;
        }

        /* 随机散落在各处 */
        .w1 { top: 10%; left: 15%; font-size: 5rem; transform: rotate(-10deg); }
        .w2 { top: 25%; left: 40%; font-size: 3.5rem; transform: rotate(15deg); }
        .w3 { top: 40%; left: 10%; font-size: 6rem; transform: rotate(-5deg); font-weight: bold; }
        .w4 { top: 15%; left: 65%; font-size: 2.5rem; transform: rotate(20deg); }
        .w5 { top: 60%; left: 20%; font-size: 4.5rem; transform: rotate(-15deg); }
        .w6 { top: 75%; left: 45%; font-size: 3rem; transform: rotate(10deg); }
        .w7 { top: 85%; left: 10%; font-size: 5.5rem; transform: rotate(-8deg); }
        .w8 { top: 50%; left: 55%; font-size: 2rem; transform: rotate(30deg); opacity: 0.6; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(var(--rot, 0deg)); }
            50% { transform: translate(15px, -10px) rotate(calc(var(--rot, 0deg) + 3deg)); }
        }

        /* 主内容布局 */
        .main-content {
            position: relative;
            width: 100%; height: 100%;
            display: flex;
            justify-content: flex-end; /* 长颈鹿靠右 */
            align-items: center;
            z-index: 10;
            padding-right: 8%;
        }

        .content-aligner {
            display: flex;
            align-items: flex-end;
            gap: 40px;
            margin-bottom: 80px; /* 长颈鹿向上移 */
        }

        .text-block {
            text-align: right;
            margin-bottom: 60px;
        }

        .title-text { font-size: 5.5rem; font-weight: bold; margin: 0; line-height: 1; }
        .name-text { font-size: 4rem; font-weight: bold; margin: 10px 0 0 0; line-height: 1; }

        .animal-img {
            width: 700px;
            max-width: 48vw;
            cursor: pointer;
            transform: scaleX(-1) rotate(2deg);
            transition: 0.3s;
            -webkit-user-drag: none;
        }

        .animal-img.active { animation: shake 0.4s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: scaleX(-1) rotate(2deg); }
            50% { transform: scaleX(-1) scale(1.02) rotate(-2deg); }
        }

        /* 底部按钮 */
        .nav-tabs {
            position: absolute;
            bottom: 6%;
            left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 20px;
            z-index: 20;
        }

        .tab {
            border: 3.5px solid #000;
            border-radius: 60px;
            padding: 15px 40px;
            text-decoration: none;
            color: #000;
            font-weight: bold;
            font-size: 1.5rem; /* 稍微调大 */
            background: #fff;
            transition: 0.3s;
            white-space: nowrap;
        }
        .tab:hover { background: #000; color: #fff; transform: translateY(-8px); }

        /* 星星 */
        .sparkle {
            position: absolute;
            width: 40px; height: 40px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 576 512"><path d="M316.9 18C311.6 7 300.4 0 288.1 0s-23.4 7-28.8 18L195 150.3 51.4 171.5c-12 1.8-22 10.2-25.7 21.7s-.7 24.2 7.9 32.7L137.8 329 113.2 474.7c-2 12 3 24.2 12.9 31.3s23 8 33.8 2.3l128.3-68.5 128.3 68.5c10.8 5.7 23.9 4.8 33.8-2.3s14.9-19.3 12.9-31.3L438.5 329 542.7 225.9c8.6-8.5 11.7-21.2 7.9-32.7s-13.7-19.9-25.7-21.7L381.2 150.3 316.9 18z" fill="%23FFD700"/></svg>') no-repeat center/contain;
            pointer-events: none;
            animation: burst 0.8s ease-out forwards;
            z-index: 1000;
        }
        @keyframes burst {
            0% { transform: scale(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: scale(1.2) translate(var(--dx), var(--dy)); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="bg-wuhu-layer">
        <span class="wuhu-scatter w1" style="--rot:-10deg">wuhuwuhu</span>
        <span class="wuhu-scatter w2" style="--rot:15deg">wuhuwuhuwuhu</span>
        <span class="wuhu-scatter w3" style="--rot:-5deg">wuhu!</span>
        <span class="wuhu-scatter w4" style="--rot:20deg">lalala</span>
        <span class="wuhu-scatter w5" style="--rot:-15deg">wuhuwuhu</span>
        <span class="wuhu-scatter w6" style="--rot:10deg">wuhulalaaa</span>
        <span class="wuhu-scatter w7" style="--rot:-8deg">wuhuwuhu</span>
        <span class="wuhu-scatter w8" style="--rot:30deg">wuhu~</span>
    </div>

    <div class="main-content">
        <div class="content-aligner">
            <div class="text-block">
                <p class="title-text">Portfolio</p>
                <p class="name-text">BY QI JIANG</p>
            </div>
            <img id="giraffe" class="animal-img" onclick="clickGiraffe(event)" src="1.png">
        </div>

        <div class="nav-tabs">
            <a href="visual.html" class="tab">Visual Art</a>
            <a href="digital.html" class="tab">3D Creation</a>
            <a href="new-media.html" class="tab">New Media</a>
        </div>
    </div>

<script>
    function clickGiraffe(e) {
        const img = document.getElementById('giraffe');
        img.classList.remove('active');
        void img.offsetWidth;
        img.classList.add('active');
        for(let i=0; i<8; i++) createStar(e.clientX, e.clientY);
    }

    function createStar(x, y) {
        const star = document.createElement('div');
        star.className = 'sparkle';
        const dx = (Math.random() - 0.5) * 200 + 'px';
        const dy = (Math.random() - 0.5) * 200 + 'px';
        star.style.setProperty('--dx', dx);
        star.style.setProperty('--dy', dy);
        star.style.left = (x - 20) + 'px';
        star.style.top = (y - 20) + 'px';
        document.body.appendChild(star);
        setTimeout(() => star.remove(), 800);
    }
</script>

</body>
</html>
