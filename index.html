<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Portfolio | QI JIANG</title>
    <style>
        /* 使用国内镜像字体 */
        @import url('https://fonts.font.im/css2?family=Gochi+Hand&display=swap');

        * { font-family: 'Gochi Hand', cursive !important; box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0; 
            background-color: #ffffff;
            width: 100%; height: 100%;
            overflow: hidden;
        }

        /* 1. 零散背景文字：限制在左侧区域，防止重叠 */
        .wuhu-area {
            position: absolute;
            left: 0; top: 0;
            width: 45%; /* 限制文字只在左侧 45% 区域内 */
            height: 100%;
            z-index: 1;
            pointer-events: none;
            opacity: 0.5;
        }

        .wuhu-item {
            position: absolute;
            display: inline-block;
            white-space: nowrap;
            animation: drift 4s infinite ease-in-out;
        }

        /* 随机零散布局 */
        .t1 { font-size: 4rem; top: 10%; left: 10%; transform: rotate(-10deg); }
        .t2 { font-size: 6rem; top: 25%; left: 25%; transform: rotate(5deg); font-weight: bold; }
        .t3 { font-size: 3rem; top: 45%; left: 5%; transform: rotate(-5deg); }
        .t4 { font-size: 7rem; top: 60%; left: 15%; transform: rotate(8deg); }
        .t5 { font-size: 4.5rem; top: 75%; left: 30%; transform: rotate(-12deg); }
        .t6 { font-size: 2.5rem; top: 20%; left: 60%; transform: rotate(15deg); }

        @keyframes drift {
            0%, 100% { transform: translate(0, 0) rotate(var(--r, 0deg)); }
            50% { transform: translate(10px, -10px) rotate(calc(var(--r, 0deg) + 2deg)); }
        }

        /* 2. 主内容区域：长颈鹿固定在右侧 */
        .main-content {
            position: relative;
            width: 100%; height: 100%;
            display: flex;
            justify-content: flex-end; /* 靠右 */
            align-items: center;
            z-index: 10;
            padding-right: 8%;
        }

        .giraffe-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            /* 核心修改：向上移动 */
            margin-bottom: 80px; 
        }

        .title-group {
            text-align: right;
            margin-right: 40px;
            margin-bottom: 50px; /* 标题组稍微上提 */
        }

        .title-text { font-size: 5.5rem; font-weight: bold; margin: 0; line-height: 1; }
        .name-text { font-size: 4rem; font-weight: bold; margin: 10px 0 0 0; line-height: 1; }

        .animal-img {
            width: 700px;
            max-width: 45vw; /* 确保缩放时不会撑破窗口 */
            cursor: pointer;
            transform: scaleX(-1) rotate(1deg);
            transition: transform 0.3s ease;
            -webkit-user-drag: none;
        }

        .animal-img.active { animation: shake 0.4s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: scaleX(-1) rotate(1deg); }
            50% { transform: scaleX(-1) scale(1.02) rotate(-2deg); }
        }

        /* 3. 底部按钮：变大 */
        .nav-tabs {
            position: absolute;
            bottom: 6%;
            left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 25px;
            z-index: 20;
            width: 100%;
            justify-content: center;
        }

        .tab {
            border: 3.5px solid #000;
            border-radius: 60px;
            padding: 15px 45px; /* 增加内边距 */
            text-decoration: none;
            color: #000;
            font-weight: bold;
            font-size: 1.6rem; /* 字体变大 */
            background: #fff;
            transition: 0.3s;
            white-space: nowrap;
        }
        .tab:hover { background: #000; color: #fff; transform: translateY(-8px); }

        /* 4. 星星闪烁 */
        .sparkle {
            position: absolute;
            width: 40px; height: 40px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 576 512"><path d="M316.9 18C311.6 7 300.4 0 288.1 0s-23.4 7-28.8 18L195 150.3 51.4 171.5c-12 1.8-22 10.2-25.7 21.7s-.7 24.2 7.9 32.7L137.8 329 113.2 474.7c-2 12 3 24.2 12.9 31.3s23 8 33.8 2.3l128.3-68.5 128.3 68.5c10.8 5.7 23.9 4.8 33.8-2.3s14.9-19.3 12.9-31.3L438.5 329 542.7 225.9c8.6-8.5 11.7-21.2 7.9-32.7s-13.7-19.9-25.7-21.7L381.2 150.3 316.9 18z" fill="%23FFD700"/></svg>') no-repeat center/contain;
            pointer-events: none;
            animation: burst 0.8s ease-out forwards;
            z-index: 1000;
        }
        @keyframes burst {
            0% { transform: scale(0) translate(0,0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: scale(1.2) translate(var(--dx), var(--dy)); opacity: 0; }
        }

        /* 移动端适配 */
        @media (max-width: 900px) {
            .wuhu-area { width: 100%; opacity: 0.3; }
            .animal-img { width: 80%; max-width: none; }
            .nav-tabs { flex-direction: column; align-items: center; bottom: 2%; }
            .tab { padding: 10px 30px; font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <div class="wuhu-area">
        <span class="wuhu-item t1" style="--r:-10deg">wuhuwuhu</span>
        <span class="wuhu-item t2" style="--r:5deg">wuhuwuhuwuhu</span>
        <span class="wuhu-item t3" style="--r:-5deg">wuhu~</span>
        <span class="wuhu-item t4" style="--r:8deg">wuhulalaaa</span>
        <span class="wuhu-item t5" style="--r:-12deg">wuhuwuhu</span>
        <span class="wuhu-item t6" style="--r:15deg">lalala</span>
    </div>

    <div class="main-content">
        <div style="display: flex; align-items: flex-end;">
            <div class="title-group">
                <p class="title-text">Portfolio</p>
                <p class="name-text">BY QI JIANG</p>
            </div>
            <div class="giraffe-wrap">
                <img id="giraffe" class="animal-img" onclick="clickGiraffe(event)" src="1.png">
            </div>
        </div>

        <div class="nav-tabs">
            <a href="visual.html" class="tab">Visual Art & Illustration</a>
            <a href="digital.html" class="tab">Digital Image & 3D Creation</a>
            <a href="new-media.html" class="tab">New Media Art & Installation</a>
        </div>
    </div>

<script>
    function clickGiraffe(e) {
        const img = document.getElementById('giraffe');
        img.classList.remove('active');
        void img.offsetWidth;
        img.classList.add('active');
        for(let i=0; i<8; i++) createStar(e.clientX, e.clientY);
    }

    function createStar(x, y) {
        const star = document.createElement('div');
        star.className = 'sparkle';
        const dx = (Math.random() - 0.5) * 200 + 'px';
        const dy = (Math.random() - 0.5) * 200 + 'px';
        star.style.setProperty('--dx', dx);
        star.style.setProperty('--dy', dy);
        star.style.left = (x - 20) + 'px';
        star.style.top = (y - 20) + 'px';
        document.body.appendChild(star);
        setTimeout(() => star.remove(), 800);
    }
</script>

</body>
</html>
