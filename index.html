<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Portfolio | QI JIANG</title>
    <style>
        @import url('https://fonts.font.im/css2?family=Gochi+Hand&display=swap');

        * { font-family: 'Gochi Hand', cursive !important; box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0; 
            /* 核心修改：背景色改为参考图中的米黄绢纸色 */
            background-color: #fefae0; 
            width: 100%; height: 100%;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        .viewport-wrapper {
            position: relative;
            width: 100vw; height: 100vh;
            max-width: 1920px; margin: 0 auto;
        }

        /* 1. 背景线条：颜色调整为参考图中的宝蓝色 */
        .flower-bg-layer {
            position: absolute;
            top: 0; left: 0;
            width: 50vw; height: 100vh;
            z-index: 5;
            pointer-events: auto; 
            cursor: pointer;
        }

        .flower-svg {
            width: 100%; height: 100%;
            opacity: 0.7; /* 稍微增强颜色存在感 */
        }

        .flower-path {
            fill: none;
            /* 核心修改：宝蓝色线条 */
            stroke: #1e40af; 
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 1200;
            stroke-dashoffset: 1200;
            animation: growLine 6s ease-in-out forwards, sway 5s infinite ease-in-out;
            transform-origin: bottom left;
            /* 模拟点阵质感的微弱发光 */
            filter: drop-shadow(0 0 1px rgba(30, 64, 175, 0.3));
        }

        @keyframes growLine { to { stroke-dashoffset: 0; } }
        @keyframes sway {
            0%, 100% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(1.2deg) scale(1.01) translateX(0.5vw); }
        }

        /* 2. 主内容区域 */
        .main-content {
            position: absolute;
            right: 5vw; top: 45%;
            transform: translateY(-50%);
            display: flex; align-items: flex-end;
            gap: 3vw; z-index: 10;
        }

        .text-block { text-align: right; margin-bottom: 5vh; }
        .title-text { font-size: 6vw; font-weight: bold; margin: 0; line-height: 1; color: #1e40af; }
        .name-text { font-size: 4vw; font-weight: bold; margin: 1vh 0 0 0; line-height: 1; color: #1e40af; }

        .animal-img {
            width: 45vw; max-width: 800px;
            cursor: default; 
            transform: scaleX(-1) rotate(2deg);
            transition: 0.3s; -webkit-user-drag: none;
            position: relative;
            z-index: 15;
            pointer-events: none; 
        }

        /* 3. 底部导航：边框也改为宝蓝色保持统一 */
        .nav-tabs {
            position: absolute; bottom: 8vh; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 2vw; z-index: 20;
        }

        .tab {
            border: 0.4vw solid #1e40af; border-radius: 100px;
            padding: 1.5vh 3.5vw; text-decoration: none;
            color: #1e40af; font-weight: bold; font-size: 1.8vw;
            background: #fff; transition: 0.3s; white-space: nowrap;
            box-shadow: 0 0.5vh 0 rgba(30, 64, 175, 0.2);
        }
        .tab:hover { background: #1e40af; color: #fff; transform: translateY(-0.5vh); }

        /* 4. 点击生成的线条小花样式：宝蓝色 */
        .click-flower {
            position: absolute;
            width: 90px; height: 90px;
            pointer-events: none;
            z-index: 1000;
            animation: flowerPop 2.2s ease-out forwards;
        }

        .click-flower path {
            fill: none;
            stroke: #1e40af; /* 宝蓝色 */
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 200;
            stroke-dashoffset: 200;
            animation: growMini 1s ease-out forwards;
        }

        @keyframes growMini { to { stroke-dashoffset: 0; } }

        @keyframes flowerPop {
            0% { transform: scale(0.2) rotate(-10deg); opacity: 0; }
            20% { transform: scale(1.1) rotate(0deg); opacity: 1; }
            100% { transform: scale(1) translateY(-50px) rotate(10deg); opacity: 0; }
        }

        /* 手机端适配 */
        @media (max-width: 768px) {
            .main-content { flex-direction: column; align-items: center; right: 0; left: 0; top: 40%; gap: 5vh; }
            .title-text { font-size: 14vw; }
            .name-text { font-size: 8vw; }
            .nav-tabs { flex-direction: column; bottom: 5vh; width: 80%; }
            .tab { font-size: 1.2rem; width: 100%; border-width: 2px; }
        }
    </style>
</head>
<body>

    <div class="viewport-wrapper">
        <div class="flower-bg-layer" onclick="clickFlowerLine(event)">
            <svg class="flower-svg" viewBox="0 0 400 1000" preserveAspectRatio="xMinYMax meet">
                <path class="flower-path" d="M100,1000 Q250,700 100,450 T150,100 M100,450 Q60,400 40,450 M100,450 Q140,400 160,450 M150,250 Q110,200 90,250 M150,250 Q190,200 210,250" />
            </svg>
        </div>

        <div class="main-content">
            <div class="text-block">
                <p class="title-text">Portfolio</p>
                <p class="name-text">BY QI JIANG</p>
            </div>
            <div class="giraffe-wrap">
                <img class="animal-img" src="1.png">
            </div>
        </div>

        <div class="nav-tabs">
            <a href="visual.html" class="tab">Visual Art</a>
            <a href="digital.html" class="tab">3D Creation</a>
            <a href="new-media.html" class="tab">New Media</a>
        </div>
    </div>

<script>
    function clickFlowerLine(e) {
        const x = e.clientX || (e.touches && e.touches[0].clientX);
        const y = e.clientY || (e.touches && e.touches[0].clientY);
        createFlower(x, y);
    }

    function createFlower(x, y) {
        const flower = document.createElement('div');
        flower.className = 'click-flower';
        flower.style.left = (x - 45) + 'px';
        flower.style.top = (y - 45) + 'px';

        const svgHTML = `
            <svg viewBox="0 0 100 100">
                <path d="M50,85 Q45,65 50,50" />
                <path d="M50,50 C60,35 85,35 75,55 C65,75 50,50 50,50" />
                <path d="M50,50 C40,35 15,35 25,55 C35,75 50,50 50,50" />
                <path d="M50,50 C55,30 50,10 50,10 C50,10 45,30 50,50" />
            </svg>
        `;
        flower.innerHTML = svgHTML;
        document.body.appendChild(flower);
        setTimeout(() => flower.remove(), 2200);
    }
</script>

</body>
</html>
