<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Portfolio | QI JIANG</title>
    <style>
        @import url('https://fonts.font.im/css2?family=Gochi+Hand&display=swap');

        * { font-family: 'Gochi Hand', cursive !important; box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0; 
            background-color: #ffffff;
            width: 100%; height: 100%;
            overflow: hidden;
            /* 确保整体在网页端绝对居中 */
            display: flex; justify-content: center; align-items: center;
        }

        /* 核心响应式容器：锁定 100% 视口，消除边缘空白 */
        .viewport-wrapper {
            position: relative;
            width: 100vw; height: 100vh;
            display: flex; flex-direction: column; 
            justify-content: center; align-items: center;
            overflow: hidden;
        }

        /* 1. 背景文字：按视口百分比散布，填充空间 */
        .wuhu-bg-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .wuhu-item {
            position: absolute;
            white-space: nowrap;
            color: #000;
            animation: drift 5s infinite ease-in-out;
        }

        /* 使用 vw/vh 确保文字随窗口拉伸而自动拉开间距 */
        .t1 { top: 15vh; left: 10vw; font-size: 5vw; transform: rotate(-8deg); }
        .t2 { top: 30vh; left: 25vw; font-size: 3vw; transform: rotate(5deg); opacity: 0.5; }
        .t3 { top: 65vh; left: 8vw; font-size: 7vw; transform: rotate(-3deg); font-weight: bold; }
        .t4 { top: 12vh; left: 55vw; font-size: 3.5vw; transform: rotate(12deg); }
        .t5 { top: 80vh; left: 15vw; font-size: 4.5vw; transform: rotate(-5deg); }

        @keyframes drift {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(1vw, -1vh); }
        }

        /* 2. 核心视觉模块：长颈鹿、香蕉、签名 */
        .main-center-module {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
            /* 向上微调，平衡视觉重心 */
            margin-top: -5vh; 
        }

        .animal-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        .animal-img {
            /* 宽度随视口变化，在大屏下会自动变大 */
            width: 32vw; 
            max-width: 550px;
            min-width: 280px;
            cursor: pointer;
            transform: scaleX(-1);
            transition: 0.3s;
            -webkit-user-drag: none;
        }

        .banana-img {
            position: absolute;
            bottom: 1vh; right: -2vw;
            width: 6vw; 
            max-width: 90px;
            transform: rotate(12deg);
            z-index: 11;
        }

        .animal-img.active { animation: shake 0.4s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: scaleX(-1) rotate(0deg); }
            50% { transform: scaleX(-1) rotate(-3deg); }
        }

        .signature-block {
            margin-top: 1.5vh;
            text-align: center;
        }

        .name-text { 
            font-size: 2vw; /* 字体大小随视口缩放 */
            min-font-size: 1.2rem;
            font-weight: bold; 
            color: #000; 
            text-transform: uppercase;
        }

        /* 3. 底部大尺寸胶囊按钮 */
        .nav-tabs {
            margin-top: 6vh;
            display: flex; gap: 2vw;
            z-index: 30;
        }

        .tab {
            border: 2px solid #000;
            border-radius: 50px; 
            padding: 1.2vh 3.5vw;
            text-decoration: none;
            color: #000;
            font-weight: bold;
            font-size: 1.3vw; 
            background: #fff;
            transition: 0.2s;
            text-transform: uppercase;
            white-space: nowrap;
        }
        .tab:hover { background: #000; color: #fff; }

        /* 星星特效（修复层级） */
        .sparkle {
            position: absolute; width: 35px; height: 35px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 576 512"><path d="M316.9 18C311.6 7 300.4 0 288.1 0s-23.4 7-28.8 18L195 150.3 51.4 171.5c-12 1.8-22 10.2-25.7 21.7s-.7 24.2 7.9 32.7L137.8 329 113.2 474.7c-2 12 3 24.2 12.9 31.3s23 8 33.8 2.3l128.3-68.5 128.3 68.5c10.8 5.7 23.9 4.8 33.8-2.3s14.9-19.3 12.9-31.3L438.5 329 542.7 225.9c8.6-8.5 11.7-21.2 7.9-32.7s-13.7-19.9-25.7-21.7L381.2 150.3 316.9 18z" fill="%23FFD700"/></svg>') no-repeat center/contain;
            pointer-events: none; animation: burst 0.8s ease-out forwards; z-index: 2000;
        }
        @keyframes burst {
            0% { transform: scale(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: scale(1.5) translate(var(--dx), var(--dy)); opacity: 0; }
        }

        /* 手机端适配：垂直重排 */
        @media (max-width: 768px) {
            .wuhu-bg-layer { opacity: 0.3; }
            .animal-img { width: 75vw; }
            .banana-img { width: 15vw; }
            .name-text { font-size: 5vw; }
            .nav-tabs { flex-direction: column; gap: 1.5vh; width: 75%; }
            .tab { font-size: 1.2rem; width: 100%; text-align: center; }
        }
    </style>
</head>
<body>

    <div class="viewport-wrapper">
        <div class="wuhu-bg-layer">
            <span class="wuhu-item t1">wuhuwuhulala</span>
            <span class="wuhu-item t2">wuhuwuhu</span>
            <span class="wuhu-item t3">wuhulala</span>
            <span class="wuhu-item t4">wuhuwuhu</span>
            <span class="wuhu-item t5">wuhu!</span>
        </div>

        <div class="main-center-module">
            <div class="animal-container">
                <img id="giraffe" class="animal-img" onclick="clickGiraffe(event)" src="1.png">
                <img src="banana.png" class="banana-img">
            </div>
            <div class="signature-block">
                <p class="name-text">Portfolio BY QI JIANG</p>
            </div>
        </div>

        <div class="nav-tabs">
            <a href="visual.html" class="tab">Visual Art</a>
            <a href="digital.html" class="tab">3D Creation</a>
            <a href="new-media.html" class="tab">New Media</a>
        </div>
    </div>

<script>
    function clickGiraffe(e) {
        const img = document.getElementById('giraffe');
        img.classList.remove('active');
        void img.offsetWidth; // 触发重绘
        img.classList.add('active');

        const x = e.clientX || (e.touches && e.touches[0].clientX);
        const y = e.clientY || (e.touches && e.touches[0].clientY);

        for(let i=0; i<10; i++) {
            createStar(x, y);
        }
    }

    function createStar(x, y) {
        const star = document.createElement('div');
        star.className = 'sparkle';
        const dx = (Math.random() - 0.5) * 200 + 'px';
        const dy = (Math.random() - 0.5) * 200 + 'px';
        star.style.setProperty('--dx', dx);
        star.style.setProperty('--dy', dy);
        star.style.left = (x - 15) + 'px';
        star.style.top = (y - 15) + 'px';
        document.body.appendChild(star);
        setTimeout(() => star.remove(), 800);
    }

    // 全屏 ESC 退出修复
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            if (document.fullscreenElement || document.webkitFullscreenElement) {
                (document.exitFullscreen || document.webkitExitFullscreen).call(document);
            }
        }
    });
</script>
</body>
</html>
