<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qi Jiang | Portfolio</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

<div class="cargo-canvas">

    <div class="wuhu-scatter">
        <div class="line-1">wuhuwuhuwuhu</div>
        <div class="line-2">wuhuwuhuwuhu</div>
        <div class="line-3">wuhuwuhuwuhu</div>
        <div class="line-4">wuhuwuhuwuhu</div>
        <div class="line-5">wuhuwuhuwuhu</div>
        <div class="line-6">wuhuhulalaaal</div>
    </div>

    <div class="signature-wrap">
        <div class="portfolio-title">Portfolio</div>
        
        <img class="animal-img" id="giraffe" onclick="playBounce()" src="https://freight.cargo.site/t/original/i/R2827857287254243483226718341063/1.png" tabindex="-1">
        
        <div class="signature-text" style="font-size: 3.5rem; font-weight: bold; margin-top:15px;">BY QI JIANG</div>
    </div>

    <div class="tab-container">
        <a class="tab-link" href="#">Visual Art &amp; Illustration</a>
        <a class="tab-link" href="#">Digital Image &amp; 3D Creation</a>
        <a class="tab-link" href="#">New Media Art &amp; Installation</a>
    </div>

</div>

<script>
function playBounce() {
    const el = document.getElementById('giraffe');
    el.classList.remove('active');
    void el.offsetWidth; 
    el.classList.add('active');
    setTimeout(() => { el.classList.remove('active'); }, 450);
}
</script>
