<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Portfolio | QI JIANG</title>
    <style>
        @import url('https://fonts.font.im/css2?family=Gochi+Hand&display=swap');

        * { font-family: 'Gochi Hand', cursive !important; box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0; 
            background-color: #ffffff; /* 纯白背景 */
            width: 100%; height: 100%;
            overflow: hidden;
        }

        /* 1. 背景文字：仿手写 HAHA 风格 */
        .wuhu-bg-layer {
            position: absolute;
            left: 5%; top: 10%;
            z-index: 1;
            pointer-events: none;
        }

        .wuhu-item {
            display: block;
            font-size: 4.5rem;
            line-height: 0.85;
            color: #000;
            letter-spacing: -2px;
            animation: drift 4s infinite ease-in-out;
            transform-origin: left;
        }

        .t1 { animation-delay: 0s; }
        .t2 { animation-delay: 0.2s; margin-left: 10px; }
        .t3 { animation-delay: 0.4s; }
        .t4 { animation-delay: 0.6s; margin-left: -5px; }

        @keyframes drift {
            0%, 100% { transform: skew(0deg); }
            50% { transform: skew(-2deg) translateX(5px); }
        }

        /* 2. 主内容区域：长颈鹿位于右侧偏中 */
        .main-content {
            position: absolute;
            right: 15%; top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        .animal-img {
            width: 450px;
            cursor: pointer;
            transform: scaleX(-1); /* 面朝右 */
            transition: 0.3s;
            -webkit-user-drag: none;
        }

        .animal-img.active { animation: shake 0.4s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: scaleX(-1) rotate(0deg); }
            50% { transform: scaleX(-1) rotate(-3deg); }
        }

        /* 签名文字：仿署名风格 */
        .signature-block {
            margin-top: -10px;
            text-align: center;
        }

        .name-text { 
            font-size: 2.2rem; 
            font-weight: bold; 
            color: #000; 
            text-transform: uppercase;
        }

        /* 3. 底部胶囊按钮 */
        .nav-tabs {
            position: absolute;
            bottom: 8%; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 15px;
            z-index: 30;
        }

        .tab {
            border: 2px solid #000;
            border-radius: 30px; /* 胶囊形状 */
            padding: 8px 25px;
            text-decoration: none;
            color: #000;
            font-weight: bold;
            font-size: 1.1rem;
            background: #fff;
            transition: 0.2s;
            text-transform: uppercase;
        }
        .tab:hover { background: #000; color: #fff; }

        /* 星星特效 */
        .sparkle {
            position: absolute; width: 30px; height: 30px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 576 512"><path d="M316.9 18C311.6 7 300.4 0 288.1 0s-23.4 7-28.8 18L195 150.3 51.4 171.5c-12 1.8-22 10.2-25.7 21.7s-.7 24.2 7.9 32.7L137.8 329 113.2 474.7c-2 12 3 24.2 12.9 31.3s23 8 33.8 2.3l128.3-68.5 128.3 68.5c10.8 5.7 23.9 4.8 33.8-2.3s14.9-19.3 12.9-31.3L438.5 329 542.7 225.9c8.6-8.5 11.7-21.2 7.9-32.7s-13.7-19.9-25.7-21.7L381.2 150.3 316.9 18z" fill="%23FFD700"/></svg>') no-repeat center/contain;
            pointer-events: none; animation: burst 0.8s ease-out forwards; z-index: 2000;
        }
        @keyframes burst {
            0% { transform: scale(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: scale(1.5) translate(var(--dx), var(--dy)); opacity: 0; }
        }

        @media (max-width: 768px) {
            .wuhu-bg-layer { opacity: 0.4; transform: scale(0.7); }
            .main-content { right: 0; left: 0; align-items: center; }
            .animal-img { width: 70vw; }
            .nav-tabs { flex-direction: column; width: 60%; align-items: center; }
            .tab { width: 100%; text-align: center; }
        }
    </style>
</head>
<body>

    <div class="wuhu-bg-layer">
        <span class="wuhu-item t1">wuhuwuhulala</span>
        <span class="wuhu-item t2">wuhuwuhu</span>
        <span class="wuhu-item t3">wuhulala</span>
        <span class="wuhu-item t4">lalalala</span>
    </div>

    <div class="main-content">
        <img id="giraffe" class="animal-img" onclick="clickGiraffe(event)" src="1.png">
        <div class="signature-block">
            <p class="name-text">Portfolio BY QI JIANG</p>
        </div>
    </div>

    <div class="nav-tabs">
        <a href="visual.html" class="tab">Visual Art</a>
        <a href="digital.html" class="tab">3D Creation</a>
        <a href="new-media.html" class="tab">New Media</a>
    </div>

<script>
    function clickGiraffe(e) {
        const img = document.getElementById('giraffe');
        img.classList.remove('active');
        void img.offsetWidth;
        img.classList.add('active');
        const x = e.clientX || (e.touches && e.touches[0].clientX);
        const y = e.clientY || (e.touches && e.touches[0].clientY);
        for(let i=0; i<8; i++) createStar(x, y);
    }
    function createStar(x, y) {
        const star = document.createElement('div');
        star.className = 'sparkle';
        const dx = (Math.random() - 0.5) * 200 + 'px';
        const dy = (Math.random() - 0.5) * 200 + 'px';
        star.style.setProperty('--dx', dx);
        star.style.setProperty('--dy', dy);
        star.style.left = (x - 15) + 'px';
        star.style.top = (y - 15) + 'px';
        document.body.appendChild(star);
        setTimeout(() => star.remove(), 800);
    }
</script>
</body>
</html>
