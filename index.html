<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Portfolio | QI JIANG</title>
    <style>
        /* 1. 强制应用圆润手写字体 Gochi Hand */
        @import url('https://fonts.googleapis.com/css2?family=Gochi+Hand&display=swap');

        * {
            font-family: 'Gochi Hand', cursive !important;
            box-sizing: border-box;
        }

        body, html {
            margin: 0 !important;
            padding: 0 !important;
            overflow: hidden !important;
            background-color: #ffffff;
            width: 100vw;
            height: 100vh;
        }

        /* 主画布布局 */
        .cargo-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        /* 2. 背景文字散射动画 */
        .wuhu-scatter {
            position: absolute;
            left: 10% !important;
            top: 15% !important;
            pointer-events: none;
            opacity: 0.6;
        }

        .wuhu-scatter div {
            display: block !important;
            animation: delicateTwinkle 2.5s infinite ease-in-out !important;
        }

        @keyframes delicateTwinkle {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(1.5px, -1px); }
            50% { transform: translate(-1px, 1.5px); }
        }

        /* 不同行文字的尺寸和位置偏离 */
        .line-1 { font-size: 3.2rem; transform: translate(10px, 0); animation-duration: 2s !important; }
        .line-2 { font-size: 4.8rem; transform: translate(140px, -20px); animation-duration: 2.8s !important; }
        .line-3 { font-size: 2.8rem; transform: translate(30px, 10px); animation-duration: 2.3s !important; opacity: 0.7; }
        .line-4 { font-size: 5.8rem; transform: translate(220px, 25px); animation-duration: 3.2s !important; font-weight: bold; }
        .line-5 { font-size: 3.8rem; transform: translate(-10px, 50px); animation-duration: 2.6s !important; }
        .line-6 { font-size: 8.5rem; transform: translate(260px, 70px); animation-duration: 3.8s !important; letter-spacing: 6px; }

        /* 3. 长颈鹿容器：作为星星产生时的定位锚点 */
        .signature-wrap {
            position: absolute;
            bottom: 20%;
            right: 12% !important;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 长颈鹿图片样式与点击晃动动画 */
        .animal-img {
            width: 420px;
            cursor: pointer;
            transform: rotate(2deg);
            transition: transform 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            -webkit-user-drag: none; /* 防止图片被拖拽 */
        }

        @keyframes bounceOnce {
            0% { transform: scale(1) rotate(2deg); }
            30% { transform: scale(1.08) rotate(-3deg); }
            100% { transform: scale(1) rotate(2deg); }
        }
        
        /* 当长颈鹿拥有 .active 类时执行点击晃动动画 */
        .animal-img.active { animation: bounceOnce 0.45s !important; }

        /* 4. 底部导航标签风格 */
        .tab-container {
            position: absolute;
            bottom: 6%;
            display: flex;
            gap: 25px;
        }

        .tab-link {
            border: 3.5px solid #000;
            border-radius: 90px;
            padding: 15px 40px;
            text-decoration: none;
            color: #000;
            font-weight: bold;
            font-size: 1.6rem;
            text-transform: uppercase;
            background: white;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* 底部按钮悬停效果 */
        .tab-link:hover {
            background: #000;
            color: #fff;
            transform: translateY(-5px) scale(1.03);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* 5. 核心修改：闪闪星星 (Sparkles) 样式与动画 */
        .sparkle-container {
            position: absolute;
            pointer-events: none; /* 不会遮挡点击 */
            z-index: 1000;
        }

        .sparkle {
            position: absolute;
            background-color: transparent;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 576 512"><path d="M316.9 18C311.6 7 300.4 0 288.1 0s-23.4 7-28.8 18L195 150.3 51.4 171.5c-12 1.8-22 10.2-25.7 21.7s-.7 24.2 7.9 32.7L137.8 329 113.2 474.7c-2 12 3 24.2 12.9 31.3s23 8 33.8 2.3l128.3-68.5 128.3 68.5c10.8 5.7 23.9 4.8 33.8-2.3s14.9-19.3 12.9-31.3L438.5 329 542.7 225.9c8.6-8.5 11.7-21.2 7.9-32.7s-13.7-19.9-25.7-21.7L381.2 150.3 316.9 18z" fill="%23ffd700"/></svg>'); /* 使用金色 SVG 星星图片 */
            background-size: contain;
            background-repeat: no-repeat;
            /* 漂浮与渐隐动画 */
            animation: sparkleFloat 1.2s ease-out forwards;
        }

        @keyframes sparkleFloat {
            0% { transform: scale(0) rotate(0deg); opacity: 0; }
            30% { transform: scale(1) rotate(10deg); opacity: 1; }
            100% { transform: scale(0) rotate(20deg); opacity: 0; }
        }
    </style>
</head>
<body>

<div class="cargo-canvas">
    <div class="wuhu-scatter">
        <div class="line-1">wuhuwuhuwuhu</div>
        <div class="line-2">wuhuwuhuwuhu</div>
        <div class="line-3">wuhuwuhuwuhu</div>
        <div class="line-4">wuhuwuhuwuhu</div>
        <div class="line-5">wuhuwuhuwuhu</div>
        <div class="line-6">wuhuhulalaaal</div>
    </div>

    <div class="signature-wrap">
        <div style="font-size:3.8rem; font-weight:bold; margin-bottom:15px; color:#000;">Portfolio</div>
        <img class="animal-img" id="giraffe" onclick="giraffeClicked()" src="https://freight.cargo.site/t/original/i/R2827857287254243483226718341063/1.png" alt="Interactive Giraffe Illustration">
        <div style="font-size:3.8rem; font-weight:bold; margin-top:15px; color:#000;">BY QI JIANG</div>
        
        <div id="head-anchor" style="position:absolute; top:80px; left:210px; width:1px; height:1px;"></div>
    </div>

    <div class="tab-container">
        <a class="tab-link" href="visual.html">Visual Art & Illustration</a>
        <a class="tab-link" href="digital.html">Digital Image & 3D Creation</a>
        <a class="tab-link" href="new-media.html">New Media Art & Installation</a>
    </div>
</div>

<script>
    function giraffeClicked() {
        // 1. 触发点击晃动动画
        const el = document.getElementById('giraffe');
        el.classList.remove('active');
        void el.offsetWidth; // 触发重绘
        el.classList.add('active');
        
        // 2. 触发星星闪烁效果
        createSparkles();
    }

    function createSparkles() {
        // 定位长颈鹿头部的锚点
        const anchor = document.getElementById('head-anchor');
        
        // 每次点击产生 8 颗星星
        const sparkleCount = 8;
        
        for (let i = 0; i < sparkleCount; i++) {
            const sparkle = document.createElement('div');
            sparkle.classList.add('sparkle');
            
            // 核心修改：设置星星的随机尺寸和位置偏离 (在头部周围)
            const size = Math.random() * 25 + 15; // 15px - 40px
            const offsetLeft = (Math.random() - 0.5) * 120; // -60px 到 +60px 之间随机偏离
            const offsetTop = (Math.random() - 0.5) * 80;   // -40px 到 +40px 之间随机偏离
            const delay = Math.random() * 0.2; // 0s 到 0.2s 延迟产生
            
            sparkle.style.width = size + 'px';
            sparkle.style.height = size + 'px';
            sparkle.style.left = offsetLeft + 'px';
            sparkle.style.top = offsetTop + 'px';
            sparkle.style.animationDelay = delay + 's';
            
            // 将星星加入长颈鹿头部的定位容器中
            anchor.appendChild(sparkle);
            
            // 动画结束后（1.2s后）自动移除星星，防止页面元素过多
            setTimeout(() => {
                sparkle.remove();
            }, 1200);
        }
    }
</script>

</body>
</html>
