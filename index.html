<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Portfolio | QI JIANG</title>
    <style>
        @import url('https://fonts.font.im/css2?family=Gochi+Hand&display=swap');

        * { font-family: 'Gochi Hand', cursive !important; box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0; 
            background-color: #ffffff;
            width: 100%; height: 100%;
            overflow: hidden;
        }

        /* 1. 背景文字：极端零散分布 */
        .wuhu-bg-layer {
            position: absolute;
            top: 0; left: 0;
            width: 50%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .wuhu-item {
            position: absolute;
            white-space: nowrap;
            color: #000;
            animation: drift 5s infinite ease-in-out;
        }

        .t1 { top: 8%; left: 5%; font-size: 6rem; transform: rotate(-12deg); }
        .t2 { top: 25%; left: 28%; font-size: 4rem; transform: rotate(8deg); }
        .t3 { top: 55%; left: 2%; font-size: 7.5rem; transform: rotate(-5deg); font-weight: bold; }
        .t4 { top: 15%; left: 55%; font-size: 3.5rem; transform: rotate(18deg); opacity: 0.7; }
        .t5 { top: 75%; left: 15%; font-size: 5rem; transform: rotate(-10deg); }
        .t6 { top: 40%; left: 45%; font-size: 2.8rem; transform: rotate(25deg); }
        .t7 { top: 85%; left: 35%; font-size: 4rem; transform: rotate(-3deg); }

        @keyframes drift {
            0%, 100% { transform: translate(0, 0) rotate(var(--r, 0deg)); }
            50% { transform: translate(12px, -12px) rotate(calc(var(--r, 0deg) + 2deg)); }
        }

        /* 2. 主内容区域：长颈鹿、签名与香蕉 */
        .main-content {
            position: absolute;
            right: 12%; top: 48%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        .animal-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .animal-img {
            width: 480px;
            cursor: pointer;
            transform: scaleX(-1);
            transition: 0.3s;
            -webkit-user-drag: none;
            z-index: 15;
        }

        /* 核心修改：香蕉图片定位在长颈鹿脚边 */
        .banana-img {
            position: absolute;
            bottom: 10px; /* 调整至脚边位置 */
            right: 20px;
            width: 80px; /* 适中的大小 */
            transform: rotate(15deg);
            z-index: 16;
            pointer-events: none; /* 防止干扰长颈鹿点击 */
            -webkit-user-drag: none;
        }

        .animal-img.active { animation: shake 0.4s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: scaleX(-1) rotate(0deg); }
            50% { transform: scaleX(-1) rotate(-3deg); }
        }

        .signature-block {
            margin-top: 5px;
            text-align: center;
        }

        .name-text { 
            font-size: 2.4rem; 
            font-weight: bold; 
            color: #000; 
            text-transform: uppercase;
        }

        /* 3. 底部大尺寸胶囊按钮 */
        .nav-tabs {
            position: absolute;
            bottom: 8%; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 20px;
            z-index: 30;
        }

        .tab {
            border: 3px solid #000;
            border-radius: 40px; 
            padding: 12px 35px;
            text-decoration: none;
            color: #000;
            font-weight: bold;
            font-size: 1.5rem;
            background: #fff;
            transition: 0.2s;
            text-transform: uppercase;
            box-shadow: 0 4px 0 #000;
        }
        .tab:hover { background: #000; color: #fff; transform: translateY(-3px); box-shadow: 0 6px 0 #000; }

        /* 星星特效 */
        .sparkle {
            position: absolute; width: 40px; height: 40px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 576 512"><path d="M316.9 18C311.6 7 300.4 0 288.1 0s-23.4 7-28.8 18L195 150.3 51.4 171.5c-12 1.8-22 10.2-25.7 21.7s-.7 24.2 7.9 32.7L137.8 329 113.2 474.7c-2 12 3 24.2 12.9 31.3s23 8 33.8 2.3l128.3-68.5 128.3 68.5c10.8 5.7 23.9 4.8 33.8-2.3s14.9-19.3 12.9-31.3L438.5 329 542.7 225.9c8.6-8.5 11.7-21.2 7.9-32.7s-13.7-19.9-25.7-21.7L381.2 150.3 316.9 18z" fill="%23FFD700"/></svg>') no-repeat center/contain;
            pointer-events: none; animation: burst 0.8s ease-out forwards; z-index: 2000;
        }
        @keyframes burst {
            0% { transform: scale(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: scale(1.5) translate(var(--dx), var(--dy)); opacity: 0; }
        }

        @media (max-width: 850px) {
            .wuhu-bg-layer { opacity: 0.4; transform: scale(0.8); }
            .main-content { right: 0; left: 0; align-items: center; top: 45%; }
            .animal-img { width: 80vw; }
            .banana-img { width: 15vw; bottom: 5px; right: 10px; }
            .nav-tabs { flex-direction: column; width: 75%; align-items: center; bottom: 5%; }
            .tab { width: 100%; text-align: center; font-size: 1.3rem; }
        }
    </style>
</head>
<body>

    <div class="wuhu-bg-layer">
        <span class="wuhu-item t1">wuhuwuhulala</span>
        <span class="wuhu-item t2">wuhuwuhu</span>
        <span class="wuhu-item t3">wuhulala</span>
        <span class="wuhu-item t4">lalala</span>
        <span class="wuhu-item t5">wuhuwuhu</span>
        <span class="wuhu-item t6">wuhu!</span>
        <span class="wuhu-item t7">wuhulalaal</span>
    </div>

    <div class="main-content">
        <div class="animal-wrapper">
            <img id="giraffe" class="animal-img" onclick="clickGiraffe(event)" src="1.png">
            <img src="banana.png" class="banana-img">
        </div>
        <div class="signature-block">
            <p class="name-text">Portfolio BY QI JIANG</p>
        </div>
    </div>

    <div class="nav-tabs">
        <a href="visual.html" class="tab">Visual Art</a>
        <a href="digital.html" class="tab">3D Creation</a>
        <a href="new-media.html" class="tab">New Media</a>
    </div>

<script>
    function clickGiraffe(e) {
        const img = document.getElementById('giraffe');
        img.classList.remove('active');
        void img.offsetWidth;
        img.classList.add('active');
        const x = e.clientX || (e.touches && e.touches[0].clientX);
        const y = e.clientY || (e.touches && e.touches[0].clientY);
        for(let i=0; i<10; i++) createStar(x, y);
    }
    function createStar(x, y) {
        const star = document.createElement('div');
        star.className = 'sparkle';
        const dx = (Math.random() - 0.5) * 200 + 'px';
        const dy = (Math.random() - 0.5) * 200 + 'px';
        star.style.setProperty('--dx', dx);
        star.style.setProperty('--dy', dy);
        star.style.left = (x - 20) + 'px';
        star.style.top = (y - 20) + 'px';
        document.body.appendChild(star);
        setTimeout(() => star.remove(), 800);
    }
</script>
</body>
</html>
