<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Portfolio | QI JIANG</title>
    <style>
        /* 使用国内镜像字体加速加载 */
        @import url('https://fonts.font.im/css2?family=Gochi+Hand&display=swap');

        * { font-family: 'Gochi Hand', cursive !important; box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0; 
            /* 核心修改：回归纯白背景 */
            background-color: #ffffff; 
            width: 100%; height: 100%;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        .viewport-wrapper {
            position: relative;
            width: 100vw; height: 100vh;
            max-width: 1920px; margin: 0 auto;
        }

        /* 1. 背景线条：颜色调整为纯黑色，并允许点击 */
        .flower-bg-layer {
            position: absolute;
            top: 0; left: 0;
            width: 50vw; height: 100vh;
            z-index: 5; /* 确保层级高于星星，低于长颈鹿 */
            pointer-events: auto; 
            cursor: pointer;
        }

        .flower-svg {
            width: 100%; height: 100%;
            opacity: 0.6; /* 保持半透明 */
        }

        /* 核心修改：重新设计的主干与分枝路径（黑色） */
        .flower-path {
            fill: none;
            stroke: #000000; /* 纯黑色线条 */
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 2000;
            stroke-dashoffset: 2000;
            /* 生长动画 + 摇曳动画 */
            animation: growLine 7s ease-in-out forwards;
        }

        /* 摇曳动画，增加呼吸感 */
        .sway-group {
            animation: sway 6s infinite ease-in-out;
            transform-origin: bottom left;
        }

        @keyframes growLine { to { stroke-dashoffset: 0; } }
        @keyframes sway {
            0%, 100% { transform: rotate(0deg) scale(1); }
            50=deg) scale(1.01) translateX(5px); }
        }

        /* 2. 主内容区域：长颈鹿靠右，文字靠左 */
        .main-content {
            position: absolute;
            right: 5vw; top: 45%;
            transform: translateY(-50%);
            display: flex; align-items: flex-end;
            gap: 3vw; z-index: 10;
        }

        .text-block { text-align: right; margin-bottom: 5vh; }
        .title-text { font-size: 6vw; font-weight: bold; margin: 0; line-height: 1; color: #000; }
        .name-text { font-size: 4vw; font-weight: bold; margin: 1vh 0 0 0; line-height: 1; color: #000; }

        /* 核心修改：长颈鹿恢复体型，面朝左，且允许点击 */
        .animal-img {
            width: 700px; /* 极致放大 */
            cursor: pointer; 
            transform: scaleX(-1) rotate(2deg);
            transition: 0.3s; -webkit-user-drag: none;
            position: relative;
            z-index: 15;
            pointer-events: auto; /* 核心修改：确保图片能接收点击 */
        }

        /* 核心修复：长颈鹿点击晃动动画 */
        .animal-img.active { animation: shakeLeft 0.4s ease-in-out; }
        @keyframes shakeLeft {
            0%, 100% { transform: scaleX(-1) rotate(2deg); }
            50% { transform: scaleX(-1) scale(1.03) rotate(-1.5deg); }
        }

        /* 3. 底部导航保持不变 */
        .nav-tabs {
            position: absolute; bottom: 8vh; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 2vw; z-index: 20;
        }

        .tab {
            border: 0.4vw solid #000; border-radius: 100px;
            padding: 1.5vh 3.5vw; text-decoration: none;
            color: #000; font-weight: bold; font-size: 1.8vw;
            background: #fff; transition: 0.3s; white-space: nowrap;
            box-shadow: 0 0.5vh 0 #000;
        }
        .tab:hover { background: #000; color: #fff; transform: translateY(-0.5vh); box-shadow: 0 0.8vh 0 #000; }

        /* 4. 点击生成的线条小花样式：纯黑色 */
        .click-flower {
            position: absolute;
            width: 80px; height: 80px;
            pointer-events: none;
            z-index: 1000;
            /* 漂浮淡出动画 */
            animation: flowerPop 2.5s ease-out forwards;
        }

        .click-flower path {
            fill: none;
            stroke: #000000; /* 纯黑色线条小花 */
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
            /* 生长动画设置 */
            stroke-dasharray: 200;
            stroke-dashoffset: 200;
            animation: growMini 1.2s ease-out forwards;
        }

        @keyframes growMini { to { stroke-dashoffset: 0; } }

        @keyframes flowerPop {
            0% { transform: scale(0.3) translateY(0); opacity: 0; }
            15% { transform: scale(1) translateY(-10px); opacity: 1; }
            80% { opacity: 1; }
            100% { transform: scale(0.9) translateY(-40px); opacity: 0; }
        }

        /* 星星特效（保留并校对层级） */
        .sparkle {
            position: absolute; width: 40px; height: 40px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 576 512"><path d="M316.9 18C311.6 7 300.4 0 288.1 0s-23.4 7-28.8 18L195 150.3 51.4 171.5c-12 1.8-22 10.2-25.7 21.7s-.7 24.2 7.9 32.7L137.8 329 113.2 474.7c-2 12 3 24.2 12.9 31.3s23 8 33.8 2.3l128.3-68.5 128.3 68.5c10.8 5.7 23.9 4.8 33.8-2.3s14.9-19.3 12.9-31.3L438.5 329 542.7 225.9c8.6-8.5 11.7-21.2 7.9-32.7s-13.7-19.9-25.7-21.7L381.2 150.3 316.9 18z" fill="%23FFD700"/></svg>') no-repeat center/contain;
            pointer-events: none; animation: burst 0.8s ease-out forwards; z-index: 2000; /* 星星要在最最上层 */
        }
        @keyframes burst {
            0% { transform: scale(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: scale(1.5) translate(var(--dx), var(--dy)) rotate(45deg); opacity: 0; }
        }

        /* 手机端适配 */
        @media (max-width: 768px) {
            .flower-bg-layer { width: 100vw; opacity: 0.4; pointer-events: auto; }
            .main-content { flex-direction: column; align-items: center; right: 0; left: 0; top: 40%; gap: 5vh; }
            .text-block { text-align: center; }
            .animal-img { width: 85vw; }
            .title-text { font-size: 15vw; }
            .name-text { font-size: 8vw; }
            .nav-tabs { flex-direction: column; bottom: 5vh; gap: 12px; width: 80%; }
            .tab { font-size: 1.2rem; padding: 12px 0; width: 100%; text-align: center; border-width: 3px; }
        }
    </style>
</head>
<body>

    <div class="viewport-wrapper">
        <div class="flower-bg-layer" onclick="clickFlowerLine(event)">
            <svg class="flower-svg" viewBox="0 0 500 1000" preserveAspectRatio="xMinYMax meet">
                <g class="sway-group">
                    <path class="flower-path" d="M50,1000 C150,850 50,700 120,500 C180,350 100,200 150,50" />
                    <path class="flower-path" style="animation-delay: 0.5s;" d="M90,720 Q180,700 200,620" />
                    <circle cx="200" cy="620" r="3" fill="#000" class="flower-path" style="animation-delay: 1.2s; fill-opacity: 0.5;" />
                    <path class="flower-path" style="animation-delay: 1s;" d="M125,510 Q40,450 60,350" />
                    <path class="flower-path" style="animation-delay: 1.5s;" d="M140,380 Q220,350 200,250" />
                    <circle cx="200" cy="250" r="4" fill="#000" class="flower-path" style="animation-delay: 2.2s; fill-opacity: 0.5;" />
                    <path class="flower-path" style="animation-delay: 2s;" d="M150,150 Q200,120 180,80" />
                </g>
            </svg>
        </div>

        <div class="main-content">
            <div class="text-block">
                <p class="title-text">Portfolio</p>
                <p class="name-text">BY QI JIANG</p>
            </div>
            <div class="giraffe-wrap">
                <img id="giraffe" class="animal-img" onclick="clickGiraffe(event)" src="1.png">
            </div>
        </div>

        <div class="nav-tabs">
            <a href="visual.html" class="tab">Visual Art</a>
            <a href="digital.html" class="tab">3D Creation</a>
            <a href="new-media.html" class="tab">New Media</a>
        </div>
    </div>

<script>
    // 1. 修复长颈鹿点击交互
    function clickGiraffe(e) {
        const img = document.getElementById('giraffe');
        
        // A. 晃动动画
        img.classList.remove('active');
        void img.offsetWidth; // 触发重绘
        img.classList.add('active');

        // B. 金色星星特效
        // 获取点击坐标（适配 PC 和 手机）
        const x = e.clientX || (e.touches && e.touches[0].clientX);
        const y = e.clientY || (e.touches && e.touches[0].clientY);

        for(let i=0; i<10; i++) {
            createStar(x, y);
        }
    }

    // 2. 修复点击线条开花交互
    function clickFlowerLine(e) {
        const x = e.clientX || (e.touches && e.touches[0].clientX);
        const y = e.clientY || (e.touches && e.touches[0].clientY);
        createFlower(x, y);
    }

    function createStar(x, y) {
        const star = document.createElement('div');
        star.className = 'sparkle';
        const dx = (Math.random() - 0.5) * 200 + 'px';
        const dy = (Math.random() - 0.5) * 200 + 'px';
        star.style.setProperty('--dx', dx);
        star.style.setProperty('--dy', dy);
        star.style.left = (x - 20) + 'px';
        star.style.top = (y - 20) + 'px';
        document.body.appendChild(star);
        setTimeout(() => star.remove(), 800);
    }

    function createFlower(x, y) {
        const flower = document.createElement('div');
        flower.className = 'click-flower';
        flower.style.left = (x - 40) + 'px';
        flower.style.top = (y - 40) + 'px';

        const svgHTML = `
            <svg viewBox="0 0 100 100">
                <path d="M50,90 Q40,70 50,50" />
                <path d="M50,50 Q65,30 80,45 T70,60 Z" />
                <path d="M50,50 Q35,30 20,45 T30,60 Z" />
                <path d="M50,50 Q50,25 70,25 T50,10 T30,25 T50,50 Z" />
            </svg>
        `;
        flower.innerHTML = svgHTML;
        document.body.appendChild(flower);
        setTimeout(() => flower.remove(), 2500);
    }
</script>

</body>
</html>
