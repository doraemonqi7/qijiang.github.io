<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Portfolio | QI JIANG</title>
    <style>
        /* 使用国内镜像字体加速加载 */
        @import url('https://fonts.font.im/css2?family=Gochi+Hand&display=swap');

        * { font-family: 'Gochi Hand', cursive !important; box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0; 
            background-color: #ffffff;
            width: 100%; height: 100%;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        .viewport-wrapper {
            position: relative;
            width: 100vw; height: 100vh;
            max-width: 1920px; margin: 0 auto;
        }

        /* 1. 核心修复：花线条背景（替代原 wuhu 文字，允许点击） */
        .flower-bg-layer {
            position: absolute;
            top: 0; left: 0;
            width: 50vw; /* 占据左侧视口区域 */
            height: 100vh;
            z-index: 5; /* 确保层级高于星星，低于长颈鹿 */
            /* 核心修改：允许线条接收点击事件 */
            pointer-events: auto; 
            cursor: pointer;
        }

        .flower-svg {
            width: 100%; height: 100%;
            opacity: 0.6; /* 保持半透明 */
        }

        .flower-path {
            fill: none;
            stroke: #ffb7b7; /* --- 核心修改：符合整体风格的莫兰迪粉 --- */
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 1200;
            stroke-dashoffset: 1200;
            /* 生长动画 + 摇曳动画 */
            animation: growLine 6s ease-in-out forwards, sway 5s infinite ease-in-out;
            transform-origin: bottom left;
        }

        @keyframes growLine { to { stroke-dashoffset: 0; } }
        @keyframes sway {
            0%, 100% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(1.5deg) scale(1.02) translateX(1vw); }
        }

        /* 2. 主内容区域：保持原有的自适应缩放 */
        .main-content {
            position: absolute;
            right: 5vw; top: 45%;
            transform: translateY(-50%);
            display: flex; align-items: flex-end;
            gap: 3vw; z-index: 10;
        }

        .text-block { text-align: right; margin-bottom: 5vh; }
        .title-text { font-size: 6vw; font-weight: bold; margin: 0; line-height: 1; color: #000; }
        .name-text { font-size: 4vw; font-weight: bold; margin: 1vh 0 0 0; line-height: 1; color: #000; }

        .animal-img {
            width: 45vw; max-width: 800px;
            /* 核心修改：去掉 cursor: pointer，长颈鹿不再工作 */
            cursor: default; 
            transform: scaleX(-1) rotate(2deg);
            transition: 0.3s; -webkit-user-drag: none;
            position: relative;
            z-index: 15;
            /* 核心修改：去掉 onclick 事件，长颈鹿不再接收点击 */
            pointer-events: none; 
        }

        /* 3. 底部导航：保持原有的加大效果 */
        .nav-tabs {
            position: absolute; bottom: 8vh; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 2vw; z-index: 20;
        }

        .tab {
            border: 0.4vw solid #000; border-radius: 100px;
            padding: 1.5vh 3.5vw; text-decoration: none;
            color: #000; font-weight: bold; font-size: 1.8vw;
            background: #fff; transition: 0.3s; white-space: nowrap;
            box-shadow: 0 0.5vh 0 #000;
        }
        .tab:hover { background: #000; color: #fff; transform: translateY(-0.5vh); box-shadow: 0 0.8vh 0 #000; }

        /* 4. 点击生成的线条小花样式 */
        .click-flower {
            position: absolute;
            width: 80px; height: 80px;
            pointer-events: none;
            z-index: 1000;
            /* 漂浮淡出动画 */
            animation: flowerPop 2.5s ease-out forwards;
        }

        .click-flower path {
            fill: none;
            stroke: #ffb7b7; /* 符合风格的莫兰迪粉线 */
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
            /* 生长动画设置 */
            stroke-dasharray: 200;
            stroke-dashoffset: 200;
            animation: growMini 1.2s ease-out forwards;
        }

        @keyframes growMini { to { stroke-dashoffset: 0; } }

        @keyframes flowerPop {
            0% { transform: scale(0.3) translateY(0); opacity: 0; }
            15% { transform: scale(1) translateY(-10px); opacity: 1; }
            80% { opacity: 1; }
            100% { transform: scale(0.9) translateY(-40px); opacity: 0; }
        }

        /* 手机端专项适配：改为垂直排列 */
        @media (max-width: 768px) {
            /* 核心修改：手机上也要允许点击线条 */
            .flower-bg-layer { width: 100vw; opacity: 0.4; pointer-events: auto; }
            .main-content { flex-direction: column; align-items: center; right: 0; left: 0; top: 40%; gap: 5vh; }
            .text-block { text-align: center; }
            .animal-img { width: 85vw; }
            .title-text { font-size: 15vw; }
            .name-text { font-size: 8vw; }
            .nav-tabs { flex-direction: column; bottom: 5vh; gap: 12px; width: 80%; }
            .tab { font-size: 1.2rem; padding: 12px 0; width: 100%; text-align: center; border-width: 3px; }
        }
    </style>
</head>
<body>

    <div class="viewport-wrapper">
        <div class="flower-bg-layer" onclick="clickFlowerLine(event)">
            <svg class="flower-svg" viewBox="0 0 400 1000" preserveAspectRatio="xMinYMax meet">
                <path class="flower-path" d="M100,1000 Q250,700 100,450 T150,100 M100,450 Q60,400 40,450 M100,450 Q140,400 160,450 M150,250 Q110,200 90,250 M150,250 Q190,200 210,250" />
            </svg>
        </div>

        <div class="main-content">
            <div class="text-block">
                <p class="title-text">Portfolio</p>
                <p class="name-text">BY QI JIANG</p>
            </div>
            <div class="giraffe-wrap">
                <img class="animal-img" src="1.png">
            </div>
        </div>

        <div class="nav-tabs">
            <a href="visual.html" class="tab">Visual Art</a>
            <a href="digital.html" class="tab">3D Creation</a>
            <a href="new-media.html" class="tab">New Media</a>
        </div>
    </div>

<script>
    // 核心修改：新的点击线条开花函数（适配 PC 和 手机）
    function clickFlowerLine(e) {
        // 获取点击坐标（适配 PC 和 手机）
        const x = e.clientX || (e.touches && e.touches[0].clientX);
        const y = e.clientY || (e.touches && e.touches[0].clientY);

        // 在点击位置生成线条小花
        createFlower(x, y);
    }

    // 创建点击开花 SVG 的函数
    function createFlower(x, y) {
        const flower = document.createElement('div');
        flower.className = 'click-flower';
        // 居中生成小花
        flower.style.left = (x - 40) + 'px';
        flower.style.top = (y - 40) + 'px';

        // 仿手绘风格的线条花路径
        const svgHTML = `
            <svg viewBox="0 0 100 100">
                <path d="M50,90 Q40,70 50,50" />
                <path d="M50,50 Q65,30 80,45 T70,60 Z" />
                <path d="M50,50 Q35,30 20,45 T30,60 Z" />
                <path d="M50,50 Q50,25 70,25 T50,10 T30,25 T50,50 Z" />
            </svg>
        `;
        flower.innerHTML = svgHTML;
        document.body.appendChild(flower);
        
        // 2.5秒后自动清理
        setTimeout(() => flower.remove(), 2500);
    }
</script>

</body>
</html>
