<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Portfolio | QI JIANG</title>
    <style>
        @import url('https://fonts.font.im/css2?family=Gochi+Hand&display=swap');

        * { font-family: 'Gochi Hand', cursive !important; box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0; 
            background-color: #ffffff;
            width: 100%; height: 100%;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        /* 核心响应式容器 */
        .viewport-wrapper {
            position: relative;
            width: 100vw; height: 100vh;
            max-width: 1920px;
            margin: 0 auto;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        /* 1. 背景文字：随视口比例浮动 */
        .wuhu-bg-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .wuhu-item {
            position: absolute;
            white-space: nowrap;
            color: #000;
            animation: drift 5s infinite ease-in-out;
        }

        .t1 { top: 10vh; left: 8vw; font-size: 5vw; transform: rotate(-8deg); }
        .t2 { top: 25vh; left: 22vw; font-size: 3vw; transform: rotate(5deg); opacity: 0.5; }
        .t3 { top: 60vh; left: 5vw; font-size: 8vw; transform: rotate(-3deg); font-weight: bold; }
        .t4 { top: 15vh; left: 50vw; font-size: 3vw; transform: rotate(12deg); }
        .t5 { top: 78vh; left: 18vw; font-size: 4vw; transform: rotate(-5deg); }

        @keyframes drift {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(0.5vw, -0.5vh); }
        }

        /* 2. 核心模块：比例锁定 */
        .main-center-module {
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        .animal-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        .animal-img {
            width: 35vw;
            max-width: 550px;
            min-width: 280px;
            cursor: pointer;
            transform: scaleX(-1);
            transition: 0.3s;
            -webkit-user-drag: none;
        }

        .banana-img {
            position: absolute;
            bottom: 1vh; right: -2vw;
            width: 6vw;
            max-width: 90px;
            transform: rotate(12deg);
            z-index: 11;
        }

        .animal-img.active { animation: shake 0.4s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: scaleX(-1) rotate(0deg); }
            50% { transform: scaleX(-1) rotate(-3deg); }
        }

        .signature-block {
            margin-top: 2vh;
            text-align: center;
        }

        .name-text { 
            font-size: 2.2vw;
            font-weight: bold; 
            color: #000; 
            text-transform: uppercase;
        }

        /* 3. 底部大尺寸胶囊按钮 */
        .nav-tabs {
            margin-top: 5vh;
            display: flex; gap: 2vw;
            z-index: 30;
        }

        .tab {
            border: 2px solid #000;
            border-radius: 50px; 
            padding: 1vh 3vw;
            text-decoration: none;
            color: #000;
            font-weight: bold;
            font-size: 1.4vw;
            background: #fff;
            transition: 0.2s;
            text-transform: uppercase;
            white-space: nowrap;
        }
        .tab:hover { background: #000; color: #fff; }

        /* 星星特效样式 */
        .sparkle {
            position: absolute;
            width: 30px; height: 30px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 576 512"><path d="M316.9 18C311.6 7 300.4 0 288.1 0s-23.4 7-28.8 18L195 150.3 51.4 171.5c-12 1.8-22 10.2-25.7 21.7s-.7 24.2 7.9 32.7L137.8 329 113.2 474.7c-2 12 3 24.2 12.9 31.3s23 8 33.8 2.3l128.3-68.5 128.3 68.5c10.8 5.7 23.9 4.8 33.8-2.3s14.9-19.3 12.9-31.3L438.5 329 542.7 225.9c8.6-8.5 11.7-21.2 7.9-32.7s-13.7-19.9-25.7-21.7L381.2 150.3 316.9 18z" fill="%23FFD700"/></svg>') no-repeat center/contain;
            pointer-events: none;
            animation: burst 0.8s ease-out forwards;
            z-index: 2000; /* 确保在最上层 */
        }
        @keyframes burst {
            0% { transform: scale(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: scale(1.5) translate(var(--dx), var(--dy)) rotate(45deg); opacity: 0; }
        }

        @media (max-width: 768px) {
            .animal-img { width: 70vw; }
            .name-text { font-size: 5vw; }
            .nav-tabs { flex-direction: column; width: 70%; gap: 1.5vh; }
            .tab { font-size: 1.2rem; width: 100%; text-align: center; }
        }
    </style>
</head>
<body>

    <div class="viewport-wrapper">
        <div class="wuhu-bg-layer">
            <span class="wuhu-item t1">wuhuwuhulala</span>
            <span class="wuhu-item t2">wuhuwuhu</span>
            <span class="wuhu-item t3">wuhulala</span>
            <span class="wuhu-item t4">wuhu!</span>
            <span class="wuhu-item t5">wuhuwuhu</span>
        </div>

        <div class="main-center-module">
            <div class="animal-container">
                <img id="giraffe" class="animal-img" onclick="clickGiraffe(event)" src="1.png">
                <img src="banana.png" class="banana-img">
            </div>
            <div class="signature-block">
                <p class="name-text">Portfolio BY QI JIANG</p>
            </div>
        </div>

        <div class="nav-tabs">
            <a href="visual.html" class="tab">Visual Art</a>
            <a href="digital.html" class="tab">3D Creation</a>
            <a href="new-media.html" class="tab">New Media</a>
        </div>
    </div>

<script>
    function clickGiraffe(e) {
        const img = document.getElementById('giraffe');
        
        // 1. 强制重绘，确保连续点击动画生效
        img.classList.remove('active');
        void img.offsetWidth; 
        img.classList.add('active');

        // 2. 获取精准点击位置
        const x = e.clientX || (e.touches && e.touches[0].clientX);
        const y = e.clientY || (e.touches && e.touches[0].clientY);

        // 3. 生成闪动星星
        for(let i=0; i<10; i++) {
            createStar(x, y);
        }
    }

    function createStar(x, y) {
        const star = document.createElement('div');
        star.className = 'sparkle';
        const dx = (Math.random() - 0.5) * 200 + 'px';
        const dy = (Math.random() - 0.5) * 200 + 'px';
        star.style.setProperty('--dx', dx);
        star.style.setProperty('--dy', dy);
        star.style.left = (x - 15) + 'px';
        star.style.top = (y - 15) + 'px';
        document.body.appendChild(star);
        setTimeout(() => star.remove(), 800);
    }

    // 全屏退出修复
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            if (document.fullscreenElement || document.webkitFullscreenElement) {
                (document.exitFullscreen || document.webkitExitFullscreen).call(document);
            }
        }
    });
</script>
</body>
</html>
