<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Portfolio | QI JIANG</title>
    <style>
        @import url('https://fonts.font.im/css2?family=Gochi+Hand&display=swap');

        * { font-family: 'Gochi Hand', cursive !important; box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0; 
            background-color: #ffffff;
            width: 100%; height: 100%;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        .viewport-wrapper {
            position: relative;
            width: 100vw; height: 100vh;
            max-width: 1920px;
            margin: 0 auto;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        /* 1. 背景文字层 (z-index: 1) */
        .wuhu-bg-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1; 
            pointer-events: none;
        }

        .wuhu-item {
            position: absolute;
            white-space: nowrap;
            color: #000;
            animation: drift 5s infinite ease-in-out;
        }

        .t1 { top: 12vh; left: 8vw; font-size: 6vw; transform: rotate(-12deg); }
        .t2 { top: 30vh; left: 25vw; font-size: 4vw; transform: rotate(8deg); opacity: 0.5; }
        .t3 { top: 65vh; left: 6vw; font-size: 9vw; transform: rotate(-5deg); font-weight: bold; }
        .t4 { top: 18vh; left: 45vw; font-size: 3.5vw; transform: rotate(15deg); }
        .t5 { top: 80vh; left: 12vw; font-size: 5vw; transform: rotate(-10deg); }

        @keyframes drift {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(15px, -15px); }
        }

        /* 2. 主内容区域 (z-index: 10) */
        .main-content {
            position: absolute;
            right: 5vw; 
            bottom: 18vh; 
            display: flex;
            flex-direction: column;
            align-items: center; 
            z-index: 10; 
        }

        .animal-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        .animal-img {
            width: 45vw; 
            max-width: 700px;
            min-width: 320px;
            cursor: pointer;
            transform: scaleX(-1);
            transition: 0.3s;
            -webkit-user-drag: none;
            z-index: 11;
        }

        /* 核心修改：香蕉设为绝对定位，cursor 为抓取手势 */
        .banana-img {
            position: absolute;
            bottom: 2vh; right: -3vw;
            width: 8vw; 
            max-width: 120px;
            transform: rotate(12deg);
            z-index: 50; /* 置于顶层 */
            cursor: grab;
            user-select: none;
            -webkit-user-drag: none;
            touch-action: none; /* 禁用系统默认触摸行为 */
        }
        .banana-img:active { cursor: grabbing; }

        .animal-img.active { animation: shake 0.4s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: scaleX(-1) rotate(0deg); }
            50% { transform: scaleX(-1) rotate(-3deg); }
        }

        .signature-block {
            margin-top: 15px;
            text-align: center;
            z-index: 13; 
        }

        .name-text { 
            font-size: 2.5vw; 
            font-weight: bold; 
            color: #000; 
            text-transform: uppercase;
        }

        /* 3. 底部导航 (z-index: 20) */
        .nav-tabs {
            position: absolute;
            bottom: 5vh;
            left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 3vw;
            z-index: 20;
        }

        .tab {
            border: 3px solid #000;
            border-radius: 60px; 
            padding: 15px 45px;
            text-decoration: none;
            color: #000;
            font-weight: bold;
            font-size: 1.8vw;
            background: #fff;
            transition: 0.2s;
            text-transform: uppercase;
            box-shadow: 0 5px 0 #000;
        }
        .tab:hover { background: #000; color: #fff; transform: translateY(-5px); }

        /* 星星特效 */
        .sparkle {
            position: absolute; width: 40px; height: 40px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 576 512"><path d="M316.9 18C311.6 7 300.4 0 288.1 0s-23.4 7-28.8 18L195 150.3 51.4 171.5c-12 1.8-22 10.2-25.7 21.7s-.7 24.2 7.9 32.7L137.8 329 113.2 474.7c-2 12 3 24.2 12.9 31.3s23 8 33.8 2.3l128.3-68.5 128.3 68.5c10.8 5.7 23.9 4.8 33.8-2.3s14.9-19.3 12.9-31.3L438.5 329 542.7 225.9c8.6-8.5 11.7-21.2 7.9-32.7s-13.7-19.9-25.7-21.7L381.2 150.3 316.9 18z" fill="%23FFD700"/></svg>') no-repeat center/contain;
            pointer-events: none; animation: burst 0.8s ease-out forwards; 
            z-index: 100; 
        }
        @keyframes burst {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1.5) translate(var(--dx), var(--dy)) rotate(45deg); opacity: 0; }
        }

        @media (max-width: 850px) {
            .main-content { right: 0; left: 0; bottom: 30vh; }
            .animal-img { width: 85vw; }
            .nav-tabs { flex-direction: column; width: 80%; bottom: 4vh; }
            .tab { font-size: 1.4rem; width: 100%; text-align: center; }
        }
    </style>
</head>
<body>

    <div class="viewport-wrapper">
        <div class="wuhu-bg-layer">
            <span class="wuhu-item t1">wuhuwuhulala</span>
            <span class="wuhu-item t2">wuhuwuhu</span>
            <span class="wuhu-item t3">wuhulala</span>
            <span class="wuhu-item t4">wuhuwuhu</span>
            <span class="wuhu-item t5">wuhu!</span>
        </div>

        <div class="main-content">
            <div class="animal-container">
                <img id="giraffe" class="animal-img" onclick="clickGiraffe(event)" src="1.png">
                <img id="banana" src="banana.png" class="banana-img" onmousedown="startDrag(event)" ontouchstart="startDrag(event)">
            </div>
            <div class="signature-block">
                <p class="name-text">Portfolio BY QI JIANG</p>
            </div>
        </div>

        <div class="nav-tabs">
            <a href="visual.html" class="tab">Visual Art</a>
            <a href="digital.html" class="tab">3D Creation</a>
            <a href="new-media.html" class="tab">New Media</a>
        </div>
    </div>

<script>
    // 1. 长颈鹿交互
    function clickGiraffe(e) {
        const img = document.getElementById('giraffe');
        img.classList.remove('active');
        void img.offsetWidth;
        img.classList.add('active');
        const x = e.clientX || (e.touches && e.touches[0].clientX);
        const y = e.clientY || (e.touches && e.touches[0].clientY);
        for(let i=0; i<12; i++) createStar(x, y);
    }

    function createStar(x, y) {
        const star = document.createElement('div');
        star.className = 'sparkle';
        const dx = (Math.random() - 0.5) * 200 + 'px';
        const dy = (Math.random() - 0.5) * 200 + 'px';
        star.style.setProperty('--dx', dx);
        star.style.setProperty('--dy', dy);
        star.style.left = (x - 20) + 'px';
        star.style.top = (y - 20) + 'px';
        document.body.appendChild(star);
        setTimeout(() => star.remove(), 800);
    }

    // 2. 香蕉拖拽逻辑 (适配 PC 和 手机)
    let isDragging = false;
    let offset = { x: 0, y: 0 };
    const banana = document.getElementById('banana');

    function startDrag(e) {
        isDragging = true;
        const clientX = e.clientX || (e.touches && e.touches[0].clientX);
        const clientY = e.clientY || (e.touches && e.touches[0].clientY);
        
        // 获取香蕉当前相对于页面的位置，并记录偏移量
        const rect = banana.getBoundingClientRect();
        offset.x = clientX - rect.left;
        offset.y = clientY - rect.top;

        // 拖动时临时切换为绝对定位以跳出原父级约束
        banana.style.position = 'fixed'; 
        banana.style.left = rect.left + 'px';
        banana.style.top = rect.top + 'px';
        banana.style.bottom = 'auto';
        banana.style.right = 'auto';

        document.addEventListener('mousemove', drag);
        document.addEventListener('mouseup', stopDrag);
        document.addEventListener('touchmove', drag, { passive: false });
        document.addEventListener('touchend', stopDrag);
    }

    function drag(e) {
        if (!isDragging) return;
        if (e.type === 'touchmove') e.preventDefault(); // 防止手机端滑动导致页面滚动

        const clientX = e.clientX || (e.touches && e.touches[0].clientX);
        const clientY = e.clientY || (e.touches && e.touches[0].clientY);

        banana.style.left = (clientX - offset.x) + 'px';
        banana.style.top = (clientY - offset.y) + 'px';
    }

    function stopDrag() {
        isDragging = false;
        document.removeEventListener('mousemove', drag);
        document.removeEventListener('mouseup', stopDrag);
        document.removeEventListener('touchmove', drag);
        document.removeEventListener('touchend', stopDrag);
    }

    // 3. 全屏 ESC 退出逻辑
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            const exit = document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen || document.msExitFullscreen;
            if (exit) exit.call(document);
        }
    });
</script>
</body>
</html>
