<style>
    @import url('https://fonts.googleapis.com/css2?family=Gochi+Hand&display=swap');

    body, html { 
        margin: 0 !important; padding: 0 !important; 
        overflow: hidden !important; background: #fff !important;
    }

    .cargo-canvas {
        position: fixed; top: 0; left: 0;
        width: 100vw; height: 100vh;
        display: flex; justify-content: center; align-items: center;
        font-family: 'Gochi Hand', cursive !important;
        z-index: 999;
    }

    /* 晃动动画 */
    @keyframes delicateTwinkle {
        0% { transform: translate(0, 0); }
        25% { transform: translate(1.2px, -0.8px); }
        50% { transform: translate(-0.8px, 1.2px); }
        100% { transform: translate(0, 0); }
    }

    .wuhu-scatter {
        position: absolute; left: 15% !important; top: 15% !important;
        pointer-events: none;
    }

    .wuhu-scatter div {
        display: block !important;
        animation: delicateTwinkle 2.5s infinite ease-in-out !important;
    }

    .line-1 { font-size: 3.2rem; transform: translate(10px, 0); animation-duration: 2s !important; }
    .line-2 { font-size: 4.8rem; transform: translate(140px, -20px); animation-duration: 2.8s !important; }
    .line-3 { font-size: 2.8rem; transform: translate(30px, 10px); animation-duration: 2.3s !important; opacity: 0.7; }
    .line-4 { font-size: 5.8rem; transform: translate(220px, 25px); animation-duration: 3.2s !important; font-weight: bold; }
    .line-5 { font-size: 3.8rem; transform: translate(-10px, 50px); animation-duration: 2.6s !important; }
    .line-6 { font-size: 8.5rem; transform: translate(260px, 70px); animation-duration: 3.8s !important; letter-spacing: 6px; }

    .signature-wrap {
        position: absolute; bottom: 22%; right: 15% !important;
        display: flex; flex-direction: column; align-items: center;
    }

    .animal-img {
        width: 380px; cursor: pointer; transform: rotate(2deg);
        transition: transform 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes bounceOnce {
        0% { transform: scale(1) rotate(2deg); }
        30% { transform: scale(1.08) rotate(-3deg); }
        100% { transform: scale(1) rotate(2deg); }
    }
    .animal-img.active { animation: bounceOnce 0.45s !important; }

    .tab-container { position: absolute; bottom: 6%; display: flex; gap: 20px; }

    .tab-link {
        border: 3.5px solid #000; border-radius: 90px;
        padding: 15px 40px; text-decoration: none; color: #000;
        font-weight: bold; font-size: 1.5rem; text-transform: uppercase;
        background: white; transition: 0.3s;
    }
    .tab-link:hover { background: #000; color: #fff; transform: translateY(-5px); }
</style>

<div class="cargo-canvas">
    <div class="wuhu-scatter">
        <div class="line-1">wuhuwuhuwuhu</div>
        <div class="line-2">wuhuwuhuwuhu</div>
        <div class="line-3">wuhuwuhuwuhu</div>
        <div class="line-4">wuhuwuhuwuhu</div>
        <div class="line-5">wuhuwuhuwuhu</div>
        <div class="line-6">wuhuhulalaaal</div>
    </div>

    <div class="signature-wrap">
        <div style="font-size:3.5rem; font-weight:bold; margin-bottom:15px;">Portfolio</div>
        <img class="animal-img" id="giraffe" onclick="playBounce()" src="https://freight.cargo.site/t/original/i/R2827857287254243483226718341063/1.png">
        <div style="font-size:3.5rem; font-weight:bold; margin-top:15px;">BY QI JIANG</div>
    </div>

    <div class="tab-container">
        <a class="tab-link" href="/Visual-Art-Illustration">Visual Art & Illustration</a>
        <a class="tab-link" href="/digital-creation">Digital Image & 3D Creation</a>
        <a class="tab-link" href="/new-media">New Media Art & Installation</a>
    </div>
</div>

<script>
function playBounce() {
    const el = document.getElementById('giraffe');
    el.classList.remove('active');
    void el.offsetWidth;
    el.classList.add('active');
}
</script>
