<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Portfolio | QI JIANG</title>
    <style>
        @import url('https://fonts.font.im/css2?family=Gochi+Hand&display=swap');

        * { font-family: 'Gochi Hand', cursive !important; box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0; 
            background-color: #ffffff;
            width: 100%; height: 100%;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        .viewport-wrapper {
            position: relative;
            width: 100vw; height: 100vh;
            max-width: 1920px; margin: 0 auto;
        }

        /* 1. 背景文字：Z-index 设为 1 */
        .bg-wuhu-layer {
            position: absolute; top: 0; left: 0;
            width: 50%; height: 100%;
            z-index: 1; pointer-events: none; opacity: 0.3;
        }
        .wuhu-scatter { position: absolute; white-space: nowrap; animation: float 6s infinite ease-in-out; }
        .w1 { top: 10vh; left: 5vw; font-size: 5vw; }
        .w2 { top: 25vh; left: 15vw; font-size: 3vw; }
        .w3 { top: 45vh; left: 3vw; font-size: 6vw; font-weight: bold; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(var(--rot, 0deg)); }
            50% { transform: translate(1vw, -1vh) rotate(calc(var(--rot, 0deg) + 2deg)); }
        }

        /* 2. 主内容区域：Z-index 设为 10 确保点击在最上层 */
        .main-content {
            position: absolute;
            right: 5vw; top: 45%;
            transform: translateY(-50%);
            display: flex; align-items: flex-end;
            gap: 3vw; z-index: 10;
        }

        .text-block { text-align: right; margin-bottom: 5vh; }
        .title-text { font-size: 6vw; font-weight: bold; margin: 0; line-height: 1; }
        .name-text { font-size: 4vw; font-weight: bold; margin: 1vh 0 0 0; line-height: 1; }

        .animal-img {
            width: 45vw; max-width: 800px;
            cursor: pointer; 
            transform: scaleX(-1) rotate(2deg);
            transition: 0.3s; -webkit-user-drag: none;
            /* 确保图片能接收点击 */
            pointer-events: auto;
            position: relative;
            z-index: 15;
        }

        /* 核心动画：点击时的晃动 */
        .animal-img.active { animation: shake 0.4s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: scaleX(-1) rotate(2deg); }
            50% { transform: scaleX(-1) scale(1.05) rotate(-3deg); }
        }

        /* 3. 底部导航 */
        .nav-tabs {
            position: absolute; bottom: 8vh; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 2vw; z-index: 20;
        }

        .tab {
            border: 0.4vw solid #000; border-radius: 100px;
            padding: 1.5vh 3.5vw; text-decoration: none;
            color: #000; font-weight: bold; font-size: 1.8vw;
            background: #fff; transition: 0.3s; white-space: nowrap;
            box-shadow: 0 0.5vh 0 #000;
        }
        .tab:hover { background: #000; color: #fff; transform: translateY(-0.5vh); box-shadow: 0 0.8vh 0 #000; }

        /* 4. 星星特效 */
        .sparkle {
            position: absolute; 
            width: 40px; height: 40px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 576 512"><path d="M316.9 18C311.6 7 300.4 0 288.1 0s-23.4 7-28.8 18L195 150.3 51.4 171.5c-12 1.8-22 10.2-25.7 21.7s-.7 24.2 7.9 32.7L137.8 329 113.2 474.7c-2 12 3 24.2 12.9 31.3s23 8 33.8 2.3l128.3-68.5 128.3 68.5c10.8 5.7 23.9 4.8 33.8-2.3s14.9-19.3 12.9-31.3L438.5 329 542.7 225.9c8.6-8.5 11.7-21.2 7.9-32.7s-13.7-19.9-25.7-21.7L381.2 150.3 316.9 18z" fill="%23FFD700"/></svg>') no-repeat center/contain;
            pointer-events: none; 
            animation: burst 0.8s ease-out forwards;
            z-index: 2000; /* 星星要在最最上层 */
        }
        @keyframes burst {
            0% { transform: scale(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: scale(1.5) translate(var(--dx), var(--dy)) rotate(45deg); opacity: 0; }
        }

        /* 手机端适配：改为垂直排列 */
        @media (max-width: 768px) {
            .main-content { flex-direction: column; align-items: center; right: 0; left: 0; top: 40%; gap: 5vh; }
            .text-block { text-align: center; }
            .animal-img { width: 80vw; }
            .title-text { font-size: 15vw; }
            .name-text { font-size: 8vw; }
            .nav-tabs { flex-direction: column; bottom: 5vh; gap: 12px; width: 80%; }
            .tab { font-size: 1.2rem; padding: 12px 0; width: 100%; text-align: center; border-width: 3px; }
        }
    </style>
</head>
<body>

    <div class="viewport-wrapper">
        <div class="bg-wuhu-layer">
            <span class="wuhu-scatter w1">wuhuwuhu</span>
            <span class="wuhu-scatter w2">lalala</span>
            <span class="wuhu-scatter w3">wuhu!</span>
        </div>

        <div class="main-content">
            <div class="text-block">
                <p class="title-text">Portfolio</p>
                <p class="name-text">BY QI JIANG</p>
            </div>
            <div class="giraffe-wrap">
                <img id="giraffe" class="animal-img" onclick="clickGiraffe(event)" src="1.png">
            </div>
        </div>

        <div class="nav-tabs">
            <a href="visual.html" class="tab">Visual Art</a>
            <a href="digital.html" class="tab">3D Creation</a>
            <a href="new-media.html" class="tab">New Media</a>
        </div>
    </div>

<script>
    function clickGiraffe(e) {
        const img = document.getElementById('giraffe');
        
        // 1. 触发晃动
        img.classList.remove('active');
        void img.offsetWidth; // 强制触发重绘，让动画可以重复执行
        img.classList.add('active');

        // 2. 获取点击坐标（适配 PC 和 手机）
        const x = e.clientX || (e.touches && e.touches[0].clientX);
        const y = e.clientY || (e.touches && e.touches[0].clientY);

        // 3. 产生星星
        for(let i=0; i<10; i++) {
            createStar(x, y);
        }
    }

    function createStar(x, y) {
        const star = document.createElement('div');
        star.className = 'sparkle';
        
        // 随机爆炸方向
        const dx = (Math.random() - 0.5) * 200 + 'px';
        const dy = (Math.random() - 0.5) * 200 + 'px';
        star.style.setProperty('--dx', dx);
        star.style.setProperty('--dy', dy);
        
        // 修正星星生成的起始位置（居中）
        star.style.left = (x - 20) + 'px';
        star.style.top = (y - 20) + 'px';
        
        document.body.appendChild(star);
        setTimeout(() => star.remove(), 800);
    }
</script>

</body>
</html>
