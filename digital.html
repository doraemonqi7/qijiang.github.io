<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Image & 3D Creation</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 这里直接放入关键布局代码，防止外部 CSS 加载失败 */
        @import url('https://fonts.googleapis.com/css2?family=Gochi+Hand&display=swap');
        
        * { font-family: 'Gochi Hand', cursive !important; }

        body {
            background-color: #ffffff;
            margin: 0;
            padding: 5vw;
        }

        .gallery-header { margin-bottom: 50px; }
        .gallery-header h1 { font-size: 3rem; margin: 0; }

        .back-btn {
            display: inline-block;
            border: 2px solid #000;
            border-radius: 10px;
            padding: 8px 25px;
            text-decoration: none;
            color: #000;
            font-weight: bold;
            margin-top: 15px;
            transition: 0.3s;
        }
        .back-btn:hover { background: #000; color: #fff; }

        /* 核心修复：锁定三列布局，每列最大 400px，防止视频巨大化 */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(250px, 400px)); 
            gap: 40px;
            justify-content: center;
            align-items: start;
            margin: 50px auto;
            max-width: 1400px;
        }

        .video-item {
            background: #fff;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: float 5s infinite ease-in-out;
            text-align: center;
        }

        .video-item:hover {
            animation: none !important;
            transform: scale(1.1) translateY(-15px) !important;
            z-index: 10;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        video {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 15px;
            background: #eee; /* 视频未加载时的底色 */
        }

        .video-label {
            margin-top: 15px;
            font-size: 1.5rem;
            font-weight: bold;
        }

        /* 彩色边框 */
        .v-blue { border: 6px solid #b2ebf2; border-radius: 20px; padding: 10px; }
        .v-purple { border: 6px solid #f3e5f5; border-radius: 20px; padding: 10px; }
        .v-green { border: 6px solid #dcedc8; border-radius: 20px; padding: 10px; }

        @media (max-width: 900px) {
            .video-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="gallery-header">
    <h1>Digital Image & 3D Creation</h1>
    <a href="index.html" class="back-btn">Back to Home</a>
</div>

<div class="video-grid">
    <div class="video-item v-blue">
        <video muted autoplay loop playsinline>
            <source src="视频1.mp4" type="video/mp4">
        </video>
        <div class="video-label">3D Modeling - Computer</div>
    </div>

    <div class="video-item v-purple">
        <video muted autoplay loop playsinline>
            <source src="视频2.mp4" type="video/mp4">
        </video>
        <div class="video-label">Character Animation</div>
    </div>

    <div class="video-item v-green">
        <video muted autoplay loop playsinline>
            <source src="视频3.mp4" type="video/mp4">
        </video>
        <div class="video-label">Environment Render</div>
    </div>
</div>

</body>
</html>
