<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Image & 3D Creation</title>
    <style>
        /* 核心修复：国内镜像加速字体 */
        @import url('https://fonts.font.im/css2?family=Gochi+Hand&display=swap');
        
        * { font-family: 'Gochi Hand', cursive !important; box-sizing: border-box; }

        body {
            background-color: #ffffff;
            margin: 0;
            padding: 4vw;
            overflow-x: hidden;
        }

        .header { margin-bottom: 40px; }
        .header h1 { font-size: 3.5rem; margin: 0; }

        .back-btn {
            display: inline-block;
            border: 3px solid #000;
            border-radius: 12px;
            padding: 10px 30px;
            text-decoration: none;
            color: #000;
            font-weight: bold;
            margin-top: 20px;
            transition: 0.3s;
        }
        .back-btn:hover { background: #000; color: #fff; }

        /* 核心布局：一行两个 */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            gap: 60px;
            justify-content: center;
            margin: 60px auto;
            max-width: 1400px;
        }

        .video-item {
            background: #fff;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: float 5s infinite ease-in-out;
            text-align: center;
            width: 100%;
        }

        .video-item:hover {
            animation-play-state: paused;
            transform: scale(1.03) translateY(-10px);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        /* 视频样式 */
        video {
            width: 100%;
            height: auto;
            border-radius: 15px;
            display: block;
            background: #000;
            cursor: pointer; /* 鼠标变成手型提示可点击 */
        }

        .video-label {
            margin-top: 20px;
            font-size: 2rem;
            font-weight: bold;
        }

        /* 莫兰迪色边框 */
        .v-blue { border: 8px solid #b2ebf2; border-radius: 25px; padding: 15px; }
        .v-purple { border: 8px solid #f3e5f5; border-radius: 25px; padding: 15px; }
        .v-green { border: 8px solid #dcedc8; border-radius: 25px; padding: 15px; }

        @media (max-width: 800px) {
            .video-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Digital Image & 3D Creation</h1>
    <a href="index.html" class="back-btn">Back to Home</a>
</div>

<div class="video-grid">
    <div class="video-item v-blue">
        <video controls playsinline preload="metadata" onclick="this.play()">
            <source src="video1.mp4" type="video/mp4">
        </video>
        <div class="video-label">3D Modeling - Computer</div>
    </div>

    <div class="video-item v-purple">
        <video controls playsinline preload="metadata" onclick="this.play()">
            <source src="video2.mp4" type="video/mp4">
        </video>
        <div class="video-label">Character Animation</div>
    </div>

    <div class="video-item v-green">
        <video controls playsinline preload="metadata" onclick="this.play()">
            <source src="video3.mp4" type="video/mp4">
        </video>
        <div class="video-label">Environment Render</div>
    </div>
</div>

<script>
    // 页面加载后自动尝试为所有视频解冻（部分移动端浏览器需要）
    document.addEventListener('DOMContentLoaded', function() {
        const videos = document.querySelectorAll('video');
        videos.forEach(v => {
            v.addEventListener('click', function() {
                if (v.paused) v.play();
            });
        });
    });
</script>

</body>
</html>
