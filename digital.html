<div class="media-grid">
    <div class="media-item item-pink" onclick="playVideo(this)">
        <img src="chuchuang.png" class="poster">
        
        <video class="video-player" loop playsinline muted controls style="display: none;">
            <source src="chuchuang.mp4" type="video/mp4">
            お使いのブラウザは動画タグをサポートしていません。
        </video>
        
        <div class="media-info">
            <h2>WINDOW DESIGN</h2>
            <p>New media art combined with window design for multi-sensory experience.</p>
        </div>
    </div>
    
    </div>

<script>
    function playVideo(container) {
        const poster = container.querySelector('.poster');
        const video = container.querySelector('.video-player');
        const info = container.querySelector('.media-info');
        
        // 画像とテキストを非表示にする
        poster.style.display = 'none';
        if(info) info.style.display = 'none';
        
        // 動画を表示して再生
        video.style.display = 'block';
        video.play();
        
        // 親要素の浮遊アニメーションを止める（操作しやすくするため）
        container.style.animation = 'none';
        container.style.transform = 'none';
    }
</script>
