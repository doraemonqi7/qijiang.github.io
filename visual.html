<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Art & Illustration | Boring Still Life</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Gochi+Hand&display=swap');

        * { font-family: 'Gochi Hand', cursive !important; box-sizing: border-box; }

        body { background-color: #ffffff; margin: 0; padding: 50px; overflow-x: hidden; }

        .gallery-header { margin-bottom: 40px; text-align: left; }
        .gallery-header h1 { font-size: 3.5rem; margin: 0; color: #000; }

        .back-btn {
            display: inline-block; border: 3px solid #000; border-radius: 12px;
            padding: 10px 30px; text-decoration: none; color: #000;
            font-weight: bold; font-size: 1.3rem; margin-top: 15px; transition: 0.3s;
        }
        .back-btn:hover { background: #000; color: #fff; transform: translateY(-3px); }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(250px, 380px)); 
            justify-content: center;
            gap: 70px;
            margin: 50px auto;
            max-width: 1400px;
            align-items: start;
        }

        .gallery-item {
            position: relative;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: float 4s infinite ease-in-out;
            cursor: pointer;
            width: 100%;
            padding: 20px; /* 为手绘边框留出空间 */
        }

        .gallery-item:hover { 
            animation: none !important;
            transform: scale(1.08) translateY(-15px) !important; 
            z-index: 100; 
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        /* 核心修改：彩色手绘边框逻辑 */
        .sketchy-frame {
            position: relative;
            display: block;
            width: 100%;
            background: #fff;
        }

        /* 使用 SVG 绘制不规则手绘边框，避免全黑线条 */
        .sketchy-frame::after {
            content: "";
            position: absolute;
            top: -12px; left: -12px; right: -12px; bottom: -12px;
            border: 6px solid currentColor; /* 继承父级定义的颜色 */
            /* 关键：使用 mask 实现手绘的毛糙感，而不是用黑色的图片 */
            border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
            pointer-events: none;
            z-index: -1;
        }

        /* 莫兰迪/马卡龙配色方案 */
        .c-pink { color: #ffb7b7; }
        .c-yellow { color: #ffeeba; }
        .c-blue { color: #b2ebf2; }
        .c-purple { color: #e1bee7; }
        .c-green { color: #c8e6c9; }
        .c-orange { color: #ffccbc; }

        .sketchy-frame img { 
            width: 100%; 
            height: auto; 
            display: block; 
            border-radius: 3px;
            position: relative;
            z-index: 1;
        }

        @media (max-width: 900px) {
            .gallery-grid { grid-template-columns: 1fr; max-width: 450px; }
        }
    </style>
</head>
<body>

    <div class="gallery-header">
        <h1>Boring Still Life</h1>
        <a href="index.html" class="back-btn">Back to Home</a>
    </div>

    <div class="gallery-grid">
        <div class="gallery-item">
            <div class="sketchy-frame c-pink">
                <img src="festival.png" alt="Festival">
            </div>
        </div>
        
        <div class="gallery-item">
            <div class="sketchy-frame c-yellow">
                <img src="tiger.png" alt="Tiger">
            </div>
        </div>

        <div class="gallery-item">
            <div class="sketchy-frame c-blue">
                <img src="cat.png" alt="Cat">
            </div>
        </div>

        <div class="gallery-item">
            <div class="sketchy-frame c-orange">
                <img src="苹果 copy.png" alt="Apple">
            </div>
        </div>

        <div class="gallery-item">
            <div class="sketchy-frame c-purple">
                <img src="广州阿那亚.png" alt="Architecture">
            </div>
        </div>

        <div class="gallery-item">
            <div class="sketchy-frame c-green">
                <img src="2.png" alt="Friends">
            </div>
        </div>

        <div class="gallery-item">
            <div class="sketchy-frame c-pink">
                <img src="cute.png" alt="Cute">
            </div>
        </div>

        <div class="gallery-item">
            <div class="sketchy-frame c-blue">
                <img src="3.png" alt="Landscape">
            </div>
        </div>
    </div>

</body>
</html>
