<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Art & Illustration | Boring Still Life</title>
    <style>
        /* 1. 核心字体与全局样式 */
        @import url('https://fonts.font.im/css2?family=Gochi+Hand&display=swap');

        * { font-family: 'Gochi Hand', cursive !important; box-sizing: border-box; }

        body { 
            background-color: #ffffff; 
            margin: 0; 
            padding: 50px; 
            overflow-x: hidden; 
        }

        .gallery-header { margin-bottom: 40px; text-align: left; }
        .gallery-header h1 { font-size: 3.5rem; margin: 0; color: #000; }

        .back-btn {
            display: inline-block; border: 3px solid #000; border-radius: 12px;
            padding: 10px 30px; text-decoration: none; color: #000;
            font-weight: bold; font-size: 1.3rem; margin-top: 15px; transition: 0.3s;
        }
        .back-btn:hover { background: #000; color: #fff; transform: translateY(-3px); }

        /* 2. 响应式网格布局：优化为自动填充，不再强制留空 */
        .gallery-grid {
            display: grid;
            /* 核心修改：使用 auto-fill 自动根据宽度排列，不再强制固定列数 */
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            justify-content: center;
            gap: 60px; 
            margin: 50px auto;
            max-width: 1400px; 
            align-items: start;
        }

        .gallery-item {
            position: relative;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: float 4s infinite ease-in-out;
            cursor: pointer; width: 100%; padding: 15px;
            z-index: 1;
        }

        .gallery-item:hover { 
            animation-play-state: paused;
            transform: scale(1.1) translateY(-15px) !important; 
            z-index: 100; 
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* 3. 手绘边框样式 */
        .sketchy-frame {
            position: relative;
            display: block; width: 100%;
            background: #fff;
            border-radius: 5px;
            overflow: visible;
        }

        .sketchy-frame::after {
            content: "";
            position: absolute;
            top: -12px; left: -12px; right: -12px; bottom: -12px;
            border: 6px solid currentColor;
            border-radius: 255px 25px 225px 25px/25px 225px 25px 255px;
            pointer-events: none; z-index: 10;
            opacity: 0.85;
        }

        .sketchy-frame img { 
            width: 100%; height: auto; 
            display: block; 
            border-radius: 2px;
            filter: none;
        }

        /* 4. 莫兰迪色系 */
        .c-pink { color: #d4a5a5 !important; }
        .c-yellow { color: #e5d1a4 !important; }
        .c-blue { color: #9ab7c1 !important; }
        .c-purple { color: #b8a9c9 !important; }
        .c-green { color: #a8b89e !important; }
        .c-orange { color: #d69d85 !important; }
        .c-grey { color: #8e8d8a !important; }

        @media (max-width: 900px) {
            .gallery-grid { grid-template-columns: 1fr; max-width: 450px; }
        }
    </style>
</head>
<body>

    <div class="gallery-header">
        <h1>Boring Still Life</h1>
        <a href="index.html" class="back-btn">Back to Home</a>
    </div>

    <div class="gallery-grid">
        <div class="gallery-item">
            <div class="sketchy-frame c-pink">
                <img src="festival.png" alt="Festival">
            </div>
        </div>
        
        <div class="gallery-item">
            <div class="sketchy-frame c-yellow">
                <img src="tiger.png" alt="Tiger">
            </div>
        </div>

        <div class="gallery-item">
            <div class="sketchy-frame c-blue">
                <img src="cat.png" alt="Cat">
            </div>
        </div>

        <div class="gallery-item">
            <div class="sketchy-frame c-orange">
                <img src="apple.png" alt="Apple">
            </div>
        </div>

        <div class="gallery-item">
            <div class="sketchy-frame c-purple">
                <img src="aranya.png" alt="Architecture">
            </div>
        </div>

        <div class="gallery-item">
            <div class="sketchy-frame c-green">
                <img src="friends.png" alt="Friends">
            </div>
        </div>

        <div class="gallery-item">
            <div class="sketchy-frame c-grey">
                <img src="cute.png" alt="Cute">
            </div>
        </div>

        <div class="gallery-item">
            <div class="sketchy-frame c-blue">
                <img src="landscape.png" alt="Landscape">
            </div>
        </div>

        </div>

</body>
</html>
