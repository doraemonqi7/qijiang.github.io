<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Art & Illustration | Boring Still Life</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Gochi+Hand&display=swap');

        * { font-family: 'Gochi Hand', cursive !important; box-sizing: border-box; }

        body { background-color: #ffffff; margin: 0; padding: 50px; overflow-x: hidden; }

        .gallery-header { margin-bottom: 40px; text-align: left; }
        .gallery-header h1 { font-size: 3.5rem; margin: 0; color: #000; }

        .back-btn {
            display: inline-block; border: 3px solid #000; border-radius: 12px;
            padding: 10px 30px; text-decoration: none; color: #000;
            font-weight: bold; font-size: 1.3rem; margin-top: 15px; transition: 0.3s;
        }
        .back-btn:hover { background: #000; color: #fff; transform: translateY(-3px); }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(250px, 380px)); 
            justify-content: center;
            gap: 80px; /* 增加间距防止边框重叠 */
            margin: 50px auto;
            max-width: 1400px;
            align-items: start;
        }

        .gallery-item {
            position: relative;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: float 4s infinite ease-in-out;
            cursor: pointer;
            width: 100%;
            padding: 15px; /* 给内部边框留位置 */
        }

        .gallery-item:hover { 
            animation: none !important;
            transform: scale(1.1) translateY(-15px) !important; 
            z-index: 100; 
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        /* 核心修复：使用伪元素制作边框，不影响图片颜色 */
        .sketchy-frame {
            position: relative;
            display: block;
            width: 100%;
            line-height: 0;
        }

        .sketchy-frame::before {
            content: "";
            position: absolute;
            top: -15px; left: -15px; right: -15px; bottom: -15px;
            border-style: solid;
            border-width: 18px 20px 22px 18px;
            /* 手写线条图片 */
            border-image-source: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAJYAAACWCAMAAABy4R8bAAAAMFBMVEUAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAABvF97yAAAAD3RSTlMAAQIDBAUGBwgJCgsMDQ6Ior8NAAAA5ElEQVR4AezRoQ3AQAwEQSp9+m/aK6iPAn3G3M0OAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAW4N+Ad0456IeAAAAAElFTkSuQmCC');
            border-image-slice: 40 fill;
            border-image-repeat: repeat;
            z-index: -1; /* 确保边框在图片下面 */
            pointer-events: none;
        }

        /* 独立给边框上色，不影响图片 */
        .item-pink::before { filter: drop-shadow(0 0 1px #ffb7b7) sepia(1) hue-rotate(300deg) saturate(5); }
        .item-yellow::before { filter: drop-shadow(0 0 1px #ffeeba) sepia(1) hue-rotate(10deg) saturate(5); }
        .item-blue::before { filter: drop-shadow(0 0 1px #b2ebf2) sepia(1) hue-rotate(150deg) saturate(5); }
        .item-purple::before { filter: drop-shadow(0 0 1px #f3e5f5) sepia(1) hue-rotate(240deg) saturate(5); }
        .item-green::before { filter: drop-shadow(0 0 1px #dcedc8) sepia(1) hue-rotate(60deg) saturate(5); }
        .item-orange::before { filter: drop-shadow(0 0 1px #ffccbc) sepia(1) hue-rotate(340deg) saturate(5); }

        .sketchy-frame img { 
            width: 100%; 
            height: auto; 
            display: block; 
            border-radius: 2px;
            position: relative;
            z-index: 1; /* 图片在最上层 */
        }

        @media (max-width: 900px) {
            .gallery-grid { grid-template-columns: 1fr; max-width: 450px; }
        }
    </style>
</head>
<body>

    <div class="gallery-header">
        <h1>Boring Still Life</h1>
        <a href="index.html" class="back-btn">Back to Home</a>
    </div>

    <div class="gallery-grid">
        <div class="gallery-item">
            <div class="sketchy-frame item-pink">
                <img src="festival.png" alt="Festival">
            </div>
        </div>
        
        <div class="gallery-item">
            <div class="sketchy-frame item-yellow">
                <img src="tiger.png" alt="Tiger">
            </div>
        </div>

        <div class="gallery-item">
            <div class="sketchy-frame item-blue">
                <img src="cat.png" alt="Cat">
            </div>
        </div>

        <div class="gallery-item">
            <div class="sketchy-frame item-orange">
                <img src="苹果 copy.png" alt="Apple">
            </div>
        </div>

        <div class="gallery-item">
            <div class="sketchy-frame item-purple">
                <img src="广州阿那亚.png" alt="Architecture">
            </div>
        </div>

        <div class="gallery-item">
            <div class="sketchy-frame item-green">
                <img src="2.png" alt="Friends">
            </div>
        </div>

        <div class="gallery-item">
            <div class="sketchy-frame item-pink">
                <img src="cute.png" alt="Cute">
            </div>
        </div>

        <div class="gallery-item">
            <div class="sketchy-frame item-blue">
                <img src="3.png" alt="Landscape">
            </div>
        </div>
    </div>

</body>
</html>
