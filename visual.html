<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Art & Illustration | Boring Still Life</title>
    <style>
        /* 1. 强制应用圆润手写字体 */
        @import url('https://fonts.googleapis.com/css2?family=Gochi+Hand&display=swap');

        * {
            font-family: 'Gochi Hand', cursive !important;
            box-sizing: border-box;
        }

        body {
            background-color: #ffffff;
            margin: 0;
            padding: 50px;
            overflow-x: hidden;
        }

        /* 2. 标题区域 */
        .gallery-header {
            margin-bottom: 40px;
            text-align: left;
        }

        .gallery-header h1 { font-size: 3.5rem; margin: 0; }

        .back-btn {
            display: inline-block;
            border: 2px solid #000;
            border-radius: 10px;
            padding: 8px 25px;
            text-decoration: none;
            color: #000;
            font-weight: bold;
            font-size: 1.2rem;
            margin-top: 15px;
            transition: 0.3s;
        }
        .back-btn:hover { background: #000; color: #fff; }

        /* 3. 网格布局：锁定一行三个，单张图不超过 380px */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(200px, 380px)); 
            justify-content: center;
            gap: 50px;
            margin: 40px auto;
            max-width: 1300px;
        }

        /* 4. 图片项、边框与动画 */
        .gallery-item {
            background: #fff;
            padding: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: float 4s infinite ease-in-out;
            cursor: pointer;
            width: 100%;
        }

        /* 鼠标碰到变大逻辑 */
        .gallery-item:hover { 
            animation: none !important;
            transform: scale(1.15) translateY(-20px) !important; 
            z-index: 100; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.1); 
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        .gallery-item img { 
            width: 100%; 
            height: auto; 
            display: block; 
            border-radius: 5px;
        }

        /* 5. 按照你提供的文件名一一对应的边框 */
        .item-pink { border: 8px solid #ffb7b7; }
        .item-yellow { border: 8px solid #ffeeba; }
        .item-blue { border: 8px solid #b2ebf2; }
        .item-purple { border: 8px solid #f3e5f5; }
        .item-green { border: 8px solid #dcedc8; }
        .item-orange { border: 8px solid #ffccbc; }

        @media (max-width: 850px) {
            .gallery-grid { grid-template-columns: 1fr; max-width: 400px; }
        }
    </style>
</head>
<body>

    <div class="gallery-header">
        <h1>Boring Still Life</h1>
        <a href="index.html" class="back-btn">Back to Home</a>
    </div>

    <div class="gallery-grid">
        <div class="gallery-item item-pink">
            <img src="festival.png" alt="Festival">
        </div>
        
        <div class="gallery-item item-yellow">
            <img src="tiger.png" alt="Tiger">
        </div>

        <div class="gallery-item item-blue">
            <img src="cat.png" alt="Cat">
        </div>

        <div class="gallery-item item-orange">
            <img src="苹果 copy.png" alt="Apple">
        </div>

        <div class="gallery-item item-purple">
            <img src="广州阿那亚.png" alt="Architecture">
        </div>

        <div class="gallery-item item-green">
            <img src="2.png" alt="Friends">
        </div>

        <div class="gallery-item item-pink">
            <img src="cute.png" alt="Children Illustration">
        </div>

        <div class="gallery-item item-blue">
            <img src="3.png" alt="Landscape">
        </div>
    </div>

</body>
</html>
