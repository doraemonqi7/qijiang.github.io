<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Fireworks | QI JIANG</title>
    <style>
        :root {
            --panel-bg: rgba(10, 10, 15, 0.95);
            --text-color: #e0e0e0;
            --accent-purple: #8a2be2;
            --accent-blue: #4d94ff;
            --accent-orange: #ff9f43; /* 新增橙色主题 */
            --button-bg: #2a2a35;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-color);
        }

        /* --- 核心修复：退出按钮样式 --- */
        .exit-btn {
            position: absolute;
            top: 25px;
            left: 25px;
            z-index: 1000; 
            padding: 12px 25px;
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            background: var(--accent-orange); /* 使用橙色，显眼且好看 */
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(255, 159, 67, 0.4);
            transition: 0.3s;
        }

        .exit-btn:hover {
            transform: scale(1.05) translateX(-5px);
            box-shadow: 0 6px 20px rgba(255, 159, 67, 0.6);
        }

        .exit-btn::before { content: "←"; font-size: 22px; }

        canvas { display: block; width: 100%; height: 100%; }
        video { display: none; }

        #start-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 50; background: radial-gradient(circle at center, #1a1a25 0%, #000 100%);
        }

        #start-btn {
            padding: 15px 50px; font-size: 24px; color: #fff;
            background: linear-gradient(45deg, var(--accent-orange), var(--accent-purple));
            border: none; border-radius: 8px; cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 159, 67, 0.5); font-weight: bold;
            transition: 0.3s; margin-bottom: 40px;
        }
        #start-btn:hover { transform: scale(1.05); }

        .instruction-card {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            padding: 20px 40px; border-radius: 12px; text-align: left; line-height: 2;
        }
        .instruction-card h3 { margin-top: 0; color: var(--accent-orange); text-align: center; }

        /* 控制面板样式保持不变... */
        #control-panel {
            position: absolute; top: 0; right: 0; width: 340px; height: 100%;
            background: var(--panel-bg); border-left: 1px solid #333;
            overflow-y: auto; padding: 20px; box-sizing: border-box;
            z-index: 10; display: none; backdrop-filter: blur(10px);
        }
        
        .header { text-align: center; font-size: 16px; font-weight: bold; margin-bottom: 20px; letter-spacing: 2px; color: #fff; text-transform: uppercase; }
        .btn-group { display: flex; gap: 8px; margin-bottom: 20px; }
        .btn { padding: 8px 4px; background: var(--button-bg); color: #fff; border: 1px solid #444; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: bold; }
        .btn.active { background: var(--accent-orange); border-color: var(--accent-orange); }
        
        .shape-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 20px; }
        .control-group { margin-bottom: 15px; }
        .control-header { display: flex; justify-content: space-between; font-size: 11px; font-weight: bold; margin-bottom: 8px; color: #aaa; }
        
        #text-input { width: 100%; padding: 10px; background: rgba(0,0,0,0.5); color: #fff; border: 1px solid #555; border-radius: 6px; box-sizing: border-box; font-size: 16px; text-align: center; }
        #bottom-bar { position: absolute; bottom: 0; left: 0; width: 100%; text-align: center; background: rgba(0,0,0,0.6); padding: 10px 0; color: rgba(255, 255, 255, 0.8); font-size: 14px; display: none; z-index: 5; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <a href="new-media.html" class="exit-btn">Close & Back</a>

    <div id="start-screen">
        <button id="start-btn">开启互动烟花</button>
        <div class="instruction-card">
            <h3>操作指南</h3>
            <div><span class="icon">👆</span> <b>移动食指：</b> 屏幕上会出现仙女棒拖尾</div>
            <div><span class="icon">🤏</span> <b>捏合手指：</b> 捏住食指和拇指进行<b>蓄力</b></div>
            <div><span class="icon">🖐️</span> <b>松开手指：</b> 发射烟花升空爆炸</div>
        </div>
    </div>

    <div id="control-panel">
        <div class="header">CONTROLS</div>
        <div class="btn-group">
            <button class="btn" style="flex:1; border-color:#822" onclick="clearCanvas()">CLEAR</button>
            <button class="btn" style="flex:1" onclick="triggerRandomFirework()">TEST</button>
        </div>
        <div class="control-header"><span>SHAPE</span></div>
        <div class="shape-grid" id="shape-buttons-container">
            <button class="btn" onclick="setShape('sphere', this)">Sphere</button>
            <button class="btn" onclick="setShape('ring', this)">Ring</button>
            <button class="btn" onclick="setShape('star', this)">Star</button>
            <button class="btn" onclick="setShape('heart', this)">Heart</button>
            <button class="btn" onclick="setShape('burst', this)">Burst</button>
            <button class="btn active" onclick="setShape('text', this)">Text</button>
        </div>
        <div id="text-content-area">
            <textarea id="text-input" rows="2">ドラえもん</textarea>
        </div>
        <div id="sliders-container"></div>
    </div>

    <div id="bottom-bar">✨仙女棒 | ⚡️蓄力 | 🎆快速捏放发射 | ⚙️右侧面板调整效果</div>

    <video id="video-input" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

<script>
    // 逻辑部分保持原样，仅确保正常运行
    const config = { particles: 250, explosionSpeed: 12, gravity: 0.18, friction: 0.96, fadeOut: 0.015, sparkle: 40, hue: 30, variance: 25, trail: 0.15, explosionShape: 'text' };
    const slidersConfig = [
        { id: 'particles', label: 'PARTICLES', min: 50, max: 1500, step: 10 },
        { id: 'explosionSpeed', label: 'SPEED', min: 5, max: 30, step: 1 },
        { id: 'hue', label: 'HUE', min: 0, max: 360, step: 1, isHue: true }
    ];

    const container = document.getElementById('sliders-container');
    slidersConfig.forEach(s => {
        const div = document.createElement('div');
        div.className = 'control-group';
        div.innerHTML = `<div class="control-header"><span>${s.label}</span><span id="${s.id}-val">${config[s.id]}</span></div>
                         <input type="range" id="${s.id}-slider" min="${s.min}" max="${s.max}" step="${s.step}" value="${config[s.id]}">`;
        container.appendChild(div);
        document.getElementById(`${s.id}-slider`).addEventListener('input', (e) => {
            config[s.id] = parseFloat(e.target.value);
            document.getElementById(`${s.id}-val`).innerText = config[s.id];
        });
    });

    function setShape(shape, btn) {
        config.explosionShape = shape;
        document.querySelectorAll('.shape-grid .btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();

    const fireworks = [], particlesArray = [];
    function clearCanvas() { particlesArray.length = 0; fireworks.length = 0; }
    function triggerRandomFirework() { fireworks.push(new Shell(canvas.width/2, canvas.height, 40)); }

    function getShapePixels(content) {
        const off = document.createElement('canvas');
        const octx = off.getContext('2d');
        off.width = 600; off.height = 400;
        octx.font = "900 60px sans-serif"; octx.fillStyle = "white"; octx.textAlign = "center"; octx.textBaseline = "middle";
        octx.fillText(content, 300, 200);
        const data = octx.getImageData(0,0,600,400).data;
        const pts = [];
        for(let y=0; y<400; y+=3) for(let x=0; x<600; x+=3) if(data[(y*600+x)*4+3]>128) pts.push({dx:x-300, dy:y-200});
        return pts;
    }

    class Shell {
        constructor(x, y, charge) { this.x = x; this.y = y; this.targetY = y - (charge * 12) - 150; this.hue = config.hue; this.exploded = false; }
        update() { this.y += (this.targetY - this.y) * 0.1; if(Math.abs(this.targetY - this.y) < 5) { this.exploded = true; this.explode(); } }
        draw() { ctx.beginPath(); ctx.arc(this.x, this.y, 3, 0, Math.PI*2); ctx.fillStyle = `hsl(${this.hue}, 100%, 70%)`; ctx.fill(); }
        explode() {
            const pts = config.explosionShape === 'text' ? getShapePixels(document.getElementById('text-input').value) : [];
            const count = pts.length > 0 ? Math.min(pts.length, 800) : config.particles;
            for(let i=0; i<count; i++) {
                let vx, vy;
                if(pts.length > 0) {
                    const p = pts[Math.floor((i/count)*pts.length)];
                    vx = p.dx * (config.explosionSpeed/100); vy = p.dy * (config.explosionSpeed/100);
                } else {
                    const ang = Math.random()*Math.PI*2, spd = Math.random()*config.explosionSpeed;
                    vx = Math.cos(ang)*spd; vy = Math.sin(ang)*spd;
                }
                particlesArray.push(new Particle(this.x, this.y, vx, vy, config.hue));
            }
        }
    }

    class Particle {
        constructor(x,y,vx,vy,h) { this.x=x; this.y=y; this.vx=vx; this.vy=vy; this.hue=h; this.alpha=1; }
        update() { this.vx*=config.friction; this.vy*=config.friction; this.vy+=config.gravity; this.x+=this.vx; this.y+=this.vy; this.alpha-=config.fadeOut; }
        draw() { ctx.fillStyle=`hsla(${this.hue},100%,70%,${this.alpha})`; ctx.beginPath(); ctx.arc(this.x,this.y,2,0,Math.PI*2); ctx.fill(); }
    }

    let handPos = {x:-100, y:-100}, isPinching = false, charge = 0;
    function onResults(res) {
        if(res.multiHandLandmarks && res.multiHandLandmarks[0]) {
            const h = res.multiHandLandmarks[0];
            handPos.x = (1-h[8].x)*canvas.width; handPos.y = h[8].y*canvas.height;
            const dist = Math.sqrt(Math.pow(h[8].x-h[4].x,2)+Math.pow(h[8].y-h[4].y,2));
            if(dist < 0.08) { isPinching = true; charge = Math.min(charge+2, 60); }
            else { if(isPinching && charge > 10) fireworks.push(new Shell(handPos.x, handPos.y, charge)); isPinching = false; charge = 0; }
        }
    }

    const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
    hands.onResults(onResults);
    const camera = new Camera(document.getElementById('video-input'), { onFrame: async () => { await hands.send({image: document.getElementById('video-input')}); } });

    document.getElementById('start-btn').onclick = () => {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('control-panel').style.display = 'block';
        document.getElementById('bottom-bar').style.display = 'block';
        camera.start(); requestAnimationFrame(function loop(){
            ctx.fillStyle = `rgba(0,0,0,${config.trail})`; ctx.fillRect(0,0,canvas.width,canvas.height);
            fireworks.forEach(f => { f.update(); f.draw(); });
            particlesArray.forEach((p,i) => { p.update(); p.draw(); if(p.alpha<=0) particlesArray.splice(i,1); });
            requestAnimationFrame(loop);
        });
    };
</script>
</body>
</html>
