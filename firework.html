<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Interactive Fireworks | Firework 1.0</title>
    <style>
        @import url('https://fonts.font.im/css2?family=Gochi+Hand&display=swap');
        :root { --accent: #bf5af2; --bg: #030305; --panel: rgba(10, 10, 15, 0.98); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); overflow: hidden; font-family: 'Gochi Hand', cursive, sans-serif; color: #fff; }
        canvas { display: block; width: 100%; height: 100%; position: absolute; z-index: 1; }
        
        .top-nav { position: absolute; top: 0; left: 0; width: 100%; padding: 15px; display: flex; justify-content: space-between; z-index: 100; box-sizing: border-box; pointer-events: none; }
        .btn-ui { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: #fff; padding: 10px 18px; border-radius: 12px; font-size: 14px; backdrop-filter: blur(15px); cursor: pointer; pointer-events: auto; text-decoration: none; }
        
        #control-panel { position: fixed; top: 0; right: 0; width: 320px; height: 100%; background: var(--panel); border-left: 1px solid #333; z-index: 200; padding: 30px 20px; box-sizing: border-box; transform: translateX(100%); transition: 0.3s; overflow-y: auto; }
        #control-panel.active { transform: translateX(0); }
        .section-title { font-size: 11px; color: #888; margin: 20px 0 10px; text-transform: uppercase; letter-spacing: 1px; }
        .shape-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .shape-btn { padding: 10px 5px; background: #1a1a1a; border: 1px solid #333; color: #888; border-radius: 8px; cursor: pointer; font-size: 12px; }
        .shape-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
        input[type=range] { width: 100%; accent-color: var(--accent); }
        input[type=text] { width: 100%; padding: 10px; background: #000; border: 1px solid #444; color: #fff; border-radius: 8px; box-sizing: border-box; }
        .apply-btn { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 12px; margin-top: 20px; font-weight: bold; cursor: pointer; }

        #start-screen { position: fixed; inset: 0; z-index: 500; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .start-btn { padding: 20px 60px; font-size: 24px; background: var(--accent); border: none; border-radius: 50px; color: #fff; font-weight: bold; cursor: pointer; box-shadow: 0 0 30px rgba(191,90,242,0.4); }
        .how-to-play { color: #888; margin-top: 25px; max-width: 400px; line-height: 1.6; }
        .highlight { color: var(--accent); font-weight: bold; }

        #video-input { display: none; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

<div id="start-screen">
    <button class="start-btn" id="start-btn">放烟花啦～</button>
    <div class="how-to-play">
        🖐️ <span class="highlight">交互说明：</span>捏合指尖时间越长，烟花越大越高。<br>
        🖱️ 点击/长按屏幕也能发射！
    </div>
</div>

<div class="top-nav">
    <a href="new-media.html" class="btn-ui" style="background:#ff9f43">← 返回菜单</a>
    <button class="btn-ui" style="background:var(--accent)" onclick="document.getElementById('control-panel').classList.add('active')">⚙️ 参数</button>
</div>

<div id="control-panel">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
        <span style="font-weight:bold; color:var(--accent); font-size: 1.5rem;">Firework 1.0</span>
        <button onclick="document.getElementById('control-panel').classList.remove('active')" style="background:none; border:none; color:#fff; font-size:30px;">&times;</button>
    </div>
    <div class="section-title">文字 (TEXT)</div>
    <input type="text" id="text-input" value="ドラえもん">
    <div class="section-title">形状 (SHAPE)</div>
    <div class="shape-grid">
        <button class="shape-btn active" data-shape="sphere">Sphere</button>
        <button class="shape-btn" data-shape="ring">Ring</button>
        <button class="shape-btn" data-shape="star">Star</button>
        <button class="shape-btn" data-shape="burst">Burst</button>
        <button class="shape-btn" data-shape="heart">Heart</button>
        <button class="shape-btn" data-shape="text">Text</button>
    </div>
    <div id="sliders"></div>
    <button class="apply-btn" onclick="document.getElementById('control-panel').classList.remove('active')">确认应用</button>
</div>

<video id="video-input" playsinline muted autoplay></video>
<canvas id="canvas"></canvas>

<script>
    const config = { particles: 450, speed: 18, gravity: 0.18, hue: 280, variance: 60, trail: 0.18, shape: 'sphere' };
    const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d', { alpha: false });
    let fireworks = [], particles = [];
    let isPinching = false, charge = 0, hPos = {x:0, y:0};

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();

    const sliderDefs = [
        { id: 'particles', label: '基础粒子数', min: 100, max: 1500 },
        { id: 'speed', label: '爆炸力', min: 8, max: 35 },
        { id: 'gravity', label: '重力', min: 0.1, max: 0.6, step: 0.01 }
    ];

    sliderDefs.forEach(s => {
        const div = document.createElement('div');
        div.innerHTML = `<div style="display:flex; justify-content:space-between; font-size:11px; margin-top:15px; color:#666;"><span>${s.label}</span><span id="${s.id}-v">${config[s.id]}</span></div>
                         <input type="range" id="${s.id}-s" min="${s.min}" max="${s.max}" step="${s.step||1}" value="${config[s.id]}">`;
        document.getElementById('sliders').appendChild(div);
        document.getElementById(`${s.id}-s`).oninput = (e) => {
            config[s.id] = parseFloat(e.target.value);
            document.getElementById(`${s.id}-v`).innerText = config[s.id];
        };
    });

    document.querySelectorAll('.shape-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.shape-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            config.shape = btn.getAttribute('data-shape');
        };
    });

    class Particle {
        constructor(x, y, vx, vy, h, size, life) {
            this.x = x; this.y = y; this.vx = vx; this.vy = vy;
            this.h = h + (Math.random() * config.variance - config.variance/2);
            this.alpha = life; this.size = size; this.decay = 0.008 + Math.random() * 0.012;
            this.friction = 0.96;
        }
        update() { 
            this.vx *= this.friction; this.vy *= this.friction; this.vy += config.gravity; 
            this.x += this.vx; this.y += this.vy; this.alpha -= this.decay; 
        }
        draw() {
            if(this.alpha <= 0) return;
            ctx.globalCompositeOperation = 'lighter';
            const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
            grad.addColorStop(0, `hsla(${this.h}, 100%, 85%, ${this.alpha})`);
            grad.addColorStop(1, `hsla(${this.h}, 100%, 50%, 0)`);
            ctx.fillStyle = grad;
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
        }
    }

    class Shell {
        constructor(x, y, charge) {
            this.x = x; this.y = y;
            // 动力学修正：蓄力越久飞得越高
            const power = Math.min(charge, 80); 
            this.targetY = Math.max(80, y - (power * 15));
            this.chargeFactor = power / 40; // 大小系数
            this.hue = Math.random() * 360; 
            this.done = false; 
            this.lockedShape = config.shape;
        }
        update() {
            let dist = this.y - this.targetY;
            this.y -= (dist * 0.15) + 3;
            if (this.y <= this.targetY + 8) { this.done = true; this.explode(); }
        }
        draw() { ctx.fillStyle = `hsl(${this.hue}, 100%, 80%)`; ctx.beginPath(); ctx.arc(this.x, this.y, 4, 0, Math.PI*2); ctx.fill(); }
        
        explode() {
            let pts = [];
            const particleCount = config.particles * this.chargeFactor;
            const radius = 100 * this.chargeFactor;

            if (this.lockedShape === 'text') {
                const off = document.createElement('canvas'); const octx = off.getContext('2d');
                off.width = 400; off.height = 150; octx.font = "bold 50px 'Gochi Hand'"; octx.fillStyle = "white"; octx.textAlign = "center";
                octx.fillText(document.getElementById('text-input').value, 200, 80);
                const data = octx.getImageData(0,0,400,150).data;
                for(let y=0; y<150; y+=4) for(let x=0; x<400; x+=4) if(data[(y*400+x)*4+3]>128) pts.push({dx: (x-200) * this.chargeFactor, dy: (y-80) * this.chargeFactor});
            } else if (this.lockedShape === 'star') {
                for(let i=0; i<particleCount; i++) {
                    const l = i % 2 === 0 ? radius : radius/2, ang = (i / particleCount) * Math.PI * 10;
                    pts.push({ dx: Math.cos(ang) * l, dy: Math.sin(ang) * l });
                }
            } else if (this.lockedShape === 'ring') {
                for(let i=0; i<particleCount; i++) {
                    const ang = (i / particleCount) * Math.PI * 2;
                    pts.push({ dx: Math.cos(ang) * radius, dy: Math.sin(ang) * radius });
                }
            } else if (this.lockedShape === 'heart') {
                for(let i=0; i<particleCount; i++) {
                    const t = Math.random() * Math.PI * 2;
                    pts.push({ dx: 16 * Math.pow(Math.sin(t), 3) * (radius/12), dy: -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * (radius/12) });
                }
            } else if (this.lockedShape === 'sphere') {
                for(let i=0; i<particleCount; i++) {
                    const ang = Math.random() * Math.PI * 2, spd = Math.random() * radius;
                    pts.push({ dx: Math.cos(ang) * spd, dy: Math.sin(ang) * spd });
                }
            }

            const isCustom = pts.length > 0;
            const finalCount = isCustom ? pts.length : particleCount;
            
            for (let i = 0; i < finalCount; i++) {
                let vx, vy;
                if(isCustom) {
                    vx = pts[i].dx * (config.speed / 100); 
                    vy = pts[i].dy * (config.speed / 100);
                } else { // Burst 模式
                    const ang = Math.random() * Math.PI * 2, spd = Math.random() * config.speed * this.chargeFactor;
                    vx = Math.cos(ang) * spd; vy = Math.sin(ang) * spd;
                }
                particles.push(new Particle(this.x, this.y, vx, vy, this.hue, 4.0 * this.chargeFactor, 1.0));
            }
        }
    }

    const hands = new Hands({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
    hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7 });
    hands.onResults(res => {
        if(res.multiHandLandmarks && res.multiHandLandmarks[0]) {
            const h = res.multiHandLandmarks[0];
            hPos.x = (1 - h[8].x) * canvas.width; hPos.y = h[8].y * canvas.height;
            const dist = Math.sqrt(Math.pow(h[8].x - h[4].x, 2) + Math.pow(h[8].y - h[4].y, 2));
            if(dist < 0.1) { isPinching = true; charge += 1.8; }
            else { if(isPinching && charge > 10) fireworks.push(new Shell(hPos.x, hPos.y, charge)); isPinching = false; charge = 0; }
        } else { isPinching = false; charge = 0; }
    });

    const cam = new Camera(document.getElementById('video-input'), {
        onFrame: async () => { try { await hands.send({image: document.getElementById('video-input')}); } catch(e){} },
        width: 640, height: 480
    });

    canvas.addEventListener('mousedown', (e) => { isPinching = true; hPos.x = e.clientX; hPos.y = e.clientY; });
    canvas.addEventListener('mousemove', (e) => { if(isPinching) { hPos.x = e.clientX; hPos.y = e.clientY; charge += 1.2; } });
    canvas.addEventListener('mouseup', () => { if(charge > 10) fireworks.push(new Shell(hPos.x, hPos.y, charge)); isPinching = false; charge = 0; });

    document.getElementById('start-btn').onclick = () => {
        document.getElementById('start-screen').style.display = 'none';
        cam.start().catch(() => {});
        const loop = () => {
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = `rgba(3, 3, 5, ${config.trail})`;
            ctx.fillRect(0,0,canvas.width,canvas.height);
            fireworks.forEach((f,i) => { f.update(); f.draw(); if(f.done) fireworks.splice(i,1); });
            particles.forEach((p,i) => { p.update(); p.draw(); if(p.alpha <= 0) particles.splice(i,1); });
            if(isPinching) {
                ctx.beginPath(); ctx.arc(hPos.x, hPos.y, Math.min(charge, 80) * 0.8, 0, Math.PI*2);
                ctx.strokeStyle = `hsla(${config.hue}, 100%, 75%, 0.9)`;
                ctx.lineWidth = 4; ctx.stroke();
            }
            requestAnimationFrame(loop);
        };
        loop();
    };
</script>
</body>
</html>
