<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Interactive Fireworks Pro | QJ</title>
    <style>
        :root {
            --accent: #bf5af2;
            --bg: #050508;
            --panel: rgba(16, 16, 22, 0.95);
        }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); overflow: hidden; font-family: system-ui, -apple-system, sans-serif; color: #fff; }
        
        /* UI 层级 */
        canvas { display: block; width: 100%; height: 100%; position: absolute; z-index: 1; }
        .top-nav { position: absolute; top: 0; left: 0; width: 100%; padding: 15px; display: flex; justify-content: space-between; z-index: 100; box-sizing: border-box; pointer-events: none; }
        .btn-ui { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 10px 18px; border-radius: 12px; font-size: 14px; backdrop-filter: blur(10px); cursor: pointer; text-decoration: none; pointer-events: auto; }
        
        /* 侧边栏 */
        #control-panel { position: fixed; top: 0; right: 0; width: 320px; height: 100%; background: var(--panel); border-left: 1px solid #333; z-index: 200; padding: 30px 20px; box-sizing: border-box; transform: translateX(100%); transition: 0.3s; overflow-y: auto; }
        #control-panel.active { transform: translateX(0); }
        
        .section-title { font-size: 11px; color: #888; margin: 25px 0 10px; text-transform: uppercase; letter-spacing: 1px; }
        .shape-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .shape-btn { padding: 12px 5px; background: #222; border: 1px solid #444; color: #fff; border-radius: 8px; cursor: pointer; font-size: 12px; transition: 0.2s; }
        .shape-btn.active { background: var(--accent); border-color: var(--accent); font-weight: bold; box-shadow: 0 0 15px rgba(191, 90, 242, 0.4); }
        
        input[type=range] { width: 100%; accent-color: var(--accent); margin: 10px 0; }
        input[type=text] { width: 100%; padding: 12px; background: #1a1a25; border: 1px solid #444; color: #fff; border-radius: 8px; box-sizing: border-box; }
        .apply-btn { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 12px; margin-top: 25px; font-weight: bold; cursor: pointer; }
        
        #start-screen { position: fixed; inset: 0; z-index: 500; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .start-btn { padding: 20px 60px; font-size: 22px; background: var(--accent); border: none; border-radius: 50px; color: #fff; font-weight: bold; cursor: pointer; }
        #video-input { display: none; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
</head>
<body>

<div id="start-screen"><button class="start-btn" id="start-btn">开启互动烟花</button></div>

<div class="top-nav">
    <a href="index.html" class="btn-ui" style="background:#ff9f43">← 返回菜单</a>
    <button class="btn-ui" style="background:var(--accent)" onclick="document.getElementById('control-panel').classList.add('active')">⚙️ 设置参数</button>
</div>

<div id="control-panel">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <span style="font-weight:bold; color:var(--accent)">QJ CONTROLS</span>
        <button onclick="document.getElementById('control-panel').classList.remove('active')" style="background:none; border:none; color:#fff; font-size:24px;">&times;</button>
    </div>

    <div class="section-title">爆炸形状</div>
    <div class="shape-grid" id="shape-selector">
        <button class="shape-btn" data-shape="sphere">Sphere</button>
        <button class="shape-btn" data-shape="ring">Ring</button>
        <button class="shape-btn" data-shape="star">Star</button>
        <button class="shape-btn active" data-shape="text">Text</button>
        <button class="shape-btn" data-shape="heart">Heart</button>
        <button class="shape-btn" data-shape="burst">Burst</button>
    </div>

    <div class="section-title">文字内容</div>
    <input type="text" id="text-input" value="ドラえもん">

    <div class="section-title">物理参数</div>
    <div id="sliders"></div>

    <button class="apply-btn" onclick="document.getElementById('control-panel').classList.remove('active')">确认并应用</button>
    <button onclick="clearCanvas()" style="width:100%; margin-top:10px; background:none; border:1px solid #ff453a; color:#ff453a; padding:10px; border-radius:10px;">清空画布</button>
</div>

<video id="video-input" playsinline muted></video>
<canvas id="canvas"></canvas>

<script>
    // --- 配置与初始化 ---
    const config = { particles: 200, speed: 12, gravity: 0.15, hue: 210, variance: 30, trail: 0.15, shape: 'text' };
    const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d', { alpha: false });
    let fireworks = [], particles = [];

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();
    function clearCanvas() { fireworks = []; particles = []; }

    // --- 动态控制面板绑定 ---
    const sliderDefs = [
        { id: 'particles', label: '粒子密度', min: 50, max: 800 },
        { id: 'speed', label: '爆炸力度', min: 5, max: 25 },
        { id: 'gravity', label: '重力感', min: 0, max: 0.4, step: 0.01 },
        { id: 'variance', label: '颜色多样性', min: 0, max: 100 }
    ];

    sliderDefs.forEach(s => {
        const div = document.createElement('div');
        div.innerHTML = `<div style="display:flex; justify-content:space-between; font-size:12px; margin-top:15px;"><span>${s.label}</span><span id="${s.id}-v">${config[s.id]}</span></div>
                         <input type="range" id="${s.id}-s" min="${s.min}" max="${s.max}" step="${s.step||1}" value="${config[s.id]}">`;
        document.getElementById('sliders').appendChild(div);
        document.getElementById(`${s.id}-s`).oninput = (e) => {
            config[s.id] = parseFloat(e.target.value);
            document.getElementById(`${s.id}-v`).innerText = config[s.id];
        };
    });

    document.querySelectorAll('.shape-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.shape-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            config.shape = btn.dataset.shape;
        };
    });

    // --- 核心类 ---
    class Particle {
        constructor(x, y, vx, vy, h) {
            this.x = x; this.y = y; this.vx = vx; this.vy = vy;
            // 颜色随机偏移，解决颜色单一问题
            this.h = h + (Math.random() * config.variance * 2 - config.variance);
            this.alpha = 1;
        }
        update() {
            this.vx *= 0.96; this.vy *= 0.96; this.vy += config.gravity;
            this.x += this.vx; this.y += this.vy; this.alpha -= 0.015;
        }
        draw() {
            ctx.fillStyle = `hsla(${this.h}, 100%, 70%, ${this.alpha})`;
            ctx.fillRect(this.x, this.y, 2, 2);
        }
    }

    class Shell {
        constructor(x, y, charge) {
            this.x = x; this.y = y; this.targetY = y - (charge * 10) - 100;
            this.done = false;
        }
        update() {
            this.y += (this.targetY - this.y) * 0.1;
            if (Math.abs(this.targetY - this.y) < 5) {
                this.done = true;
                this.explode();
            }
        }
        explode() {
            let pts = [];
            if (config.shape === 'text') {
                const off = document.createElement('canvas'); const octx = off.getContext('2d');
                off.width = 400; off.height = 150; octx.font = "bold 40px sans-serif"; octx.fillStyle = "white"; octx.textAlign = "center";
                octx.fillText(document.getElementById('text-input').value, 200, 80);
                const data = octx.getImageData(0,0,400,150).data;
                for(let y=0; y<150; y+=4) for(let x=0; x<400; x+=4) if(data[(y*400+x)*4+3]>128) pts.push({dx:x-200, dy:y-80});
            }

            const count = config.shape === 'text' ? Math.min(pts.length, config.particles) : config.particles;
            for (let i = 0; i < count; i++) {
                let vx, vy;
                if (config.shape === 'text' && pts.length > 0) {
                    const p = pts[Math.floor(Math.random()*pts.length)];
                    vx = p.dx * (config.speed/40); vy = p.dy * (config.speed/40);
                } else {
                    const ang = Math.random() * Math.PI * 2, spd = Math.random() * config.speed;
                    vx = Math.cos(ang) * spd; vy = Math.sin(ang) * spd;
                }
                particles.push(new Particle(this.x, this.y, vx, vy, config.hue));
            }
        }
    }

    // --- MediaPipe 逻辑 ---
    const hands = new Hands({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
    hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.5 });

    let hPos = {x:0, y:0}, isP = false, charge = 0;
    hands.onResults(res => {
        if(res.multiHandLandmarks && res.multiHandLandmarks[0]) {
            const h = res.multiHandLandmarks[0];
            hPos.x = (1 - h[8].x) * canvas.width; hPos.y = h[8].y * canvas.height;
            const dist = Math.sqrt(Math.pow(h[8].x-h[4].x,2)+Math.pow(h[8].y-h[4].y,2));
            if(dist < 0.08) { isP = true; charge = Math.min(charge + 1.5, 50); }
            else { if(isP && charge > 5) fireworks.push(new Shell(hPos.x, hPos.y, charge)); isP=false; charge=0; }
        }
    });

    const video = document.getElementById('video-input');
    const cam = new Camera(video, {
        onFrame: async () => { 
            if(video.readyState >= 2) {
                try { await hands.send({image: video}); } catch(e) {} // 静默处理 WebGL 错误
            }
        },
        width: 480, height: 360
    });

    document.getElementById('start-btn').onclick = () => {
        document.getElementById('start-screen').style.display = 'none';
        cam.start().catch(() => alert("摄像头开启失败"));
        
        const loop = () => {
            ctx.fillStyle = `rgba(5, 5, 8, ${config.trail})`;
            ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.globalCompositeOperation = 'lighter';
            fireworks.forEach((f,i) => { f.update(); if(f.done) fireworks.splice(i,1); });
            particles.forEach((p,i) => { p.update(); p.draw(); if(p.alpha <= 0) particles.splice(i,1); });
            if(isP) { ctx.strokeStyle=`hsl(${config.hue},100%,60%)`; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(hPos.x,hPos.y,charge,0,7); ctx.stroke(); }
            requestAnimationFrame(loop);
        };
        loop();
    };
</script>
</body>
</html>
