<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Interactive Fireworks | QJ</title>
    <style>
        :root {
            --accent: #bf5af2;
            --bg: #050508;
            --panel: rgba(16, 16, 22, 0.98);
            --vh: 1vh;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            height: calc(var(--vh, 1vh) * 100);
            background: var(--bg); overflow: hidden;
            font-family: -apple-system, system-ui, sans-serif;
            color: #fff;
        }

        .top-nav {
            position: absolute; top: 0; left: 0; width: 100%;
            padding: 15px; display: flex; justify-content: space-between;
            z-index: 2000; box-sizing: border-box;
            pointer-events: none;
        }

        .btn-ui {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: #fff; padding: 10px 18px; border-radius: 12px; font-size: 14px;
            backdrop-filter: blur(10px); cursor: pointer; text-decoration: none;
            pointer-events: auto; display: flex; align-items: center; gap: 6px;
        }

        .back-btn { background: #ff9f43; border: none; font-weight: bold; }

        #control-panel {
            position: fixed; top: 0; right: 0; width: 320px; height: 100%;
            background: var(--panel); border-left: 1px solid #333;
            z-index: 3000; padding: 30px 20px; box-sizing: border-box;
            transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-y: auto;
        }
        
        @media (min-width: 1024px) {
            #control-panel { transform: translateX(0); }
            #settings-toggle { display: none; }
        }

        @media (max-width: 1023px) {
            #control-panel { width: 85%; }
            #control-panel.active { transform: translateX(0); }
        }

        .section-title { font-size: 11px; color: #888; margin: 25px 0 10px; text-transform: uppercase; letter-spacing: 1px; }
        .control-group { margin-bottom: 18px; }
        .label-row { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px; }
        
        input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; }
        input[type=text] { width: 100%; padding: 12px; background: #1a1a25; border: 1px solid #444; color: #fff; border-radius: 8px; box-sizing: border-box; }

        .shape-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .shape-btn { padding: 10px; background: #222; border: 1px solid #444; color: #fff; border-radius: 6px; cursor: pointer; font-size: 12px; transition: 0.2s; }
        .shape-btn.active { background: var(--accent); border-color: var(--accent); font-weight: bold; }

        .apply-btn { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 10px; margin-top: 20px; font-weight: bold; cursor: pointer; }

        canvas { display: block; width: 100%; height: 100%; }
        #video-input { display: none; }

        #start-screen { position: fixed; inset: 0; z-index: 4000; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .start-btn { padding: 20px 60px; font-size: 22px; background: var(--accent); border: none; border-radius: 50px; color: #fff; font-weight: bold; cursor: pointer; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
</head>
<body>

    <div id="start-screen">
        <button class="start-btn" id="start-btn">开启互动烟花</button>
        <p style="margin-top: 20px; color: #666; font-size: 12px;">需要摄像头权限以实现手势互动</p>
    </div>

    <div class="top-nav">
        <a href="index.html" class="btn-ui back-btn">← 返回菜单</a>
        <button class="btn-ui" id="settings-toggle" style="background:var(--accent); border:none;" onclick="togglePanel()">⚙️ 设置参数</button>
    </div>

    <div id="control-panel">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <span style="font-weight: bold; color: var(--accent); letter-spacing: 2px;">QJ CONTROLS</span>
            <button onclick="togglePanel()" style="background:none; border:none; color:#fff; font-size:28px; cursor:pointer;">&times;</button>
        </div>

        <div class="section-title">爆炸形状 (Shape)</div>
        <div class="shape-grid">
            <button class="shape-btn" onclick="setShape('sphere', this)">Sphere</button>
            <button class="shape-btn" onclick="setShape('ring', this)">Ring</button>
            <button class="shape-btn" onclick="setShape('star', this)">Star</button>
            <button class="shape-btn active" onclick="setShape('text', this)">Text</button>
            <button class="shape-btn" onclick="setShape('heart', this)">Heart</button>
            <button class="shape-btn" onclick="setShape('burst', this)">Burst</button>
        </div>

        <div class="section-title">文字内容 (Text)</div>
        <input type="text" id="text-input" value="ドラえもん">

        <div class="section-title">物理参数 (Physics)</div>
        <div id="sliders"></div>

        <button class="apply-btn" onclick="togglePanel()">确认并应用参数</button>
        <button onclick="clearCanvas()" style="width:100%; margin-top:10px; padding:10px; background:none; border:1px solid #ff453a; color:#ff453a; border-radius:10px; cursor:pointer;">清空画布</button>
    </div>

    <video id="video-input" playsinline muted autoplay></video>
    <canvas id="canvas"></canvas>

<script>
    const setVH = () => document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
    window.addEventListener('resize', setVH); setVH();

    const config = { particles: 200, speed: 12, gravity: 0.15, friction: 0.96, fade: 0.015, hue: 210, trail: 0.18, shape: 'text' };
    
    function togglePanel() {
        document.getElementById('control-panel').classList.toggle('active');
    }

    const sliderDefs = [
        { id: 'particles', label: '粒子密度', min: 50, max: 800 },
        { id: 'speed', label: '爆炸力度', min: 5, max: 25 },
        { id: 'gravity', label: '重力感', min: 0, max: 0.4, step: 0.01 },
        { id: 'hue', label: '颜色色调', min: 0, max: 360 }
    ];

    sliderDefs.forEach(s => {
        const div = document.createElement('div');
        div.className = 'control-group';
        div.innerHTML = `<div class="label-row"><span>${s.label}</span><span id="${s.id}-v">${config[s.id]}</span></div>
                         <input type="range" id="${s.id}-s" min="${s.min}" max="${s.max}" step="${s.step||1}" value="${config[s.id]}">`;
        document.getElementById('sliders').appendChild(div);
        document.getElementById(`${s.id}-s`).oninput = (e) => {
            config[s.id] = parseFloat(e.target.value);
            document.getElementById(`${s.id}-v`).innerText = config[s.id];
        };
    });

    function setShape(type, btn) {
        config.shape = type;
        document.querySelectorAll('.shape-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d', { alpha: false });
    let fireworks = [], particles = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();

    function clearCanvas() { fireworks = []; particles = []; }

    function getPts(text) {
        const off = document.createElement('canvas'); const octx = off.getContext('2d');
        off.width = 300; off.height = 100; octx.font = "bold 40px sans-serif"; octx.fillStyle = "white"; octx.textAlign = "center";
        octx.fillText(text, 150, 60);
        const data = octx.getImageData(0,0,300,100).data; const pts = [];
        for(let y=0; y<100; y+=4) for(let x=0; x<300; x+=4) if(data[(y*300+x)*4+3]>128) pts.push({dx:x-150, dy:y-60});
        return pts;
    }

    class Particle {
        constructor(x,y,vx,vy,h) { this.x=x; this.y=y; this.vx=vx; this.vy=vy; this.hue=h; this.alpha=1; }
        update() { this.vx*=config.friction; this.vy*=config.friction; this.vy+=config.gravity; this.x+=this.vx; this.y+=this.vy; this.alpha-=config.fade; }
        draw() {
            ctx.globalCompositeOperation = 'lighter';
            ctx.fillStyle = `hsla(${this.hue},100%,70%,${this.alpha})`;
            ctx.fillRect(this.x, this.y, 2, 2);
        }
    }

    class Shell {
        constructor(x,y,charge) { this.x=x; this.y=y; this.ty=y-(charge*10)-100; this.h=config.hue; this.done=false; }
        update() {
            this.y += (this.ty - this.y) * 0.1;
            if(Math.abs(this.ty - this.y) < 5) {
                this.done = true;
                let pts = [];
                if(config.shape === 'text') pts = getPts(document.getElementById('text-input').value);
                const count = pts.length > 0 ? Math.min(pts.length, config.particles) : config.particles;
                for(let i=0; i<count; i++) {
                    let vx, vy;
                    if(pts.length > 0) {
                        const p = pts[Math.floor(Math.random()*pts.length)];
                        vx = p.dx * (config.speed/40); vy = p.dy * (config.speed/40);
                    } else {
                        const ang = Math.random()*Math.PI*2, spd = Math.random()*config.speed;
                        vx = Math.cos(ang)*spd; vy = Math.sin(ang)*spd;
                    }
                    particles.push(new Particle(this.x, this.y, vx, vy, this.h));
                }
            }
        }
        draw() { ctx.fillStyle=`hsl(${this.h},100%,70%)`; ctx.beginPath(); ctx.arc(this.x,this.y,3,0,7); ctx.fill(); }
    }

    // --- WebGL 容错改进 ---
    const hands = new Hands({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
    hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.5 });

    let hPos = {x:-100, y:-100}, isP = false, charge = 0;
    hands.onResults(res => {
        if(res.multiHandLandmarks && res.multiHandLandmarks[0]) {
            const h = res.multiHandLandmarks[0];
            hPos.x = (1 - h[8].x) * canvas.width; hPos.y = h[8].y * canvas.height;
            const dist = Math.sqrt(Math.pow(h[8].x-h[4].x,2)+Math.pow(h[8].y-h[4].y,2));
            if(dist < 0.08) { isP = true; charge = Math.min(charge + 1.2, 50); }
            else { if(isP && charge > 8) fireworks.push(new Shell(hPos.x, hPos.y, charge)); isP=false; charge=0; }
        }
    });

    const video = document.getElementById('video-input');
    const cam = new Camera(video, {
        onFrame: async () => { 
            // 优化：仅在视频准备就绪且没有 WebGL 错误时运行
            if(video.readyState >= 2) {
                try {
                    await hands.send({image: video});
                } catch(e) {
                    // 如果发生 WebGL 上下文丢失，静默处理不弹框
                    console.error("Hands processing error:", e);
                }
            }
        },
        width: 480, height: 360
    });

    document.getElementById('start-btn').onclick = () => {
        document.getElementById('start-screen').style.display = 'none';
        
        // 启动摄像头
        cam.start().catch(err => {
            console.error(err);
            alert("摄像头启动失败。请确保：\n1. 使用 HTTPS 访问\n2. 已授予摄像头权限\n3. 没有其他应用占用摄像头");
        });
        
        const loop = () => {
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = `rgba(5, 5, 8, ${config.trail})`;
            ctx.fillRect(0,0,canvas.width,canvas.height);
            fireworks.forEach((f,i) => { f.update(); f.draw(); if(f.done) fireworks.splice(i,1); });
            particles.forEach((p,i) => { p.update(); p.draw(); if(p.alpha <= 0) particles.splice(i,1); });
            if(isP) { 
                ctx.strokeStyle=`hsl(${config.hue},100%,60%)`; 
                ctx.lineWidth=2; 
                ctx.beginPath(); 
                ctx.arc(hPos.x,hPos.y,charge,0,7); 
                ctx.stroke(); 
            }
            requestAnimationFrame(loop);
        };
        loop();
    };
</script>
</body>
</html>
