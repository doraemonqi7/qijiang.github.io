<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Interactive Fireworks</title>
    <style>
        :root {
            --panel-bg: rgba(10, 10, 15, 0.9);
            --accent-orange: #ff9f43;
            --vh: 1vh; /* 动态高度单位 */
        }

        body, html {
            margin: 0; padding: 0; 
            width: 100%; height: 100%;
            height: calc(var(--vh, 1vh) * 100);
            background-color: #000; overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica;
            position: fixed; /* 防止橡皮筋回弹 */
        }

        /* 退出按钮 - 手机端缩小一点 */
        .exit-btn {
            position: absolute; top: 15px; left: 15px;
            z-index: 1000; padding: 8px 15px;
            font-size: 14px; font-weight: bold;
            color: #fff; background: var(--accent-orange);
            border-radius: 20px; text-decoration: none;
            display: flex; align-items: center; gap: 5px;
        }

        /* 手机端控制面板切换按钮 */
        #toggle-panel {
            position: absolute; top: 15px; right: 15px;
            z-index: 1000; padding: 8px;
            background: rgba(255,255,255,0.2); border-radius: 5px;
            color: white; border: none; display: none;
        }

        #start-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 50; background: radial-gradient(circle at center, #1a1a25 0%, #000 100%);
            padding: 20px; box-sizing: border-box;
        }

        #start-btn {
            padding: 15px 40px; font-size: 20px; color: #fff;
            background: linear-gradient(45deg, var(--accent-orange), #8a2be2);
            border: none; border-radius: 50px; font-weight: bold; margin-bottom: 30px;
        }

        .instruction-card {
            background: rgba(255,255,255,0.05); padding: 15px;
            border-radius: 12px; font-size: 14px; line-height: 1.6;
        }

        #control-panel {
            position: absolute; top: 0; right: 0; width: 280px; height: 100%;
            background: var(--panel-bg); border-left: 1px solid #333;
            overflow-y: auto; padding: 20px; box-sizing: border-box;
            z-index: 10; display: none; backdrop-filter: blur(10px);
            transition: transform 0.3s ease;
        }

        /* 手机端面板隐藏状态 */
        @media (max-width: 768px) {
            #control-panel { width: 70%; transform: translateX(100%); }
            #control-panel.open { transform: translateX(0); }
            #toggle-panel { display: block; }
        }

        .control-group { margin-bottom: 15px; }
        input[type=range] { width: 100%; }
        #video-input { display: none; }
        canvas { display: block; width: 100%; height: 100%; touch-action: none; }
        
        #bottom-bar { 
            position: absolute; bottom: 0; width: 100%; 
            background: rgba(0,0,0,0.5); font-size: 12px; 
            padding: 8px; text-align: center; color: #ccc; pointer-events: none;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <a href="new-media.html" class="exit-btn">← 返回</a>
    <button id="toggle-panel">⚙️ 设置</button>

    <div id="start-screen">
        <button id="start-btn">开启互动烟花</button>
        <div class="instruction-card">
            <h3 style="margin-top:0; color:var(--accent-orange)">操作指南 (请正对前置摄像头)</h3>
            <div>👆 <b>移动食指：</b> 屏幕绘图</div>
            <div>🤏 <b>捏合手指：</b> 蓄力 (拇指+食指)</div>
            <div>🖐️ <b>松开手指：</b> 发射烟花</div>
        </div>
    </div>

    <div id="control-panel">
        <div style="text-align:center; margin-bottom:20px; font-weight:bold">参数调节</div>
        <button class="btn" style="width:100%; padding:10px; margin-bottom:10px;" onclick="clearCanvas()">清空屏幕</button>
        
        <div class="control-group">
            <label>文字烟花内容:</label>
            <input type="text" id="text-input" value="HAPPY" style="width:100%; padding:8px; box-sizing:border-box">
        </div>

        <div id="sliders-container"></div>
    </div>

    <div id="bottom-bar">前置摄像头交互 | 建议在光线充足处使用</div>

    <video id="video-input" playsinline></video>
    <canvas id="canvas"></canvas>

<script>
    // 动态高度处理
    const setVH = () => {
        let vh = window.innerHeight * 0.01;
        document.documentElement.style.setProperty('--vh', `${vh}px`);
    };
    window.addEventListener('resize', setVH);
    setVH();

    const config = { particles: 150, explosionSpeed: 10, hue: 30, trail: 0.2, explosionShape: 'text' };
    
    // 初始化滑块
    const sliders = [
        { id: 'particles', label: '粒子数量', min: 50, max: 500 },
        { id: 'explosionSpeed', label: '爆炸力', min: 5, max: 20 },
        { id: 'hue', label: '颜色', min: 0, max: 360 }
    ];
    const container = document.getElementById('sliders-container');
    sliders.forEach(s => {
        const div = document.createElement('div');
        div.className = 'control-group';
        div.innerHTML = `<small>${s.label}</small><input type="range" id="${s.id}-slider" min="${s.min}" max="${s.max}" value="${config[s.id]}">`;
        container.appendChild(div);
        document.getElementById(`${s.id}-slider`).oninput = (e) => config[s.id] = parseInt(e.target.value);
    });

    // 手机端侧边栏切换
    document.getElementById('toggle-panel').onclick = () => {
        document.getElementById('control-panel').classList.toggle('open');
    };

    const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();

    const fireworks = [], particlesArray = [];
    function clearCanvas() { particlesArray.length = 0; fireworks.length = 0; }

    // 核心逻辑：获取文字像素点 (优化手机性能)
    function getShapePixels(content) {
        const off = document.createElement('canvas');
        const octx = off.getContext('2d');
        off.width = 300; off.height = 150;
        octx.font = "900 40px sans-serif"; octx.fillStyle = "white"; octx.textAlign = "center";
        octx.fillText(content, 150, 75);
        const data = octx.getImageData(0,0,300,150).data;
        const pts = [];
        for(let y=0; y<150; y+=4) for(let x=0; x<300; x+=4) {
            if(data[(y*300+x)*4+3]>128) pts.push({dx:x-150, dy:y-75});
        }
        return pts;
    }

    class Shell {
        constructor(x, y, charge) {
            this.x = x; this.y = y;
            this.targetY = y - (charge * 8) - 100;
            this.hue = config.hue; this.exploded = false;
        }
        update() {
            this.y += (this.targetY - this.y) * 0.1;
            if(Math.abs(this.targetY - this.y) < 5) { this.exploded = true; this.explode(); }
        }
        draw() {
            ctx.beginPath(); ctx.arc(this.x, this.y, 4, 0, Math.PI*2);
            ctx.fillStyle = `hsl(${this.hue}, 100%, 70%)`; ctx.fill();
        }
        explode() {
            const pts = getShapePixels(document.getElementById('text-input').value);
            const count = Math.min(pts.length, config.particles);
            for(let i=0; i<count; i++) {
                const p = pts[Math.floor(Math.random()*pts.length)];
                particlesArray.push(new Particle(this.x, this.y, p.dx*(config.explosionSpeed/40), p.dy*(config.explosionSpeed/40), this.hue));
            }
        }
    }

    class Particle {
        constructor(x,y,vx,vy,h) { this.x=x; this.y=y; this.vx=vx; this.vy=vy; this.hue=h; this.alpha=1; }
        update() { 
            this.vx *= 0.95; this.vy *= 0.95; this.vy += 0.15; 
            this.x += this.vx; this.y += this.vy; this.alpha -= 0.02; 
        }
        draw() {
            ctx.fillStyle = `hsla(${this.hue},100%,70%,${this.alpha})`;
            ctx.fillRect(this.x, this.y, 2, 2);
        }
    }

    let handPos = {x:-100, y:-100}, isPinching = false, charge = 0;
    
    function onResults(res) {
        if(res.multiHandLandmarks && res.multiHandLandmarks[0]) {
            const h = res.multiHandLandmarks[0];
            // 重点：镜像处理 (1-x)
            handPos.x = (1-h[8].x) * canvas.width; 
            handPos.y = h[8].y * canvas.height;
            
            const dist = Math.sqrt(Math.pow(h[8].x-h[4].x,2)+Math.pow(h[8].y-h[4].y,2));
            if(dist < 0.06) { 
                isPinching = true; charge = Math.min(charge+1.5, 50);
                // 充电视觉反馈
                ctx.strokeStyle = 'white'; ctx.beginPath();
                ctx.arc(handPos.x, handPos.y, charge, 0, Math.PI*2); ctx.stroke();
            } else {
                if(isPinching && charge > 8) fireworks.push(new Shell(handPos.x, handPos.y, charge));
                isPinching = false; charge = 0;
            }
        }
    }

    const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
    hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    hands.onResults(onResults);

    // 重点：强制调用前置摄像头
    const camera = new Camera(document.getElementById('video-input'), {
        onFrame: async () => { await hands.send({image: document.getElementById('video-input')}); },
        width: 480, height: 360,
        facingMode: 'user' // 强制前置
    });

    document.getElementById('start-btn').onclick = () => {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('control-panel').style.display = 'block';
        camera.start().catch(err => alert("无法打开摄像头，请确保授权并使用HTTPS访问"));
        
        requestAnimationFrame(function loop(){
            ctx.fillStyle = `rgba(0,0,0,${config.trail})`;
            ctx.fillRect(0,0,canvas.width,canvas.height);
            
            fireworks.forEach((f,i) => { f.update(); f.draw(); if(f.exploded) fireworks.splice(i,1); });
            particlesArray.forEach((p,i) => { 
                p.update(); p.draw(); 
                if(p.alpha <= 0) particlesArray.splice(i,1); 
            });
            requestAnimationFrame(loop);
        });
    };
</script>
</body>
</html>
