<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyberpunk Fireworks | QI JIANG</title>
    <style>
        :root {
            --accent-purple: #bf5af2;
            --accent-blue: #5ac8fa;
            --bg-dark: #0a0a0f;
            --vh: 1vh;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            height: calc(var(--vh, 1vh) * 100);
            background-color: var(--bg-dark); overflow: hidden;
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #fff;
        }

        /* 顶部导航 */
        .nav-header {
            position: absolute; top: 0; left: 0; width: 100%;
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; box-sizing: border-box; z-index: 100;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }

        .btn-ui {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: #fff; padding: 8px 16px; border-radius: 8px; font-size: 14px;
            text-decoration: none; backdrop-filter: blur(10px); cursor: pointer;
        }

        .btn-ui.primary { background: var(--accent-purple); border: none; font-weight: bold; }

        /* 全屏控制面板 */
        #control-panel {
            position: fixed; inset: 0; background: rgba(10, 10, 15, 0.98);
            z-index: 1000; display: none; flex-direction: column;
            padding: 40px 25px; overflow-y: auto;
        }
        #control-panel.active { display: flex; }

        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .panel-title { font-size: 20px; font-weight: bold; letter-spacing: 2px; color: var(--accent-blue); }

        .control-group { margin-bottom: 20px; }
        .control-label { display: flex; justify-content: space-between; font-size: 12px; color: #888; margin-bottom: 10px; }
        .control-label span:last-child { color: var(--accent-purple); }

        input[type=range] { 
            width: 100%; height: 4px; background: #333; border-radius: 2px;
            appearance: none; outline: none;
        }
        input[type=range]::-webkit-slider-thumb {
            appearance: none; width: 18px; height: 18px; background: var(--accent-purple);
            border-radius: 50%; box-shadow: 0 0 10px var(--accent-purple);
        }

        #text-input {
            width: 100%; background: #1a1a25; border: 1px solid #333;
            color: #fff; padding: 12px; border-radius: 8px; font-size: 16px;
            box-sizing: border-box; text-align: center;
        }

        /* 画布与视频 */
        canvas { display: block; width: 100%; height: 100%; }
        #video-input { display: none; }

        #start-screen {
            position: fixed; inset: 0; z-index: 2000; background: var(--bg-dark);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .glow-btn {
            padding: 18px 45px; font-size: 20px; background: var(--accent-purple);
            border: none; border-radius: 50px; color: #fff; font-weight: bold;
            box-shadow: 0 0 20px rgba(191, 90, 242, 0.5); cursor: pointer;
        }

        #bottom-hint {
            position: absolute; bottom: 20px; width: 100%; text-align: center;
            font-size: 12px; color: rgba(255,255,255,0.4); pointer-events: none;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="start-screen">
        <button class="glow-btn" id="start-btn">开启赛博烟花</button>
        <p style="color:#555; margin-top:20px;">建议开启前置摄像头并正对光线</p>
    </div>

    <header class="nav-header">
        <a href="new-media.html" class="btn-ui">← 返回</a>
        <button class="btn-ui primary" onclick="togglePanel()">⚙️ 设置参数</button>
    </header>

    <div id="control-panel">
        <div class="panel-header">
            <div class="panel-title">LUMI CONTROLS</div>
            <button class="btn-ui" onclick="togglePanel()">关闭面板</button>
        </div>

        <div class="control-group">
            <div class="control-label">烟花文字内容</div>
            <input type="text" id="text-input" value="ドラえもん" maxlength="10">
        </div>

        <div id="sliders-box"></div>

        <button onclick="clearCanvas()" style="margin-top:20px; padding:15px; background:none; border:1px solid #ff3b30; color:#ff3b30; border-radius:8px; cursor:pointer;">清空画布内容</button>
    </div>

    <div id="bottom-hint">✨ 捏合手指蓄力 | 松开手指发射</div>

    <video id="video-input" playsinline></video>
    <canvas id="canvas"></canvas>

<script>
    // 设置动态高度
    const setVH = () => document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
    window.addEventListener('resize', setVH); setVH();

    // 1. 核心配置 (炸出截图效果的关键参数)
    const config = {
        particles: 250,
        speed: 12,
        gravity: 0.18,
        friction: 0.96,
        fade: 0.015,
        hue: 210,
        trail: 0.15
    };

    const togglePanel = () => document.getElementById('control-panel').classList.toggle('active');

    // 2. 动态生成滑块 (还原截图右侧栏)
    const sliders = [
        { id: 'particles', label: 'PARTICLES', min: 50, max: 1000 },
        { id: 'speed', label: 'EXPLOSION SPEED', min: 5, max: 30 },
        { id: 'gravity', label: 'GRAVITY', min: 0, max: 0.5, step: 0.01 },
        { id: 'hue', label: 'HUE', min: 0, max: 360 }
    ];

    const box = document.getElementById('sliders-box');
    sliders.forEach(s => {
        const div = document.createElement('div');
        div.className = 'control-group';
        div.innerHTML = `
            <div class="control-label"><span>${s.label}</span><span id="${s.id}-v">${config[s.id]}</span></div>
            <input type="range" id="${s.id}-s" min="${s.min}" max="${s.max}" step="${s.step || 1}" value="${config[s.id]}">
        `;
        box.appendChild(div);
        document.getElementById(`${s.id}-s`).oninput = (e) => {
            config[s.id] = parseFloat(e.target.value);
            document.getElementById(`${s.id}-v`).innerText = config[s.id];
        };
    });

    // 3. 渲染引擎
    const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
    let fireworks = [], particles = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();

    function clearCanvas() { fireworks = []; particles = []; }

    function getShapePts(text) {
        const off = document.createElement('canvas');
        const octx = off.getContext('2d');
        off.width = 300; off.height = 100;
        octx.font = "bold 40px sans-serif"; octx.fillStyle = "white"; octx.textAlign = "center";
        octx.fillText(text, 150, 60);
        const data = octx.getImageData(0,0,300,100).data;
        const pts = [];
        for(let y=0; y<100; y+=3) for(let x=0; x<300; x+=3) {
            if(data[(y*300+x)*4+3] > 128) pts.push({dx:x-150, dy:y-60});
        }
        return pts;
    }

    class Particle {
        constructor(x,y,vx,vy,h) { this.x=x; this.y=y; this.vx=vx; this.vy=vy; this.hue=h; this.alpha=1; }
        update() { 
            this.vx *= config.friction; this.vy *= config.friction; 
            this.vy += config.gravity; this.x += this.vx; this.y += this.vy; 
            this.alpha -= config.fade; 
        }
        draw() {
            // 霓虹发光核心：叠加模式
            ctx.globalCompositeOperation = 'lighter';
            ctx.fillStyle = `hsla(${this.hue}, 100%, 70%, ${this.alpha})`;
            ctx.shadowBlur = 5; ctx.shadowColor = `hsl(${this.hue}, 100%, 50%)`;
            ctx.fillRect(this.x, this.y, 2, 2);
            ctx.shadowBlur = 0;
        }
    }

    class Firework {
        constructor(x, y, charge) {
            this.x = x; this.y = y; this.targetY = y - (charge * 10) - 100;
            this.hue = config.hue; this.exploded = false;
        }
        update() {
            this.y += (this.targetY - this.y) * 0.1;
            if(Math.abs(this.targetY - this.y) < 5) {
                this.exploded = true;
                const pts = getShapePts(document.getElementById('text-input').value);
                const count = Math.min(pts.length, config.particles);
                for(let i=0; i<count; i++) {
                    const p = pts[Math.floor(Math.random()*pts.length)];
                    particles.push(new Particle(this.x, this.y, p.dx*(config.speed/30), p.dy*(config.speed/30), this.hue));
                }
            }
        }
        draw() {
            ctx.fillStyle = `hsl(${this.hue}, 100%, 70%)`;
            ctx.beginPath(); ctx.arc(this.x, this.y, 3, 0, Math.PI*2); ctx.fill();
        }
    }

    // 4. MediaPipe 手势识别 (解决报错版)
    const hands = new Hands({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
    hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.6 });

    let handPos = {x:-100, y:-100}, isPinching = false, charge = 0;
    hands.onResults(res => {
        if(res.multiHandLandmarks && res.multiHandLandmarks[0]) {
            const h = res.multiHandLandmarks[0];
            handPos.x = (1 - h[8].x) * canvas.width;
            handPos.y = h[8].y * canvas.height;
            const dist = Math.sqrt(Math.pow(h[8].x-h[4].x,2)+Math.pow(h[8].y-h[4].y,2));
            if(dist < 0.07) { isPinching = true; charge = Math.min(charge + 1.5, 60); }
            else { if(isPinching && charge > 10) fireworks.push(new Firework(handPos.x, handPos.y, charge)); isPinching=false; charge=0; }
        }
    });

    const video = document.getElementById('video-input');
    const cam = new Camera(video, {
        onFrame: async () => { if(video.readyState >= 2) try { await hands.send({image: video}); } catch(e) {} },
        width: 480, height: 360, facingMode: 'user'
    });

    document.getElementById('start-btn').onclick = () => {
        document.getElementById('start-screen').style.display = 'none';
        cam.start();
        const loop = () => {
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = `rgba(10, 10, 15, ${config.trail})`;
            ctx.fillRect(0,0,canvas.width,canvas.height);
            
            fireworks.forEach((f,i) => { f.update(); f.draw(); if(f.exploded) fireworks.splice(i,1); });
            particles.forEach((p,i) => { p.update(); p.draw(); if(p.alpha <= 0) particles.splice(i,1); });
            
            if(isPinching) {
                ctx.strokeStyle = `hsl(${config.hue}, 100%, 60%)`;
                ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(handPos.x, handPos.y, charge, 0, 7); ctx.stroke();
            }
            requestAnimationFrame(loop);
        };
        loop();
    };
</script>
</body>
</html>
