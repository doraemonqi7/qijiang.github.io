<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyberpunk Fireworks | LUMI</title>
    <style>
        :root {
            --accent: #bf5af2;
            --bg: #0a0a0f;
            --panel: rgba(16, 16, 22, 0.95);
            --vh: 1vh;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            height: calc(var(--vh, 1vh) * 100);
            background: var(--bg); overflow: hidden;
            font-family: -apple-system, system-ui, sans-serif;
            color: #fff;
        }

        /* 顶部导航与开关 */
        .ui-header {
            position: absolute; top: 0; left: 0; width: 100%;
            padding: 15px; display: flex; justify-content: space-between;
            z-index: 100; box-sizing: border-box;
        }

        .btn-ui {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: #fff; padding: 10px 18px; border-radius: 12px; font-size: 14px;
            backdrop-filter: blur(10px); cursor: pointer; display: flex; align-items: center; gap: 6px;
        }

        /* 核心修复：侧边设置栏适配 */
        #control-panel {
            position: fixed; top: 0; right: 0; width: 320px; height: 100%;
            background: var(--panel); border-left: 1px solid #333;
            z-index: 1000; padding: 30px 20px; box-sizing: border-box;
            transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-y: auto; box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        }

        #control-panel.active { transform: translateX(0); }

        /* 手机端全屏适配 */
        @media (max-width: 768px) {
            #control-panel { width: 85%; }
        }

        .section-title { font-size: 12px; color: #888; letter-spacing: 2px; margin: 25px 0 15px; text-transform: uppercase; }
        .control-group { margin-bottom: 20px; }
        .label-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 8px; }
        .label-row span:last-child { color: var(--accent); font-family: monospace; }

        input[type=range] { width: 100%; height: 4px; background: #333; border-radius: 2px; appearance: none; outline: none; }
        input[type=range]::-webkit-slider-thumb { appearance: none; width: 18px; height: 18px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 10px var(--accent); cursor: pointer; }

        input[type=text] { width: 100%; background: #1a1a25; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 8px; font-size: 16px; box-sizing: border-box; }

        .shape-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .shape-btn { padding: 8px; background: #222; border: 1px solid #444; color: #fff; border-radius: 6px; font-size: 12px; cursor: pointer; }
        .shape-btn.active { background: var(--accent); border-color: var(--accent); }

        canvas { display: block; width: 100%; height: 100%; }
        #video-input { display: none; }

        #start-screen { position: fixed; inset: 0; z-index: 2000; background: var(--bg); display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .start-btn { padding: 18px 45px; font-size: 20px; background: var(--accent); border: none; border-radius: 50px; color: #fff; font-weight: bold; box-shadow: 0 0 20px rgba(191,90,242,0.4); cursor: pointer; }

        #bottom-bar { position: absolute; bottom: 0; width: 100%; padding: 10px; background: linear-gradient(transparent, rgba(0,0,0,0.8)); text-align: center; font-size: 12px; color: rgba(255,255,255,0.4); pointer-events: none; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="start-screen">
        <button class="start-btn" id="start-btn">开启互动烟花</button>
        <p style="color:#555; margin-top:20px; font-size: 12px;">建议在 Safari/Chrome 浏览器中打开</p>
    </div>

    <div class="ui-header">
        <a href="new-media.html" class="btn-ui">← 返回</a>
        <button class="btn-ui" onclick="togglePanel()" id="settings-btn">⚙️ 设置</button>
    </div>

    <div id="control-panel">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <span style="font-weight: bold; letter-spacing: 1px;">LUMI CONTROLS</span>
            <button onclick="togglePanel()" style="background:none; border:none; color:#888; font-size:24px;">×</button>
        </div>

        <div class="section-title">Explosion Shape</div>
        <div class="shape-grid">
            <button class="shape-btn" onclick="setShape('sphere', this)">Sphere</button>
            <button class="shape-btn" onclick="setShape('ring', this)">Ring</button>
            <button class="shape-btn" onclick="setShape('star', this)">Star</button>
            <button class="shape-btn active" onclick="setShape('text', this)">Text</button>
            <button class="shape-btn" onclick="setShape('heart', this)">Heart</button>
            <button class="shape-btn" onclick="setShape('burst', this)">Burst</button>
        </div>

        <div class="section-title">Text Content</div>
        <input type="text" id="text-input" value="ドラえもん">

        <div class="section-title">Physics & Visuals</div>
        <div id="sliders-cont"></div>

        <button onclick="clearCanvas()" style="width:100%; margin-top:30px; padding:12px; background:none; border:1px solid #ff453a; color:#ff453a; border-radius:8px;">CLEAR CANVAS</button>
    </div>

    <div id="bottom-bar">✨仙女棒 | ⚡️捏合蓄力 | 🎆松开发射</div>

    <video id="video-input" playsinline></video>
    <canvas id="canvas"></canvas>

<script>
    // 适配动态高度
    const setVH = () => document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
    window.addEventListener('resize', setVH); setVH();

    // 1. 完全对标截图的参数预设
    const config = {
        particles: 250,
        explosionSpeed: 12,
        gravity: 0.18,
        friction: 0.96,
        fadeOut: 0.015,
        hue: 210,
        trail: 0.15,
        shape: 'text'
    };

    const togglePanel = () => document.getElementById('control-panel').classList.toggle('active');

    // 2. 动态滑块生成
    const sliderDefs = [
        { id: 'particles', label: 'PARTICLES', min: 50, max: 1000 },
        { id: 'explosionSpeed', label: 'EXPLOSION SPEED', min: 5, max: 30 },
        { id: 'gravity', label: 'GRAVITY', min: 0, max: 0.5, step: 0.01 },
        { id: 'friction', label: 'FRICTION', min: 0.8, max: 1, step: 0.01 },
        { id: 'fadeOut', label: 'FADE OUT', min: 0.005, max: 0.05, step: 0.005 },
        { id: 'hue', label: 'HUE', min: 0, max: 360 }
    ];

    const cont = document.getElementById('sliders-cont');
    sliderDefs.forEach(s => {
        const div = document.createElement('div');
        div.className = 'control-group';
        div.innerHTML = `
            <div class="label-row"><span>${s.label}</span><span id="${s.id}-v">${config[s.id]}</span></div>
            <input type="range" id="${s.id}-s" min="${s.min}" max="${s.max}" step="${s.step || 1}" value="${config[s.id]}">
        `;
        cont.appendChild(div);
        document.getElementById(`${s.id}-s`).oninput = (e) => {
            config[s.id] = parseFloat(e.target.value);
            document.getElementById(`${s.id}-v`).innerText = config[s.id];
        };
    });

    function setShape(type, btn) {
        config.shape = type;
        document.querySelectorAll('.shape-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    // 3. 霓虹发光引擎
    const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d', { alpha: false });
    let fireworks = [], particles = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();

    function clearCanvas() { fireworks = []; particles = []; }

    function getPoints(text) {
        const off = document.createElement('canvas');
        const octx = off.getContext('2d');
        off.width = 300; off.height = 100;
        octx.font = "bold 40px sans-serif"; octx.fillStyle = "white"; octx.textAlign = "center";
        octx.fillText(text, 150, 60);
        const data = octx.getImageData(0,0,300,100).data;
        const pts = [];
        for(let y=0; y<100; y+=3) for(let x=0; x<300; x+=3) {
            if(data[(y*300+x)*4+3] > 128) pts.push({dx:x-150, dy:y-60});
        }
        return pts;
    }

    class Particle {
        constructor(x,y,vx,vy,h) { this.x=x; this.y=y; this.vx=vx; this.vy=vy; this.hue=h; this.alpha=1; }
        update() { 
            this.vx *= config.friction; this.vy *= config.friction; 
            this.vy += config.gravity; this.x += this.vx; this.y += this.vy; 
            this.alpha -= config.fadeOut; 
        }
        draw() {
            ctx.globalCompositeOperation = 'lighter'; // 霓虹光叠加
            ctx.fillStyle = `hsla(${this.hue}, 100%, 70%, ${this.alpha})`;
            ctx.shadowBlur = 4; ctx.shadowColor = `hsl(${this.hue}, 100%, 50%)`;
            ctx.fillRect(this.x, this.y, 2, 2);
            ctx.shadowBlur = 0;
        }
    }

    class Shell {
        constructor(x, y, charge) {
            this.x = x; this.y = y; this.targetY = y - (charge * 10) - 100;
            this.hue = config.hue; this.exploded = false;
        }
        update() {
            this.y += (this.targetY - this.y) * 0.1;
            if(Math.abs(this.targetY - this.y) < 5) {
                this.exploded = true;
                const pts = config.shape === 'text' ? getPoints(document.getElementById('text-input').value) : [];
                const count = pts.length > 0 ? Math.min(pts.length, config.particles) : config.particles;
                for(let i=0; i<count; i++) {
                    let vx, vy;
                    if(pts.length > 0) {
                        const p = pts[Math.floor(Math.random()*pts.length)];
                        vx = p.dx * (config.explosionSpeed/40); vy = p.dy * (config.explosionSpeed/40);
                    } else {
                        const ang = Math.random()*Math.PI*2, spd = Math.random()*config.explosionSpeed;
                        vx = Math.cos(ang)*spd; vy = Math.sin(ang)*spd;
                    }
                    particles.push(new Particle(this.x, this.y, vx, vy, this.hue));
                }
            }
        }
        draw() {
            ctx.fillStyle = `hsl(${this.hue}, 100%, 70%)`;
            ctx.beginPath(); ctx.arc(this.x, this.y, 3, 0, 7); ctx.fill();
        }
    }

    // 4. MediaPipe & Camera (报错修复版)
    const hands = new Hands({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
    hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.5 });

    let handPos = {x:-100, y:-100}, isPinching = false, charge = 0;
    hands.onResults(res => {
        if(res.multiHandLandmarks && res.multiHandLandmarks[0]) {
            const h = res.multiHandLandmarks[0];
            handPos.x = (1 - h[8].x) * canvas.width;
            handPos.y = h[8].y * canvas.height;
            const dist = Math.sqrt(Math.pow(h[8].x-h[4].x,2)+Math.pow(h[8].y-h[4].y,2));
            if(dist < 0.07) { isPinching = true; charge = Math.min(charge + 1.2, 55); }
            else { if(isPinching && charge > 8) fireworks.push(new Shell(handPos.x, handPos.y, charge)); isPinching=false; charge=0; }
        }
    });

    const video = document.getElementById('video-input');
    const cam = new Camera(video, {
        onFrame: async () => { if(video.readyState >= 2) try { await hands.send({image: video}); } catch(e) {} },
        width: 480, height: 360, facingMode: 'user'
    });

    document.getElementById('start-btn').onclick = () => {
        document.getElementById('start-screen').style.display = 'none';
        cam.start().catch(() => alert("摄像头开启失败"));
        
        const loop = () => {
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = `rgba(10, 10, 15, ${config.trail})`;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            fireworks.forEach((f,i) => { f.update(); f.draw(); if(f.exploded) fireworks.splice(i,1); });
            particles.forEach((p,i) => { p.update(); p.draw(); if(p.alpha <= 0) particles.splice(i,1); });
            
            if(isPinching) {
                ctx.strokeStyle = `hsl(${config.hue}, 100%, 60%)`;
                ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(handPos.x, handPos.y, charge, 0, 7); ctx.stroke();
            }
            requestAnimationFrame(loop);
        };
        loop();
    };
</script>
</body>
</html>
