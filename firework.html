<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Interactive Fireworks Masterpiece | QJ</title>
    <style>
        :root { --accent: #bf5af2; --bg: #030305; --panel: rgba(10, 10, 15, 0.98); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); overflow: hidden; font-family: 'Gochi Hand', -apple-system, sans-serif; color: #fff; }
        canvas { display: block; width: 100%; height: 100%; position: absolute; z-index: 1; }
        
        /* 顶部导航：修改返回链接 */
        .top-nav { position: absolute; top: 0; left: 0; width: 100%; padding: 15px; display: flex; justify-content: space-between; z-index: 100; box-sizing: border-box; pointer-events: none; }
        .btn-ui { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: #fff; padding: 10px 18px; border-radius: 12px; font-size: 14px; backdrop-filter: blur(15px); cursor: pointer; pointer-events: auto; text-decoration: none; display: flex; align-items: center; }
        
        /* 设置面板 */
        #control-panel { position: fixed; top: 0; right: 0; width: 320px; height: 100%; background: var(--panel); border-left: 1px solid #333; z-index: 200; padding: 30px 20px; box-sizing: border-box; transform: translateX(100%); transition: 0.3s cubic-bezier(0.165, 0.84, 0.44, 1); overflow-y: auto; }
        #control-panel.active { transform: translateX(0); }
        .section-title { font-size: 11px; color: #888; margin: 20px 0 10px; text-transform: uppercase; letter-spacing: 1px; }
        .shape-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 5px; }
        .shape-btn { padding: 12px 5px; background: #1a1a1a; border: 1px solid #333; color: #888; border-radius: 8px; cursor: pointer; font-size: 12px; transition: 0.2s; }
        .shape-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: bold; }
        input[type=range] { width: 100%; accent-color: var(--accent); margin: 10px 0; }
        input[type=text] { width: 100%; padding: 12px; background: #000; border: 1px solid #444; color: #fff; border-radius: 8px; box-sizing: border-box; }
        .apply-btn { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 12px; margin-top: 25px; font-weight: bold; cursor: pointer; }
        
        /* 开始与玩法说明 */
        #start-screen { position: fixed; inset: 0; z-index: 500; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .how-to-play { color: #888; margin-top: 30px; font-size: 1.1rem; line-height: 1.6; max-width: 80%; }
        .highlight { color: var(--accent); font-weight: bold; }
        .start-btn { padding: 20px 60px; font-size: 22px; background: var(--accent); border: none; border-radius: 50px; color: #fff; font-weight: bold; cursor: pointer; box-shadow: 0 0 30px rgba(191,90,242,0.4); }
        
        #video-input { display: none; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

<div id="start-screen">
    <button class="start-btn" id="start-btn">放烟花啦～</button>
    <div class="how-to-play">
        <p>🖐️ <span class="highlight">交互玩法说明：</span></p>
        <p>1. 请确保在 <span class="highlight">HTTPS</span> 环境下开启摄像头权限</p>
        <p>2. 伸出食指与大拇指 <span class="highlight">“捏合”</span> 即可蓄力光圈</p>
        <p>3. 蓄力后 <span class="highlight">“松开”</span> 即可向该位置发射定制烟花</p>
    </div>
</div>

<div class="top-nav">
    <a href="new-media.html" class="btn-ui" style="background:#ff9f43">← 返回菜单</a>
    <button class="btn-ui" style="background:var(--accent)" onclick="document.getElementById('control-panel').classList.add('active')">⚙️ 设置参数</button>
</div>

<div id="control-panel">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <span style="font-weight:bold; color:var(--accent)">LUMI 3.5</span>
        <button onclick="document.getElementById('control-panel').classList.remove('active')" style="background:none; border:none; color:#fff; font-size:24px;">&times;</button>
    </div>
    <div class="section-title">文字 (TEXT)</div>
    <input type="text" id="text-input" value="ドラえもん">
    <div class="section-title">形状 (SHAPE)</div>
    <div class="shape-grid">
        <button class="shape-btn" data-shape="sphere">Sphere</button>
        <button class="shape-btn" data-shape="ring">Ring</button>
        <button class="shape-btn" data-shape="star">Star</button>
        <button class="shape-btn active" data-shape="text">Text</button>
        <button class="shape-btn" data-shape="heart">Heart</button>
        <button class="shape-btn" data-shape="burst">Burst</button>
    </div>
    <div id="sliders" style="margin-top:10px"></div>
    <button class="apply-btn" onclick="document.getElementById('control-panel').classList.remove('active')">确认应用</button>
</div>

<video id="video-input" playsinline muted autoplay></video>
<canvas id="canvas"></canvas>

<script>
    const config = { particles: 450, speed: 16, gravity: 0.18, hue: 280, variance: 60, trail: 0.18, shape: 'text' };
    const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d', { alpha: false });
    let fireworks = [], particles = [];

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();

    const sliderDefs = [
        { id: 'particles', label: '粒子密度', min: 100, max: 1500 },
        { id: 'speed', label: '爆炸推力', min: 8, max: 35 },
        { id: 'gravity', label: '重力感', min: 0.1, max: 0.6, step: 0.01 },
        { id: 'variance', label: '光谱范围', min: 0, max: 180 }
    ];

    sliderDefs.forEach(s => {
        const div = document.createElement('div');
        div.innerHTML = `<div style="display:flex; justify-content:space-between; font-size:11px; margin-top:18px; color:#666;"><span>${s.label}</span><span id="${s.id}-v">${config[s.id]}</span></div>
                         <input type="range" id="${s.id}-s" min="${s.min}" max="${s.max}" step="${s.step||1}" value="${config[s.id]}">`;
        document.getElementById('sliders').appendChild(div);
        document.getElementById(`${s.id}-s`).oninput = (e) => {
            config[s.id] = parseFloat(e.target.value);
            document.getElementById(`${s.id}-v`).innerText = config[s.id];
        };
    });

    document.querySelectorAll('.shape-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.shape-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            config.shape = btn.getAttribute('data-shape');
        };
    });

    class Particle {
        constructor(x, y, vx, vy, h, size = 3.5, life = 1) {
            this.x = x; this.y = y; this.vx = vx; this.vy = vy;
            this.h = h + (Math.random() * config.variance - config.variance/2);
            this.alpha = life;
            this.size = size * (0.7 + Math.random() * 0.6);
            this.decay = 0.005 + Math.random() * 0.015;
            this.friction = 0.94;
        }
        update() {
            this.vx *= this.friction; this.vy *= this.friction; this.vy += config.gravity;
            this.x += this.vx; this.y += this.vy; this.alpha -= this.decay;
        }
        draw() {
            if(this.alpha <= 0) return;
            ctx.globalCompositeOperation = 'lighter';
            const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
            grad.addColorStop(0, `hsla(${this.h}, 100%, 90%, ${this.alpha})`);
            grad.addColorStop(0.4, `hsla(${this.h}, 100%, 60%, ${this.alpha * 0.8})`);
            grad.addColorStop(1, `hsla(${this.h}, 100%, 40%, 0)`);
            ctx.fillStyle = grad;
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
        }
    }

    class Shell {
        constructor(x, y, charge) {
            this.x = x; this.y = y;
            const minH = window.innerHeight * 0.12;
            const maxH = window.innerHeight * 0.45;
            this.targetY = Math.max(minH, Math.min(maxH, y - (charge * 18)));
            this.hue = Math.random() * 360; 
            this.done = false;
            this.lockedShape = config.shape;
        }
        update() {
            let dist = this.y - this.targetY;
            this.y -= (dist * 0.12) + 2.5; 
            if (Math.random() > 0.4) {
                particles.push(new Particle(this.x, this.y, (Math.random()-0.5)*1.5, Math.random()*1.5, this.hue, 2.0, 0.4));
            }
            if (this.y <= this.targetY + 5) { this.done = true; this.explode(); }
        }
        draw() {
            ctx.fillStyle = `hsl(${this.hue}, 100%, 85%)`;
            ctx.beginPath(); ctx.arc(this.x, this.y, 4, 0, Math.PI*2); ctx.fill();
        }
        explode() {
            let pts = [];
            if (this.lockedShape === 'text') {
                const off = document.createElement('canvas'); const octx = off.getContext('2d');
                off.width = 400; off.height = 150; 
                octx.font = "bold 50px 'Gochi Hand', sans-serif"; 
                octx.fillStyle = "white"; octx.textAlign = "center";
                octx.fillText(document.getElementById('text-input').value, 200, 80);
                const data = octx.getImageData(0,0,400,150).data;
                for(let y=0; y<150; y+=4) for(let x=0; x<400; x+=4) if(data[(y*400+x)*4+3]>128) pts.push({dx:x-200, dy:y-80});
            } else if (this.lockedShape === 'heart') {
                for(let i=0; i<config.particles; i++) {
                    const t = Math.random() * Math.PI * 2;
                    pts.push({ dx: 16 * Math.pow(Math.sin(t), 3) * 8, dy: -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * 8 });
                }
            } else if (this.lockedShape === 'star') {
                for(let i=0; i<config.particles; i++) {
                    const l = i % 2 === 0 ? 120 : 60, ang = (i / config.particles) * Math.PI * 10;
                    pts.push({ dx: Math.cos(ang) * l, dy: Math.sin(ang) * l });
                }
            } else if (this.lockedShape === 'ring') {
                for(let i=0; i<config.particles; i++) {
                    const ang = (i / config.particles) * Math.PI * 2, l = 120;
                    pts.push({ dx: Math.cos(ang) * l, dy: Math.sin(ang) * l });
                }
            }
            const usePts = pts.length > 0;
            const finalCount = usePts ? Math.min(pts.length, config.particles) : config.particles;
            for (let i = 0; i < finalCount; i++) {
                let vx, vy;
                if (usePts) {
                    const p = pts[i % pts.length];
                    const scatter = 0.9 + Math.random() * 0.3;
                    vx = p.dx * (config.speed/80) * scatter; vy = p.dy * (config.speed/80) * scatter;
                } else {
                    const ang = Math.random() * Math.PI * 2, spd = Math.random() * config.speed;
                    vx = Math.cos(ang) * spd; vy = Math.sin(ang) * spd;
                }
                particles.push(new Particle(this.x, this.y, vx, vy, this.hue, 4.5));
            }
        }
    }

    const hands = new Hands({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
    hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7 });

    let hPos = {x:0, y:0}, isPinching = false, charge = 0;

    hands.onResults(res => {
        if(res.multiHandLandmarks && res.multiHandLandmarks[0]) {
            const h = res.multiHandLandmarks[0];
            const indexF = h[8], thumbF = h[4];
            hPos.x = (1 - indexF.x) * canvas.width; hPos.y = indexF.y * canvas.height;
            const dist = Math.sqrt(Math.pow(indexF.x - thumbF.x, 2) + Math.pow(indexF.y - thumbF.y, 2));
            if(dist < 0.1) { 
                isPinching = true; charge += 2.5; 
            } else { 
                if(isPinching && charge > 10) fireworks.push(new Shell(hPos.x, hPos.y, Math.min(charge, 100)));
                isPinching = false; charge = 0; 
            }
        } else { isPinching = false; charge = 0; }
    });

    const cam = new Camera(document.getElementById('video-input'), {
        onFrame: async () => { try { await hands.send({image: document.getElementById('video-input')}); } catch(e){} },
        width: 640, height: 480
    });

    document.getElementById('start-btn').onclick = () => {
        document.getElementById('start-screen').style.display = 'none';
        cam.start();
        const loop = () => {
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = `rgba(3, 3, 5, ${config.trail})`;
            ctx.fillRect(0,0,canvas.width,canvas.height);
            for (let i = fireworks.length - 1; i >= 0; i--) {
                fireworks[i].update();
                fireworks[i].draw();
                if (fireworks[i].done) fireworks.splice(i, 1);
            }
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].alpha <= 0) particles.splice(i, 1);
            }
            if(isPinching) { 
                ctx.globalCompositeOperation = 'lighter';
                const radius = (charge * 0.7) + Math.sin(Date.now() * 0.1) * 2;
                ctx.beginPath(); 
                ctx.arc(hPos.x, hPos.y, radius, 0, Math.PI*2);
                ctx.strokeStyle = `hsla(${config.hue}, 100%, 80%, 0.8)`; 
                ctx.lineWidth = 4; ctx.stroke();
                ctx.globalCompositeOperation = 'source-over';
            }
            requestAnimationFrame(loop);
        };
        loop();
    };
</script>
</body>
</html>
